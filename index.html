al).`},{id:`alg-f12`,term:`Flip the Sign Rule`,definition:`When multiplying or dividing an inequality by a NEGATIVE number, flip the inequality sign.`},{id:`alg-f13`,term:`Arithmetic Sequence`,definition:`A sequence where the difference between consecutive terms is constant. E.g. 3, 7, 11, 15 (difference = 4).`},{id:`alg-f14`,term:`nth Term Formula`,definition:`For arithmetic sequences: nth term = a + (n−1)d, where a is the first term and d is the common difference.`},{id:`alg-f15`,term:`Geometric Sequence`,definition:`Each term is multiplied by a fixed ratio. E.g. 2, 6, 18, 54 (ratio = 3).`},{id:`alg-f16`,term:`Perfect Square Trinomial`,definition:`x² + 2px + p² = (x+p)². The middle term is twice the square root of the last term.`},{id:`alg-f17`,term:`Substitution Method`,definition:`Rearrange one equation to make one variable the subject, then substitute into the other.`},{id:`alg-f18`,term:`Roots of a Quadratic`,definition:`The values of x where the quadratic = 0. Also called solutions or zeros. Found where the parabola crosses the x-axis.`}],geometry:[{id:`geo-f1`,term:`Angles on a Straight Line`,definition:`All angles on a straight line add up to 180°.`},{id:`geo-f2`,term:`Angles in a Triangle`,definition:`All interior angles of a triangle sum to 180°.`},{id:`geo-f3`,term:`Pythagoras' Theorem`,definition:`a² + b² = c² where c is the hypotenuse (longest side) of a right-angled triangle.`},{id:`geo-f4`,term:`SOH CAH TOA`,definition:`Sin = Opp/Hyp, Cos = Adj/Hyp, Tan = Opp/Adj. Used in right-angled triangles.`},{id:`geo-f5`,term:`Area of a Circle`,definition:`A = πr² where r is the radius.`},{id:`geo-f6`,term:`Circumference of a Circle`,definition:`C = 2πr or C = πd where d is the diameter.`},{id:`geo-f7`,term:`Volume of a Cuboid`,definition:`V = length × width × height.`},{id:`geo-f8`,term:`Volume of a Cylinder`,definition:`V = πr²h where r is the radius and h is the height.`},{id:`geo-f9`,term:`Alternate Angles`,definition:`Angles on alternate sides of a transversal crossing parallel lines are equal (Z-angles).`},{id:`geo-f10`,term:`Corresponding Angles`,definition:`Angles in the same position when a transversal crosses parallel lines are equal (F-angles).`},{id:`geo-f11`,term:`Co-interior Angles`,definition:`Angles between parallel lines on the same side of a transversal add up to 180° (C-angles).`},{id:`geo-f12`,term:`Surface Area`,definition:`Total area of all faces of a 3D shape. For a cuboid: 2(lw + lh + wh).`}],number:[{id:`num-f1`,term:`Fraction to Decimal`,definition:`Divide the numerator by the denominator. E.g. 3/4 = 3 ÷ 4 = 0.75.`},{id:`num-f2`,term:`Percentage Change`,definition:`% change = (change ÷ original) × 100.`},{id:`num-f3`,term:`Reverse Percentage`,definition:`If a value AFTER a % change is known, divide by (1 + rate) or (1 − rate) to find the original.`},{id:`num-f4`,term:`Ratio`,definition:`A comparison of two or more quantities. E.g. 3:5 means for every 3 of one thing, there are 5 of another.`},{id:`num-f5`,term:`Standard Form`,definition:`A × 10ⁿ where 1 ≤ A < 10 and n is an integer. E.g. 3,500 = 3.5 × 10³.`},{id:`num-f6`,term:`Surd`,definition:`An irrational square root that cannot be simplified to a whole number. E.g. √2, √3, √5.`},{id:`num-f7`,term:`LCM (Lowest Common Multiple)`,definition:`The smallest number that is a multiple of two or more numbers. E.g. LCM of 4 and 6 = 12.`},{id:`num-f8`,term:`HCF (Highest Common Factor)`,definition:`The largest number that divides exactly into two or more numbers. E.g. HCF of 12 and 18 = 6.`},{id:`num-f9`,term:`Simplifying Fractions`,definition:`Divide numerator and denominator by their HCF. E.g. 12/18 ÷ 6/6 = 2/3.`},{id:`num-f10`,term:`Interest (Compound)`,definition:`Amount = P(1 + r/100)ⁿ where P = principal, r = rate %, n = years.`},{id:`num-f11`,term:`Direct Proportion`,definition:`y = kx — as x increases, y increases by the same factor. Graph is a straight line through origin.`},{id:`num-f12`,term:`Inverse Proportion`,definition:`y = k/x — as x increases, y decreases proportionally. Graph is a curve (hyperbola).`}],graphs:[{id:`gra-f1`,term:`y = mx + c`,definition:`Equation of a straight line. m = gradient (steepness), c = y-intercept (where it crosses the y-axis).`},{id:`gra-f2`,term:`Gradient Formula`,definition:`Gradient = (y₂ − y₁) / (x₂ − x₁). Measures the steepness of a line between two points.`},{id:`gra-f3`,term:`Parallel Lines`,definition:`Lines with the same gradient. They never meet. E.g. y = 2x + 1 and y = 2x − 5.`},{id:`gra-f4`,term:`Perpendicular Lines`,definition:`Lines whose gradients multiply to −1. If one has gradient m, the other has −1/m.`},{id:`gra-f5`,term:`Quadratic Graph`,definition:`y = ax² + bx + c produces a U-shaped parabola. If a > 0 it opens up; if a < 0 it opens down.`},{id:`gra-f6`,term:`Turning Point`,definition:`The vertex of a parabola where it changes direction. Found by completing the square or x = −b/(2a).`},{id:`gra-f7`,term:`Roots of a Graph`,definition:`The x-values where a graph crosses the x-axis (y = 0). A quadratic can have 0, 1, or 2 roots.`},{id:`gra-f8`,term:`f(x) + a Translation`,definition:`Adding a constant outside shifts the graph UP by a units. E.g. f(x) + 3 moves everything up 3.`},{id:`gra-f9`,term:`f(x − a) Translation`,definition:`Subtracting inside the brackets shifts the graph RIGHT by a units (counterintuitive!).`},{id:`gra-f10`,term:`−f(x) Reflection`,definition:`Negating the whole function reflects the graph in the x-axis. All y-values flip sign.`},{id:`gra-f11`,term:`Distance-Time Graph`,definition:`Gradient = speed. Horizontal line = stationary. Steeper = faster. Curved = accelerating.`},{id:`gra-f12`,term:`Speed-Time Graph`,definition:`Gradient = acceleration. Area under graph = distance travelled.`}],calculus:[{id:`cal-f1`,term:`Differentiation`,definition:`Finding the gradient function (rate of change). If y = xⁿ, then dy/dx = nxⁿ⁻¹.`},{id:`cal-f2`,term:`dy/dx`,definition:`The derivative — gives the gradient of the curve at any point x.`},{id:`cal-f3`,term:`Stationary Point`,definition:`Where dy/dx = 0. The gradient is zero. Can be a maximum, minimum, or point of inflection.`},{id:`cal-f4`,term:`Second Derivative`,definition:`d²y/dx². If positive → minimum point. If negative → maximum point.`},{id:`cal-f5`,term:`Integration`,definition:`The reverse of differentiation. ∫xⁿ dx = xⁿ⁺¹/(n+1) + C. Finds area under curves.`},{id:`cal-f6`,term:`Constant of Integration`,definition:`+C added to indefinite integrals because differentiating a constant gives 0.`},{id:`cal-f7`,term:`Definite Integral`,definition:`∫ from a to b gives the exact area under the curve between x = a and x = b.`},{id:`cal-f8`,term:`Chain Rule`,definition:`For composite functions: dy/dx = dy/du × du/dx. Used when differentiating functions within functions.`}],"reading-skills":[{id:`rs-f1`,term:`Inference`,definition:`Drawing a conclusion from evidence not directly stated — reading between the lines.`},{id:`rs-f2`,term:`P-E-E Structure`,definition:`Point, Evidence, Explain — the framework for analytical paragraphs.`},{id:`rs-f3`,term:`Connotation`,definition:`The implied or associated meaning of a word beyond its literal dictionary definition.`},{id:`rs-f4`,term:`Denotation`,definition:`The literal, dictionary definition of a word (opposite of connotation).`},{id:`rs-f5`,term:`Tone`,definition:`The attitude or feeling the writer expresses — e.g., formal, angry, ironic, sympathetic.`},{id:`rs-f6`,term:`Writer's Purpose`,definition:`The reason a writer creates a text — to inform, persuade, entertain, shock, create sympathy, etc.`},{id:`rs-f7`,term:`Explicit Information`,definition:`Information directly stated in the text — no reading between the lines required.`},{id:`rs-f8`,term:`Implicit Information`,definition:`Information that is suggested or implied but not directly stated — requires inference.`},{id:`rs-f9`,term:`Structure`,definition:`How a text is organised — order of events, narrative perspective, openings/endings, paragraph length.`},{id:`rs-f10`,term:`Effect on the Reader`,definition:`How the writing makes the reader feel or think — always link technique to the reader's response.`},{id:`rs-f11`,term:`Atmosphere`,definition:`The overall feeling or mood created in a text — tense, eerie, romantic, joyful, etc.`},{id:`rs-f12`,term:`Evaluation`,definition:`Assessing how successfully a writer achieves their purpose — agree/disagree with a statement using evidence.`}],"language-techniques":[{id:`lt-f1`,term:`Simile`,definition:`A comparison using 'like' or 'as'. E.g., 'as cold as ice', 'ran like the wind'.`},{id:`lt-f2`,term:`Metaphor`,definition:`Saying something IS something else directly. E.g., 'life is a journey', 'she was a storm'.`},{id:`lt-f3`,term:`Extended Metaphor`,definition:`A metaphor that is developed and sustained throughout a text or passage.`},{id:`lt-f4`,term:`Personification`,definition:`Giving human qualities to a non-human thing. E.g., 'the wind whispered', 'the stars danced'.`},{id:`lt-f5`,term:`Alliteration`,definition:`Repetition of the same consonant sound at the start of nearby words. Creates rhythm or emphasis.`},{id:`lt-f6`,term:`Onomatopoeia`,definition:`Words that sound like the thing they describe. E.g., crash, hiss, sizzle, thud, bang.`},{id:`lt-f7`,term:`Hyperbole`,definition:`Deliberate extreme exaggeration for effect. E.g., 'I've told you a million times'.`},{id:`lt-f8`,term:`Rhetorical Question`,definition:`A question asked for effect, not expecting an answer. Used to persuade or provoke thought.`},{id:`lt-f9`,term:`Pathetic Fallacy`,definition:`Using weather or nature to reflect the mood or emotions of characters. E.g., stormy weather = anger/conflict.`},{id:`lt-f10`,term:`Oxymoron`,definition:`Two contradictory terms placed together. E.g., 'bittersweet', 'deafening silence'.`},{id:`lt-f11`,term:`Repetition`,definition:`Repeating words or phrases for emphasis or to create rhythm.`},{id:`lt-f12`,term:`Rule of Three`,definition:`Using three words or phrases together for emphasis and rhythm. Also called tricolon.`},{id:`lt-f13`,term:`Sibilance`,definition:`Repetition of 's' sounds creating a hissing effect — can suggest danger, unease, or gentleness.`},{id:`lt-f14`,term:`Juxtaposition`,definition:`Placing two contrasting ideas side by side to highlight the difference between them.`},{id:`lt-f15`,term:`Symbolism`,definition:`Using an object, colour, or image to represent an idea. E.g., a dove = peace, red = danger/passion.`}],macbeth:[{id:`mac-f1`,term:`Vaulting Ambition`,definition:`'Vaulting ambition, which o'erleaps itself' — Macbeth's own description of his reckless, overreaching desire for power.`},{id:`mac-f2`,term:`Regicide`,definition:`The murder of a king. In Jacobean England, this was seen as a crime against God and the natural order.`},{id:`mac-f3`,term:`Tragic Hero`,definition:`A noble protagonist who falls from greatness due to a fatal flaw (hamartia). Macbeth's flaw = ambition.`},{id:`mac-f4`,term:`Unsex Me Here`,definition:`Lady Macbeth calls on spirits to remove her feminine qualities so she can commit murder without compassion.`},{id:`mac-f5`,term:`Out, Damned Spot`,definition:`Lady Macbeth's sleepwalking hallucination — she tries to wash invisible blood from her hands, showing her guilt.`},{id:`mac-f6`,term:`Divine Right of Kings`,definition:`The belief that monarchs rule by God's will — making killing a king a sin against God as well as the law.`},{id:`mac-f7`,term:`The Three Witches`,definition:`Represent fate, temptation, and ambiguity. Their prophecies don't force Macbeth — they trigger his existing desires.`},{id:`mac-f8`,term:`Pathetic Fallacy in Macbeth`,definition:`Unnatural weather and darkness follow Duncan's murder — symbolising disruption of the natural order.`},{id:`mac-f9`,term:`Fair is Foul, Foul is Fair`,definition:`The witches' opening line — the central theme of appearance vs reality running throughout the play.`},{id:`mac-f10`,term:`Dagger Soliloquy`,definition:`'Is this a dagger I see before me?' — Macbeth hallucinates before killing Duncan, showing his psychological torment.`},{id:`mac-f11`,term:`Jacobean Context`,definition:`Written around 1606 for King James I, who believed in witchcraft and the Divine Right of Kings.`},{id:`mac-f12`,term:`Blood Imagery`,definition:`Blood symbolises guilt and irreversible consequences throughout the play — from Macbeth's dagger to Lady Macbeth's hands.`},{id:`mac-f13`,term:`Masculinity Theme`,definition:`Both Macbeth and Lady Macbeth link masculinity with violence and cruelty — Shakespeare questions this assumption.`},{id:`mac-f14`,term:`Banquo's Ghost`,definition:`Appears only to Macbeth at the banquet — represents guilt materialising as psychological breakdown.`},{id:`mac-f15`,term:`Great Chain of Being`,definition:`Jacobean concept of fixed natural order — Macbeth's regicide disrupts it, causing unnatural events in nature.`}],"cell-biology":[{id:`bio-f1`,term:`Eukaryotic Cell`,definition:`Cell with a membrane-bound nucleus containing DNA. Includes animal cells and plant cells.`},{id:`bio-f2`,term:`Prokaryotic Cell`,definition:`Cell with no membrane-bound nucleus — DNA is in the cytoplasm. E.g., bacteria.`},{id:`bio-f3`,term:`Cell Membrane`,definition:`Partially permeable membrane controlling what enters and leaves the cell.`},{id:`bio-f4`,term:`Mitochondria`,definition:`Site of aerobic respiration. Produces ATP (energy). Cells with high energy needs have more mitochondria.`},{id:`bio-f5`,term:`Ribosomes`,definition:`Site of protein synthesis. Found in all cells — both prokaryotic and eukaryotic.`},{id:`bio-f6`,term:`Chloroplasts`,definition:`Found in plant cells only. Contain chlorophyll; site of photosynthesis. Convert light energy to glucose.`},{id:`bio-f7`,term:`Cell Wall (Plant)`,definition:`Made of cellulose. Provides structural support and prevents the cell from bursting.`},{id:`bio-f8`,term:`Permanent Vacuole`,definition:`Found in plant cells. Filled with cell sap; maintains turgor pressure.`},{id:`bio-f9`,term:`Nucleus`,definition:`Controls the cell. Contains DNA as chromosomes. Surrounded by nuclear membrane in eukaryotes.`},{id:`bio-f10`,term:`Diffusion`,definition:`Movement of particles from high concentration to low concentration (down the concentration gradient). Passive process.`},{id:`bio-f11`,term:`Osmosis`,definition:`Movement of water molecules across a partially permeable membrane from dilute to concentrated solution.`},{id:`bio-f12`,term:`Active Transport`,definition:`Movement of substances AGAINST the concentration gradient using energy (ATP). Requires carrier proteins.`},{id:`bio-f13`,term:`Mitosis`,definition:`Cell division producing two genetically IDENTICAL daughter cells. Used for growth and repair.`},{id:`bio-f14`,term:`Meiosis`,definition:`Cell division producing four genetically DIFFERENT daughter cells with half the chromosomes. Used for sexual reproduction.`},{id:`bio-f15`,term:`Stem Cells`,definition:`Undifferentiated cells that can develop into specialised cell types. Embryonic stem cells are most versatile.`},{id:`bio-f16`,term:`Magnification Formula`,definition:`Magnification = Image size ÷ Real size. Used in microscopy calculations.`},{id:`bio-f17`,term:`Plasmid`,definition:`Small circular DNA molecule in bacteria. Used in genetic engineering to insert useful genes.`},{id:`bio-f18`,term:`Cytoplasm`,definition:`Jelly-like fluid filling the cell where chemical reactions (like anaerobic respiration) occur.`}],organisation:[{id:`org-f1`,term:`Digestive System Role`,definition:`Breaks down large food molecules into small, soluble ones that can be absorbed into the blood.`},{id:`org-f2`,term:`Enzymes`,definition:`Biological catalysts that speed up digestion. Specific to their substrate. Denatured by excess heat or wrong pH.`},{id:`org-f3`,term:`Amylase`,definition:`Breaks down starch into sugars (maltose). Produced in the salivary glands and pancreas.`},{id:`org-f4`,term:`Protease`,definition:`Breaks down proteins into amino acids. Produced in the stomach, pancreas, and small intestine.`},{id:`org-f5`,term:`Lipase`,definition:`Breaks down fats (lipids) into fatty acids and glycerol.`},{id:`org-f6`,term:`Villus (Villi)`,definition:`Finger-like projections in the small intestine that increase surface area for absorption of digested food.`},{id:`org-f7`,term:`Cardiovascular System`,definition:`Heart + blood vessels + blood. Carries oxygen, glucose, hormones, and removes waste products.`},{id:`org-f8`,term:`Arteries`,definition:`Carry blood AWAY from the heart at high pressure. Have thick, elastic walls.`},{id:`org-f9`,term:`Veins`,definition:`Carry blood TOWARDS the heart at low pressure. Have valves to prevent backflow.`},{id:`org-f10`,term:`Capillaries`,definition:`Tiny blood vessels one cell thick. Allow exchange of substances between blood and tissues.`},{id:`org-f11`,term:`Coronary Heart Disease`,definition:`Fatty deposits (plaques) narrow coronary arteries, reducing blood flow to the heart muscle.`},{id:`org-f12`,term:`Stents`,definition:`Small metal tubes inserted into narrowed arteries to keep them open and restore blood flow.`}],bioenergetics:[{id:`bio-en-f1`,term:`Photosynthesis Equation`,definition:`6CO₂ + 6H₂O → C₆H₁₂O₆ + 6O₂ (light energy required). Produces glucose and oxygen.`},{id:`bio-en-f2`,term:`Aerobic Respiration Equation`,definition:`C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + ATP energy.`},{id:`bio-en-f3`,term:`Anaerobic Respiration (Animals)`,definition:`Glucose → Lactic acid + small amount of ATP. Occurs when oxygen is insufficient.`},{id:`bio-en-f4`,term:`Anaerobic Respiration (Plants/Yeast)`,definition:`Glucose → Ethanol + CO₂ + small amount of ATP. Used in fermentation/brewing.`},{id:`bio-en-f5`,term:`Chlorophyll`,definition:`Green pigment in chloroplasts. Absorbs light energy (mainly red and blue wavelengths) for photosynthesis.`},{id:`bio-en-f6`,term:`Limiting Factors of Photosynthesis`,definition:`Light intensity, CO₂ concentration, and temperature. Any one can limit the rate even if others are high.`},{id:`bio-en-f7`,term:`ATP`,definition:`Adenosine triphosphate — the cell's energy currency. Produced in mitochondria by respiration.`},{id:`bio-en-f8`,term:`Oxygen Debt`,definition:`Extra oxygen needed after exercise to break down lactic acid built up during anaerobic respiration.`}],"atomic-structure":[{id:`chem-f1`,term:`Proton`,definition:`Positive charge (+1), mass = 1, found in the nucleus.`},{id:`chem-f2`,term:`Neutron`,definition:`No charge (0), mass = 1, found in the nucleus.`},{id:`chem-f3`,term:`Electron`,definition:`Negative charge (−1), negligible mass, orbits the nucleus in shells.`},{id:`chem-f4`,term:`Atomic Number`,definition:`Number of protons in an atom. Determines which element it is.`},{id:`chem-f5`,term:`Mass Number`,definition:`Number of protons + neutrons. Written as superscript before element symbol.`},{id:`chem-f6`,term:`Isotopes`,definition:`Atoms of the same element with the same protons but different numbers of neutrons.`},{id:`chem-f7`,term:`Relative Atomic Mass (Ar)`,definition:`Weighted average mass of an element's isotopes relative to carbon-12.`},{id:`chem-f8`,term:`Electronic Configuration`,definition:`Arrangement of electrons in shells: shell 1 holds max 2, shell 2 holds max 8, shell 3 holds max 8.`},{id:`chem-f9`,term:`Group (Periodic Table)`,definition:`Vertical column. Elements in the same group have the same number of outer electrons and similar properties.`},{id:`chem-f10`,term:`Period (Periodic Table)`,definition:`Horizontal row. Elements in the same period have the same number of electron shells.`},{id:`chem-f11`,term:`Group 1 — Alkali Metals`,definition:`Li, Na, K, Rb, Cs, Fr. Highly reactive metals. 1 outer electron. Reactivity increases down the group.`},{id:`chem-f12`,term:`Group 7 — Halogens`,definition:`F, Cl, Br, I, At. Non-metals. 7 outer electrons. Reactivity decreases down the group.`},{id:`chem-f13`,term:`Group 0 — Noble Gases`,definition:`He, Ne, Ar, Kr, Xe, Rn. Full outer shells — very unreactive. Used in light bulbs, balloons, lasers.`},{id:`chem-f14`,term:`Ion`,definition:`An atom that has gained or lost electrons, giving it an overall charge.`},{id:`chem-f15`,term:`Plum Pudding Model`,definition:`Thomson's model (1904): electrons embedded in a positively charged sphere. Disproved by Rutherford's scattering experiment.`}],bonding:[{id:`bond-f1`,term:`Ionic Bond`,definition:`Electrostatic attraction between oppositely charged ions. Forms between metals and non-metals.`},{id:`bond-f2`,term:`Ionic Compound Properties`,definition:`High melting/boiling points, conduct electricity when dissolved/melted, form crystal lattice structures.`},{id:`bond-f3`,term:`Covalent Bond`,definition:`Shared pair of electrons between two non-metal atoms.`},{id:`bond-f4`,term:`Simple Molecular Structure`,definition:`Small covalent molecules. Low melting points, don't conduct electricity. E.g., H₂O, CO₂, CH₄.`},{id:`bond-f5`,term:`Giant Covalent Structure`,definition:`Huge lattice of covalently bonded atoms. Very high melting points. E.g., diamond, graphite, silicon dioxide.`},{id:`bond-f6`,term:`Metallic Bond`,definition:`Electrostatic attraction between a lattice of positive metal ions and a 'sea' of delocalised electrons.`},{id:`bond-f7`,term:`Properties of Metals`,definition:`Good electrical/thermal conductors, malleable, ductile, high melting points — due to metallic bonding.`},{id:`bond-f8`,term:`Diamond Structure`,definition:`Giant covalent lattice of carbon atoms. Each C bonds to 4 others. Very hard, high melting point, does not conduct.`},{id:`bond-f9`,term:`Graphite Structure`,definition:`Layers of carbon hexagons. Weak inter-layer forces. Can conduct electricity — delocalised electrons between layers.`},{id:`bond-f10`,term:`Fullerene (Buckminsterfullerene)`,definition:`C₆₀ — carbon atoms arranged in a hollow sphere. Possible uses in drug delivery and lubricants.`}],forces:[{id:`phys-f1`,term:`Newton's First Law`,definition:`An object stays at rest or in uniform motion unless acted on by a resultant force.`},{id:`phys-f2`,term:`Newton's Second Law`,definition:`F = ma. Resultant force (N) = mass (kg) × acceleration (m/s²).`},{id:`phys-f3`,term:`Newton's Third Law`,definition:`Every action force has an equal and opposite reaction force. Forces always come in pairs.`},{id:`phys-f4`,term:`Weight Formula`,definition:`W = mg. Weight (N) = mass (kg) × gravitational field strength (N/kg). On Earth g ≈ 9.8 N/kg.`},{id:`phys-f5`,term:`Resultant Force`,definition:`The single force that has the same effect as all forces acting on an object combined.`},{id:`phys-f6`,term:`Terminal Velocity`,definition:`Constant velocity reached when drag = driving force (resultant force = 0). No acceleration.`},{id:`phys-f7`,term:`Inertia`,definition:`Resistance of an object to changes in its state of motion. Greater mass = greater inertia.`},{id:`phys-f8`,term:`Momentum`,definition:`p = mv. Momentum (kg m/s) = mass (kg) × velocity (m/s).`},{id:`phys-f9`,term:`Conservation of Momentum`,definition:`Total momentum before a collision equals total momentum after, provided no external forces act.`},{id:`phys-f10`,term:`Work Done`,definition:`W = Fs. Work (J) = Force (N) × distance (m) in the direction of the force.`},{id:`phys-f11`,term:`Power`,definition:`P = W/t. Power (W) = work done (J) ÷ time (s). Rate of energy transfer.`},{id:`phys-f12`,term:`Pressure (Solids)`,definition:`P = F/A. Pressure (Pa) = Force (N) ÷ Area (m²).`},{id:`phys-f13`,term:`Stopping Distance`,definition:`Thinking distance + braking distance. Affected by speed, road conditions, reaction time, brakes.`},{id:`phys-f14`,term:`Free Body Diagram`,definition:`A diagram showing all forces acting on an object as arrows, showing direction and relative size.`},{id:`phys-f15`,term:`Equilibrium`,definition:`When all forces on an object are balanced — resultant force = 0. Object stays still or at constant velocity.`}],electricity:[{id:`elec-f1`,term:`Ohm's Law`,definition:`V = IR. Voltage (V) = Current (A) × Resistance (Ω).`},{id:`elec-f2`,term:`Series Circuit`,definition:`Components in one loop. Same current throughout. Voltages add up. Total resistance = sum of all resistances.`},{id:`elec-f3`,term:`Parallel Circuit`,definition:`Components in separate branches. Voltage same across each branch. Currents split. Total resistance decreases.`},{id:`elec-f4`,term:`Current`,definition:`Flow of electric charge. Measured in Amperes (A). I = Q/t.`},{id:`elec-f5`,term:`Voltage (Potential Difference)`,definition:`Energy transferred per unit charge. Measured in Volts (V). Drives current around a circuit.`},{id:`elec-f6`,term:`Resistance`,definition:`Opposition to current flow. Measured in Ohms (Ω). R = V/I.`},{id:`elec-f7`,term:`Power (Electrical)`,definition:`P = IV or P = I²R. Rate of energy transfer. Measured in Watts (W).`},{id:`elec-f8`,term:`Energy Transferred`,definition:`E = Pt = QV. Energy (J) = Power (W) × time (s).`},{id:`elec-f9`,term:`Diode`,definition:`Component that only allows current to flow in one direction. Very high resistance in reverse direction.`},{id:`elec-f10`,term:`LDR (Light Dependent Resistor)`,definition:`Resistance decreases as light intensity increases. Used in automatic lighting systems.`},{id:`elec-f11`,term:`Thermistor`,definition:`Resistance decreases as temperature increases. Used in thermostats and temperature sensors.`},{id:`elec-f12`,term:`Charge (Q)`,definition:`Q = It. Charge (Coulombs) = Current (A) × time (s). Amount of electric charge that has flowed.`}],"weimar-nazis":[{id:`hist-f1`,term:`Weimar Republic`,definition:`Germany's democratic government 1919−1933. Named after Weimar where the constitution was drafted.`},{id:`hist-f2`,term:`Treaty of Versailles (1919)`,definition:`Post-WWI peace treaty. Germany lost territory, paid reparations of £6.6bn, had military limits, accepted War Guilt.`},{id:`hist-f3`,term:`War Guilt Clause (Art. 231)`,definition:`Forced Germany to accept sole responsibility for WWI — used to justify reparations. Caused huge resentment.`},{id:`hist-f4`,term:`Hyperinflation (1923)`,definition:`Germany printed money to pay reparations → prices skyrocketed. Savings became worthless overnight.`},{id:`hist-f5`,term:`Dawes Plan (1924)`,definition:`American loans to Germany to stabilise the economy and allow reparation payments. Began the 'Golden Years'.`},{id:`hist-f6`,term:`Stab in the Back Myth (Dolchstoßlegende)`,definition:`Right-wing claim that Germany was 'stabbed in the back' by socialists and Jews who signed the armistice.`},{id:`hist-f7`,term:`Munich Putsch (1923)`,definition:`Hitler's failed attempt to seize power. He was imprisoned and wrote Mein Kampf. Realised he needed democratic route.`},{id:`hist-f8`,term:`Great Depression (1929)`,definition:`Wall Street Crash → American loans recalled → 6 million unemployed in Germany → extremist parties gained support.`},{id:`hist-f9`,term:`Reichstag Fire (1933)`,definition:`Parliament burned down; blamed on communists. Used by Hitler to pass emergency laws removing civil liberties.`},{id:`hist-f10`,term:`Enabling Act (1933)`,definition:`Gave Hitler power to pass laws without the Reichstag for 4 years — effectively ended German democracy.`},{id:`hist-f11`,term:`Night of the Long Knives (1934)`,definition:`Hitler purged SA leaders (including Röhm) and rivals. Secured army loyalty. Eliminated internal opposition.`},{id:`hist-f12`,term:`Führer`,definition:`Title taken by Hitler after President Hindenburg's death (1934), combining Chancellor and President roles.`},{id:`hist-f13`,term:`SS (Schutzstaffel)`,definition:`Elite Nazi security force under Himmler. Ran concentration camps; far more disciplined than the SA.`},{id:`hist-f14`,term:`Propaganda`,definition:`Goebbels controlled all media — film, radio, posters — to promote Nazi ideology and Hitler as Germany's saviour.`},{id:`hist-f15`,term:`Kristallnacht (1938)`,definition:`'Night of Broken Glass' — organised attacks on Jewish businesses and synagogues. Turning point in persecution of Jews.`}],programming:[{id:`cs-f1`,term:`Variable`,definition:`A named storage location in memory that holds a value which can change during program execution.`},{id:`cs-f2`,term:`Data Types`,definition:`Integer (whole numbers), Float/Real (decimals), String (text), Boolean (True/False), Char (single character).`},{id:`cs-f3`,term:`Assignment`,definition:`Storing a value in a variable using =. E.g., age = 16 stores 16 in the variable 'age'.`},{id:`cs-f4`,term:`Selection (IF/ELIF/ELSE)`,definition:`Code that makes decisions — executes different blocks based on conditions being True or False.`},{id:`cs-f5`,term:`For Loop (Definite Iteration)`,definition:`Repeats code a known number of times. E.g., for i in range(10): runs 10 times.`},{id:`cs-f6`,term:`While Loop (Indefinite Iteration)`,definition:`Repeats code while a condition remains True. Number of repetitions not known in advance.`},{id:`cs-f7`,term:`Array / List`,definition:`A data structure storing multiple values in one variable, accessed by index. Index starts at 0.`},{id:`cs-f8`,term:`Function / Procedure`,definition:`A named, reusable block of code. Functions return a value; procedures don't.`},{id:`cs-f9`,term:`Parameter`,definition:`A variable that receives a value when a function/procedure is called.`},{id:`cs-f10`,term:`Return Statement`,definition:`Sends a value back from a function to where it was called.`},{id:`cs-f11`,term:`Concatenation`,definition:`Joining two strings together. E.g., 'Hello' + ' World' = 'Hello World'.`},{id:`cs-f12`,term:`Casting (Type Conversion)`,definition:`Converting a value from one data type to another. E.g., int('5') converts string '5' to integer 5.`},{id:`cs-f13`,term:`Pseudocode`,definition:`An informal, plain English description of an algorithm's steps — not actual code but structured like code.`},{id:`cs-f14`,term:`Trace Table`,definition:`A table used to manually track the values of variables as an algorithm runs — used to test/debug code.`},{id:`cs-f15`,term:`Scope of Variables`,definition:`Where in a program a variable can be accessed. Local = within a function; Global = entire program.`},{id:`cs-f16`,term:`Bubble Sort`,definition:`Compares adjacent elements and swaps if out of order. Repeats until sorted. Simple but slow O(n²).`},{id:`cs-f17`,term:`Binary Search`,definition:`Searches a sorted list by repeatedly halving the search space. Much faster than linear search O(log n).`},{id:`cs-f18`,term:`String Length / Slicing`,definition:`len(string) returns the number of characters. string[0:3] returns first 3 characters (indices 0, 1, 2).`},{id:`cs-f19`,term:`Boolean Operators`,definition:`AND, OR, NOT. Used to combine or modify conditions in selection and loops.`},{id:`cs-f20`,term:`Modulo Operator (%)`,definition:`Returns the remainder after division. E.g., 17 % 5 = 2. Used to check if a number is even (n % 2 == 0).`}],algorithms:[{id:`alg-cs-f1`,term:`Algorithm`,definition:`A precise set of step-by-step instructions to solve a problem.`},{id:`alg-cs-f2`,term:`Bubble Sort`,definition:`Compares adjacent pairs and swaps if needed. Repeats until no swaps. Simple but O(n²) — inefficient for large data.`},{id:`alg-cs-f3`,term:`Merge Sort`,definition:`Divides list in half recursively, then merges sorted halves. Efficient: O(n log n).`},{id:`alg-cs-f4`,term:`Linear Search`,definition:`Checks each item in order until found or end reached. Works on unsorted data. O(n).`},{id:`alg-cs-f5`,term:`Binary Search`,definition:`Finds item in a SORTED list by halving search space each time. Very fast: O(log n).`},{id:`alg-cs-f6`,term:`Big-O Notation`,definition:`Describes algorithm efficiency. O(1) = constant, O(n) = linear, O(n²) = quadratic, O(log n) = logarithmic.`},{id:`alg-cs-f7`,term:`Flowchart`,definition:`Visual representation of an algorithm. Shapes: oval (start/end), rectangle (process), diamond (decision), parallelogram (input/output).`},{id:`alg-cs-f8`,term:`Insertion Sort`,definition:`Builds sorted list one item at a time by inserting each into correct position. Good for small/nearly sorted data.`},{id:`alg-cs-f9`,term:`Decomposition`,definition:`Breaking a complex problem into smaller, more manageable sub-problems.`},{id:`alg-cs-f10`,term:`Abstraction`,definition:`Removing unnecessary details to focus on the essential features of a problem.`}],statistics:[{id:`stat-f1`,term:`Mean`,definition:`Sum of all values ÷ number of values. The arithmetic average. Affected by outliers.`},{id:`stat-f2`,term:`Median`,definition:`The middle value when data is ordered. Not affected by outliers. Use (n+1)/2 to find its position.`},{id:`stat-f3`,term:`Mode`,definition:`The most frequently occurring value. A dataset can have 0, 1, or many modes.`},{id:`stat-f4`,term:`Range`,definition:`Max − Min. Measures the total spread of the data. Affected by outliers.`},{id:`stat-f5`,term:`Interquartile Range (IQR)`,definition:`Q3 − Q1. Measures the spread of the middle 50% of data. Not affected by outliers.`},{id:`stat-f6`,term:`Lower Quartile (Q1)`,definition:`The median of the lower half of the data. 25% of values fall below Q1.`},{id:`stat-f7`,term:`Upper Quartile (Q3)`,definition:`The median of the upper half of the data. 75% of values fall below Q3.`},{id:`stat-f8`,term:`Outlier`,definition:`A data value that lies well away from the rest of the data. Can distort the mean and range.`},{id:`stat-f9`,term:`Frequency Density`,definition:`Frequency ÷ Class Width. Used as the y-axis in histograms to fairly represent unequal class widths.`},{id:`stat-f10`,term:`Histogram`,definition:`A bar chart with no gaps for continuous data. The area of each bar represents frequency (not height).`},{id:`stat-f11`,term:`Cumulative Frequency`,definition:`Running total of frequencies. Used to draw ogive curves for estimating median and quartiles.`},{id:`stat-f12`,term:`Box Plot (Box-and-Whisker)`,definition:`Shows the 5-number summary: Min, Q1, Median, Q3, Max. The box covers Q1 to Q3.`},{id:`stat-f13`,term:`Positive Skew`,definition:`Data has a long tail to the RIGHT. Mean > Median > Mode. Most data bunched on the left.`},{id:`stat-f14`,term:`Negative Skew`,definition:`Data has a long tail to the LEFT. Mean < Median < Mode. Most data bunched on the right.`},{id:`stat-f15`,term:`Scatter Graph`,definition:`Plots pairs of data to show the relationship between two variables. Used to identify correlation.`},{id:`stat-f16`,term:`Positive Correlation`,definition:`As one variable increases, the other also increases. Line of best fit has positive gradient.`},{id:`stat-f17`,term:`Negative Correlation`,definition:`As one variable increases, the other decreases. Line of best fit has negative gradient.`},{id:`stat-f18`,term:`Line of Best Fit`,definition:`A straight line drawn as close as possible to all the points on a scatter graph, showing the trend.`},{id:`stat-f19`,term:`Interpolation`,definition:`Using the line of best fit to predict values WITHIN the data range. More reliable.`},{id:`stat-f20`,term:`Extrapolation`,definition:`Using the line of best fit to predict values OUTSIDE the data range. Less reliable.`},{id:`stat-f21`,term:`Tree Diagram`,definition:`A diagram showing all possible outcomes of successive events. Branch probabilities must sum to 1 at each point.`},{id:`stat-f22`,term:`Independent Events`,definition:`Two events where the outcome of one does NOT affect the other. P(A and B) = P(A) × P(B).`},{id:`stat-f23`,term:`Without Replacement`,definition:`When an item is NOT returned before the next draw. Probabilities change for subsequent draws.`},{id:`stat-f24`,term:`Conditional Probability`,definition:`P(A|B) = probability of A given that B has already occurred. Used in tree diagrams.`},{id:`stat-f25`,term:`Pie Chart`,definition:`A circle divided into sectors. Each sector angle = (frequency ÷ total) × 360°.`}],"math-chinese":[],"cs-chinese":[],"chinese-vocab":[]},Ea=[{id:`mzh-1`,term:`Linear Equation`,definition:`An equation where the highest power of x is 1. Always produces a straight line when graphed.`,termZh:`线性方程`,pinyin:`xiànxìng fāngchéng`,defZh:`x的最高次幂为1的方程。画成图形时始终为直线。例：2x + 3 = 7`},{id:`mzh-2`,term:`Quadratic Equation`,definition:`An equation of the form ax² + bx + c = 0 where the highest power is 2.`,termZh:`二次方程`,pinyin:`èrcì fāngchéng`,defZh:`形如 ax² + bx + c = 0 的方程，最高次幂为2。图形为抛物线。`},{id:`mzh-3`,term:`Variable`,definition:`A letter that represents an unknown value in an equation.`,termZh:`变量`,pinyin:`biànliàng`,defZh:`方程中代表未知数的字母，例如 x、y、n。`},{id:`mzh-4`,term:`Coefficient`,definition:`The number in front of a variable. In 3x, the coefficient is 3.`,termZh:`系数`,pinyin:`xìshù`,defZh:`变量前面的数字。在 3x 中，3 是 x 的系数。`},{id:`mzh-5`,term:`Gradient`,definition:`The steepness of a line. In y = mx + c, the gradient is m.`,termZh:`斜率`,pinyin:`xiélǜ`,defZh:`直线的倾斜程度。在 y = mx + c 中，m 是斜率。斜率越大，直线越陡。`},{id:`mzh-6`,term:`Simultaneous Equations`,definition:`Two or more equations with the same unknowns, solved together.`,termZh:`联立方程`,pinyin:`liánlì fāngchéng`,defZh:`含有相同未知数的两个或多个方程，需同时求解。`},{id:`mzh-7`,term:`Factorise`,definition:`To rewrite an expression as a product of its factors. E.g. x² + 5x + 6 = (x+2)(x+3)`,termZh:`因式分解`,pinyin:`yīnshì fēnjiě`,defZh:`将表达式改写为其因子之积。例：x² + 5x + 6 = (x+2)(x+3)`},{id:`mzh-8`,term:`Inequality`,definition:`A statement that two expressions are not equal using <, >, ≤, ≥.`,termZh:`不等式`,pinyin:`bùděngshì`,defZh:`使用 <、>、≤、≥ 表示两个表达式不相等的数学语句。`},{id:`mzh-9`,term:`Sequence`,definition:`An ordered list of numbers following a pattern.`,termZh:`数列`,pinyin:`shùliè`,defZh:`按照一定规律排列的有序数字列表。例：等差数列、等比数列。`},{id:`mzh-10`,term:`nth Term`,definition:`A formula using n to find any term in a sequence.`,termZh:`通项公式`,pinyin:`tōngxiàng gōngshì`,defZh:`用 n 来求数列中任意项的公式。例：第n项 = 3n + 2`},{id:`mzh-11`,term:`Expand`,definition:`To multiply out brackets. E.g. 3(x + 4) = 3x + 12`,termZh:`展开`,pinyin:`zhǎnkāi`,defZh:`将括号乘开。例：3(x + 4) = 3x + 12`},{id:`mzh-12`,term:`Substitute`,definition:`To replace a variable with a number. E.g. if x = 3, then 2x = 6`,termZh:`代入`,pinyin:`dàirù`,defZh:`用具体数字替换变量。例：若 x = 3，则 2x = 6`},{id:`mzh-13`,term:`Discriminant`,definition:`b² − 4ac in the quadratic formula. Determines the number of real solutions.`,termZh:`判别式`,pinyin:`pànbiéshì`,defZh:`二次公式中的 b² − 4ac。决定方程实数解的个数：正→两解，零→一解，负→无实数解。`},{id:`mzh-14`,term:`Arithmetic Sequence`,definition:`A sequence where each term increases by the same amount (common difference).`,termZh:`等差数列`,pinyin:`děngchā shùliè`,defZh:`每相邻两项之差相同的数列，这个差称为公差。例：3, 7, 11, 15（公差=4）`},{id:`mzh-15`,term:`Geometric Sequence`,definition:`A sequence where each term is multiplied by the same number (common ratio).`,termZh:`等比数列`,pinyin:`děngbǐ shùliè`,defZh:`每相邻两项之比相同的数列，这个比称为公比。例：2, 6, 18, 54（公比=3）`},{id:`mzh-16`,term:`Derivative`,definition:`The rate of change of a function. Found using dy/dx or f'(x).`,termZh:`导数`,pinyin:`dǎoshù`,defZh:`函数的变化率。用 dy/dx 或 f'(x) 表示。幂法则：若 y = xⁿ，则 dy/dx = nxⁿ⁻¹`},{id:`mzh-17`,term:`Integration`,definition:`The reverse of differentiation. Finds area under a curve.`,termZh:`积分`,pinyin:`jīfēn`,defZh:`微分的逆运算，用于求曲线下的面积。∫xⁿ dx = xⁿ⁺¹/(n+1) + C`},{id:`mzh-18`,term:`Stationary Point`,definition:`A point where the gradient = 0. Can be a maximum, minimum, or point of inflection.`,termZh:`驻点（极值点）`,pinyin:`zhùdiǎn (jí zhí diǎn)`,defZh:`导数为零的点，可以是极大值、极小值或拐点。令 dy/dx = 0 求解。`}],Da=[{id:`cszh-1`,term:`Algorithm`,definition:`A precise set of step-by-step instructions to solve a problem.`,termZh:`算法`,pinyin:`suànfǎ`,defZh:`解决问题的精确的逐步指令集合。算法必须有明确的起始和终止条件。`},{id:`cszh-2`,term:`Variable`,definition:`A named storage location that holds a value which can change.`,termZh:`变量`,pinyin:`biànliàng`,defZh:`存储可变值的命名内存位置。例：age = 16 将16存入名为age的变量中。`},{id:`cszh-3`,term:`Loop`,definition:`A control structure that repeats a block of code.`,termZh:`循环`,pinyin:`xúnhuán`,defZh:`重复执行代码块的控制结构。FOR循环（已知次数）；WHILE循环（条件判断）。`},{id:`cszh-4`,term:`Conditional Statement`,definition:`Code that makes a decision using IF/ELIF/ELSE.`,termZh:`条件语句`,pinyin:`tiáojiàn yǔjù`,defZh:`根据条件做出判断的代码结构，使用 IF/ELIF/ELSE 实现不同的执行路径。`},{id:`cszh-5`,term:`Function`,definition:`A reusable block of code that performs a specific task and returns a value.`,termZh:`函数`,pinyin:`hánshù`,defZh:`执行特定任务并返回值的可重用代码块。有助于代码的模块化和复用。`},{id:`cszh-6`,term:`Array`,definition:`A data structure that stores multiple values in one variable using indices.`,termZh:`数组`,pinyin:`shùzǔ`,defZh:`用索引存储多个值的数据结构。索引从0开始。例：array[0]是第一个元素。`},{id:`cszh-7`,term:`Binary`,definition:`Base-2 number system using only 0 and 1.`,termZh:`二进制`,pinyin:`èrjìnzhì`,defZh:`仅使用0和1的二进制数字系统（基数为2）。计算机底层使用二进制存储所有数据。`},{id:`cszh-8`,term:`Sorting Algorithm`,definition:`An algorithm that arranges data in a specific order.`,termZh:`排序算法`,pinyin:`páixù suànfǎ`,defZh:`将数据按特定顺序排列的算法。常见：冒泡排序（O(n²)）、归并排序（O(n log n)）。`},{id:`cszh-9`,term:`Boolean`,definition:`A data type with only two values: True or False.`,termZh:`布尔型`,pinyin:`bùěr xíng`,defZh:`只有两个值的数据类型：True（真）或 False（假）。用于条件判断和逻辑运算。`},{id:`cszh-10`,term:`Recursion`,definition:`When a function calls itself until a base case is reached.`,termZh:`递归`,pinyin:`dìguī`,defZh:`函数调用自身直到满足基本条件的技术。必须有终止条件，否则会无限循环。`},{id:`cszh-11`,term:`Data Type`,definition:`The category of a value: Integer, Float, String, Boolean.`,termZh:`数据类型`,pinyin:`shùjù lèixíng`,defZh:`值的类别：整数(Integer)、浮点数(Float)、字符串(String)、布尔型(Boolean)。`},{id:`cszh-12`,term:`Network`,definition:`A system of connected computers that can communicate and share resources.`,termZh:`网络`,pinyin:`wǎngluò`,defZh:`可以相互通信和共享资源的连接计算机系统。LAN（局域网）、WAN（广域网）。`}],Oa=[{id:`zhvoc-1`,term:`Hello / How are you?`,definition:`A common greeting used when meeting someone.`,termZh:`你好 / 你好吗？`,pinyin:`Nǐ hǎo / Nǐ hǎo ma?`,defZh:`见面时的常用问候语。回答：我很好，谢谢！(Wǒ hěn hǎo, xièxiè!)`},{id:`zhvoc-2`,term:`Thank you`,definition:`Expressing gratitude.`,termZh:`谢谢`,pinyin:`Xièxiè`,defZh:`表达感谢。正式说法：非常感谢 (Fēicháng gǎnxiè) = Thank you very much`},{id:`zhvoc-3`,term:`I / Me`,definition:`First person singular pronoun.`,termZh:`我`,pinyin:`Wǒ`,defZh:`第一人称代词。我 = I/me，我们 = We/us，你 = You，他/她 = He/She`},{id:`zhvoc-4`,term:`To eat / Eat`,definition:`The verb for eating food.`,termZh:`吃`,pinyin:`Chī`,defZh:`吃饭 (chīfàn) = to eat a meal. 你吃了吗？(Nǐ chī le ma?) = Have you eaten?`},{id:`zhvoc-5`,term:`Water`,definition:`The liquid essential for life.`,termZh:`水`,pinyin:`Shuǐ`,defZh:`一杯水 (yī bēi shuǐ) = a glass of water. 矿泉水 (kuàngquánshuǐ) = mineral water`},{id:`zhvoc-6`,term:`School`,definition:`An institution for learning.`,termZh:`学校`,pinyin:`Xuéxiào`,defZh:`学习的地方。小学 = primary school，中学 = secondary school，大学 = university`},{id:`zhvoc-7`,term:`Teacher`,definition:`A person who educates students.`,termZh:`老师`,pinyin:`Lǎoshī`,defZh:`教学生的人。also used as a respectful form of address: 王老师 = Teacher Wang`},{id:`zhvoc-8`,term:`Friend`,definition:`A person you have a close relationship with.`,termZh:`朋友`,pinyin:`Péngyǒu`,defZh:`关系亲密的人。好朋友 = good friend，新朋友 = new friend`},{id:`zhvoc-9`,term:`Family`,definition:`A group of related people.`,termZh:`家人 / 家庭`,pinyin:`Jiārén / Jiātíng`,defZh:`父母 (fùmǔ) = parents，兄弟 (xiōngdì) = brother，姐妹 (jiěmèi) = sister，爷爷/奶奶 = grandparents`},{id:`zhvoc-10`,term:`Happy`,definition:`Feeling joy or pleasure.`,termZh:`高兴 / 开心`,pinyin:`Gāoxìng / Kāixīn`,defZh:`感到喜悦。非常高兴见到你！(Fēicháng gāoxìng jiàn dào nǐ!) = Very happy to meet you!`},{id:`zhvoc-11`,term:`Number (1–10)`,definition:`Basic counting numbers in Chinese.`,termZh:`一二三四五六七八九十`,pinyin:`Yī èr sān sì wǔ liù qī bā jiǔ shí`,defZh:`1=一，2=二，3=三，4=四，5=五，6=六，7=七，8=八，9=九，10=十。11=十一，20=二十`},{id:`zhvoc-12`,term:`Where is...?`,definition:`Asking about location.`,termZh:`…在哪里？`,pinyin:`...zài nǎlǐ?`,defZh:`厕所在哪里？= Where is the toilet? 图书馆在哪里？= Where is the library?`},{id:`zhvoc-13`,term:`How much does it cost?`,definition:`Asking the price of something.`,termZh:`多少钱？`,pinyin:`Duōshǎo qián?`,defZh:`购物时询问价格。太贵了！(Tài guì le!) = Too expensive! 便宜点吧 (Piányí diǎn ba) = Can you lower the price?`},{id:`zhvoc-14`,term:`I don't understand`,definition:`Expressing that you cannot comprehend something.`,termZh:`我不明白 / 我 Answer:`Mean = (6 + 9 + 12 + 7 + 11) ÷ 5 = 45 ÷ 5 = 9.`,markingPoints:[`Sum = 45`,`Mean = 9`]},{id:`sm8`,subjectId:`maths`,type:`short`,points:2,question:`Factorise fully: 6x² + 9x.`,sampleAnswer:`3x(2x + 3)`,markingPoints:[`Common factor 3x taken out`,`3x(2x + 3)`]},{id:`sm9`,subjectId:`maths`,type:`short`,points:2,question:`Express 0.000047 in standard form.`,sampleAnswer:`4.7 × 10⁻⁵`,markingPoints:[`4.7 × 10⁻⁵`]},{id:`sm10`,subjectId:`maths`,type:`short`,points:2,question:`A car travels 150 miles in 2.5 hours. Calculate its average speed.`,sampleAnswer:`Speed = 150 ÷ 2.5 = 60 mph.`,markingPoints:[`Speed = distance ÷ time`,`60 mph`]},{id:`sel1`,subjectId:`english-lang`,type:`short`,points:2,question:`Identify the technique used in: 'The wind whispered through the trees.' Explain its effect in two sentences.`,sampleAnswer:`Personification — the wind is given the human ability to whisper. This creates a quiet, mysterious atmosphere as though nature itself is communicating.`,markingPoints:[`Correctly identifies personification`,`Explains the atmospheric or emotive effect`]},{id:`sel2`,subjectId:`english-lang`,type:`short`,points:2,question:`What is the difference between a simile and a metaphor? Give one example of each.`,sampleAnswer:`A simile compares using 'like' or 'as' (e.g. 'as brave as a lion'). A metaphor says something IS something else (e.g. 'he was a lion in battle').`,markingPoints:[`Correct definition of simile with example`,`Correct definition of metaphor with example`]},{id:`sel3`,subjectId:`english-lang`,type:`short`,points:2,question:`From the phrase 'She sat alone, her hands trembling,' what can we infer about the character?`,sampleAnswer:`We can infer she is nervous, frightened or emotionally distressed. The trembling hands suggest a physical response to a strong emotion.`,markingPoints:[`Valid inference (nervous/scared/distressed)`,`Linked to evidence from the phrase`]},{id:`sel4`,subjectId:`english-lang`,type:`short`,points:2,question:`Give two features of a formal letter that distinguish it from an informal one.`,sampleAnswer:`Formal letters use a professional address/date at the top, formal salutation ('Dear Sir/Madam'), formal register, and sign off 'Yours faithfully/sincerely'.`,markingPoints:[`One valid formal feature`,`Second distinct formal feature`]},{id:`sel5`,subjectId:`english-lang`,type:`short`,points:2,question:`What is the effect of using a rhetorical question in a persuasive text?`,sampleAnswer:`A rhetorical question engages the reader directly, making them consider an idea without expecting a reply. It creates emphasis and nudges the reader toward the writer's viewpoint.`,markingPoints:[`Engages/involves the reader`,`Creates emphasis or persuasive effect`]},{id:`sel6`,subjectId:`english-lang`,type:`short`,points:2,question:`What technique is being used in: 'The massive, monstrous, menacing machine'?`,sampleAnswer:`Alliteration — the repetition of the 'm' sound at the start of multiple words. This creates a heavy, threatening rhythm that emphasises the machine's dangerous nature.`,markingPoints:[`Identifies alliteration`,`Effect: threatening/heavy/emphasises danger`]},{id:`slit1`,subjectId:`english-lit`,type:`short`,points:2,question:`How does Shakespeare present Lady Macbeth as ambitious in Act 1? Use one quotation.`,sampleAnswer:`Lady Macbeth calls on supernatural spirits to 'unsex me here' and 'fill me from the crown to the toe top-full of direst cruelty.' This shows her extreme ambition — she wants to rid herself of any compassion that might prevent her from seizing power.`,markingPoints:[`Valid quotation from Act 1`,`Linked to theme of ambition with explanation`]},{id:`slit2`,subjectId:`english-lit`,type:`short`,points:2,question:`What does the dagger hallucination in Macbeth suggest about his mental state?`,sampleAnswer:`The dagger hallucination suggests Macbeth is suffering profound guilt and psychological anxiety before the murder. It shows his tortured conscience making him see things that aren't real.`,markingPoints:[`Identifies hallucination as psychological/guilt-related`,`Links to mental deterioration or tortured conscience`]},{id:`slit3`,subjectId:`english-lit`,type:`short`,points:2,question:`State two ways in which the Jacobean audience would have found Macbeth shocking.`,sampleAnswer:`Killing a king violated the Divine Right of Kings — a sin against God. Additionally, showing witches on stage tapped into very real contemporary fears about the supernatural, especially given King James I's obsession with witchcraft.`,markingPoints:[`Regicide violating Divine Right`,`Witchcraft being a genuine contemporary fear`]},{id:`sbio1`,subjectId:`biology`,type:`short`,points:2,question:`State two differences between a plant cell and an animal cell.`,sampleAnswer:`Plant cells have a cell wall (made of cellulose) and chloroplasts; animal cells do not. Plant cells also have a permanent vacuole, which animal cells lack.`,markingPoints:[`Cell wall / chloroplasts absent in animal cells`,`Permanent vacuole absent in animal cells`]},{id:`sbio2`,subjectId:`biology`,type:`short`,points:2,question:`Describe what happens during osmosis.`,sampleAnswer:`Osmosis is the movement of water molecules from a region of higher water potential (more dilute) to a region of lower water potential (more concentrated) through a partially permeable membrane.`,markingPoints:[`Water moves down concentration gradient`,`Through partially permeable membrane`]},{id:`sbio3`,subjectId:`biology`,type:`short`,points:2,question:`What is the function of mitochondria in a cell?`,sampleAnswer:`Mitochondria are the site of aerobic respiration. They produce ATP (energy) from glucose and oxygen, providing energy for all cellular processes.`,markingPoints:[`Site of aerobic respiration`,`Produces ATP/energy`]},{id:`sbio4`,subjectId:`biology`,type:`short`,points:2,question:`Give two ways the digestive system is adapted to absorb nutrients efficiently.`,sampleAnswer:`The small intestine has villi and microvilli that massively increase surface area for absorption. Additionally, a rich blood supply maintains the concentration gradient for rapid diffusion.`,markingPoints:[`Villi/microvilli increase surface area`,`Rich blood supply maintains concentration gradient`]},{id:`sbio5`,subjectId:`biology`,type:`short`,points:2,question:`State the word equation for aerobic respiration.`,sampleAnswer:`Glucose + Oxygen → Carbon dioxide + Water (+ energy released as ATP).`,markingPoints:[`Correct reactants (glucose + oxygen)`,`Correct products (CO₂ + water)`]},{id:`sch1`,subjectId:`chemistry`,type:`short`,points:2,question:`An element has 11 protons and a mass number of 23. How many neutrons and electrons does a neutral atom have?`,sampleAnswer:`Neutrons = 23 − 11 = 12. Electrons = 11 (same as protons in a neutral atom).`,markingPoints:[`Neutrons = 12`,`Electrons = 11`]},{id:`sch2`,subjectId:`chemistry`,type:`short`,points:2,question:`Describe what happens when sodium reacts with water.`,sampleAnswer:`Sodium floats on the water and reacts vigorously, producing hydrogen gas and sodium hydroxide solution. The heat produced may ignite the hydrogen, causing it to burn with a small flame.`,markingPoints:[`Produces hydrogen gas`,`Produces sodium hydroxide / exothermic / vigorous reaction`]},{id:`sch3`,subjectId:`chemistry`,type:`short`,points:2,question:`What is the difference between an ionic bond and a covalent bond?`,sampleAnswer:`Ionic bonding involves the transfer of electrons between a metal and non-metal, forming oppositely charged ions attracted by electrostatic forces. Covalent bonding involves the sharing of electrons between two non-metals.`,markingPoints:[`Ionic: electron transfer, between metal and non-metal`,`Covalent: electron sharing, between non-metals`]},{id:`sch4`,subjectId:`chemistry`,type:`short`,points:2,question:`What does pH measure and what are the pH values for acids, neutral, and alkalis?`,sampleAnswer:`pH measures hydrogen ion concentration. Acids have pH below 7, neutral substances have pH = 7, and alkalis have pH above 7.`,markingPoints:[`pH measures H⁺ ion concentration`,`Correct classification: acid <7, neutral = 7, alkali >7`]},{id:`sphy1`,subjectId:`physics`,type:`short`,points:2,question:`A force of 450 N acts on a 90 kg object. Calculate the acceleration.`,sampleAnswer:`a = F ÷ m = 450 ÷ 90 = 5 m/s².`,markingPoints:[`Uses F = ma correctly`,`a = 5 m/s²`]},{id:`sphy2`,subjectId:`physics`,type:`short`,points:2,question:`State Newton's Third Law and give a real-life example.`,sampleAnswer:`For every action, there is an equal and opposite reaction. Example: when you push on the ground with your feet, the ground pushes back upwards on you with equal force.`,markingPoints:[`Correct statement of Third Law`,`Valid real-life example`]},{id:`sphy3`,subjectId:`physics`,type:`short`,points:2,question:`A wave has frequency 50 Hz and wavelength 4 m. Calculate its wave speed.`,sampleAnswer:`v = f × λ = 50 × 4 = 200 m/s.`,markingPoints:[`Uses v = fλ correctly`,`v = 200 m/s`]},{id:`sphy4`,subjectId:`physics`,type:`short`,points:2,question:`What is the difference between series and parallel circuits?`,sampleAnswer:`In a series circuit, components are connected in one loop — current is the same everywhere but voltage is shared. In a parallel circuit, components are on separate branches — voltage is the same across each branch but current splits.`,markingPoints:[`Series: same current, shared voltage`,`Parallel: same voltage, split current`]},{id:`shi1`,subjectId:`history`,type:`short`,points:2,question:`Give two reasons why hyperinflation occurred in Germany in 1923.`,sampleAnswer:`Germany printed more money to pay war reparations (following the French and Belgian occupation of the Ruhr after Germany defaulted), causing the currency to collapse in value.`,markingPoints:[`Government printed excessive money`,`Reparations burden / Ruhr occupation`]},{id:`shi2`,subjectId:`history`,type:`short`,points:2,question:`What was the significance of the Reichstag Fire of 1933 for Hitler's rise to power?`,sampleAnswer:`Hitler used the fire to claim a communist uprising was planned. He pressured Hindenburg to sign the Reichstag Fire Decree, suspending civil liberties and allowing mass arrests of communist opponents.`,markingPoints:[`Used to justify emergency decree/suspension of civil liberties`,`Enabled arrest of political opponents`]},{id:`sec1`,subjectId:`economics`,type:`short`,points:2,question:`Define opportunity cost and give an example.`,sampleAnswer:`Opportunity cost is the value of the next best alternative foregone when making a decision. For example, if the government spends £5bn on hospitals, the opportunity cost might be new schools that could have been built instead.`,markingPoints:[`Correct definition: next best alternative forgone`,`Valid economic example`]},{id:`sec2`,subjectId:`economics`,type:`short`,points:2,question:`What happens to the demand curve if consumers' incomes rise (for a normal good)?`,sampleAnswer:`The demand curve shifts rightward (increases). With higher income, consumers can afford to buy more of the good at every price level.`,markingPoints:[`Demand curve shifts right`,`Because consumers can afford more / income effect`]},{id:`sbus1`,subjectId:`business`,type:`short`,points:2,question:`What are the four elements of the Marketing Mix (4Ps)?`,sampleAnswer:`Product, Price, Place, and Promotion. Together they form the strategy a business uses to market its goods or services to customers.`,markingPoints:[`All four Ps named correctly`,`Brief explanation of mix concept`]},{id:`sbus2`,subjectId:`business`,type:`short`,points:2,question:`Explain the difference between fixed costs and variable costs.`,sampleAnswer:`Fixed costs stay the same regardless of output level (e.g. rent, salaries). Variable costs change directly with output (e.g. raw materials, packaging).`,markingPoints:[`Fixed costs: don't change with output, example`,`Variable costs: change with output, example`]}],Xa=[{id:`lm1`,subjectId:`maths`,type:`long`,points:3,question:`A car travels 90 miles at 60 mph then a further 60 miles at 40 mph. Calculate the total journey time and the average speed for the whole journey.`,sampleAnswer:`Time 1 = 90/60 = 1.5 hrs. Time 2 = 60/40 = 1.5 hrs. Total time = 3 hrs. Total distance = 150 miles. Average speed = 150/3 = 50 mph.`,markingPoints:[`Correct time for each leg`,`Total time = 3 hours`,`Average speed = 50 mph`]},{id:`lm2`,subjectId:`maths`,type:`long`,points:3,question:`Solve the simultaneous equations: 3x + 2y = 17 and 5x − 2y = 7. Show all working.`,sampleAnswer:`Adding both equations: 8x = 24, x = 3. Substituting: 3(3) + 2y = 17, 9 + 2y = 17, 2y = 8, y = 4. Solution: x = 3, y = 4.`,markingPoints:[`Correct elimination step`,`x = 3`,`y = 4`]},{id:`lm3`,subjectId:`maths`,type:`long`,points:3,question:`The circumference of a circle is 62.8 cm. Find the radius and then the area of the circle. Give answers to 1 decimal place. (π ≈ 3.14)`,sampleAnswer:`C = 2πr → 62.8 = 2 × 3.14 × r → r = 62.8/6.28 = 10 cm. Area = πr² = 3.14 × 100 = 314.0 cm².`,markingPoints:[`Correctly uses C = 2πr to find radius = 10 cm`,`Correctly uses A = πr²`,`Area = 314.0 cm²`]},{id:`lm4`,subjectId:`maths`,type:`long`,points:3,question:`Using the quadratic formula, solve: 2x² + 5x − 3 = 0. Give your answers to 2 decimal places.`,sampleAnswer:`a=2, b=5, c=−3. Discriminant = 25 + 24 = 49. x = (−5 ± 7)/4. x = 2/4 = 0.5 or x = −12/4 = −3.`,markingPoints:[`Correctly identifies a, b, c and uses formula`,`x = 0.5`,`x = −3`]},{id:`lel1`,subjectId:`english-lang`,type:`long`,points:3,question:`Analyse the effect of the following sentence: 'The old house stood like a broken tooth against the grey November sky.' Comment on technique, effect, and what it suggests about the setting.`,sampleAnswer:`The simile 'like a broken tooth' is striking — it's an unexpected, uncomfortable comparison that suggests decay, ugliness, and damage. The house is personified as wounded. The 'grey November sky' creates a cold, desolate atmosphere that reinforces the sense of abandonment. Together, these create a tone of menace and neglect.`,markingPoints:[`Identifies technique (simile) correctly`,`Explains the effect: decay/ugliness/discomfort`,`Comments on atmosphere created by the wider sentence`]},{id:`lel2`,subjectId:`english-lang`,type:`long`,points:3,question:`Explain three features of persuasive writing and why each one is effective.`,sampleAnswer:`1) Rhetorical questions engage readers directly, making them feel involved and nudging agreement. 2) Emotive language creates strong feelings (e.g. 'innocent victims') that bypass rational thinking. 3) Facts and statistics lend authority and make the argument seem evidence-based.`,markingPoints:[`First feature clearly explained with effect`,`Second feature clearly explained with effect`,`Third feature clearly explained with effect`]},{id:`lel3`,subjectId:`english-lang`,type:`long`,points:3,question:`What makes narrative writing effective? Explain three key techniques a writer should use to engage their reader.`,sampleAnswer:`Effective narrative uses: 1) A strong opening that hooks the reader (in medias res, intriguing character, mystery). 2) Vivid descriptive language using figurative techniques to help readers visualise the world. 3) Carefully paced structure with tension, revelation or turning points to maintain engagement.`,markingPoints:[`Technique 1 named and explained effectively`,`Technique 2 named and explained effectively`,`Technique 3 named and explained effectively`]},{id:`llit1`,subjectId:`english-lit`,type:`long`,points:3,question:`How does Shakespeare use the witches in Act 1 of Macbeth to establish the theme of appearance vs reality? Refer to specific language.`,sampleAnswer:`The witches open with the paradox 'Fair is foul, and foul is fair' — establishing immediately that things are not what they seem. Their ambiguous prophecies appear promising but conceal destruction, embodying the theme. The word 'fair' connotes beauty and truth while 'foul' suggests corruption; by conflating them, Shakespeare signals that the morally good and evil will be indistinguishable.`,markingPoints:[`References 'Fair is foul' paradox correctly`,`Explains what the paradox means thematically`,`Close language analysis of specific words`]},{id:`llit2`,subjectId:`english-lit`,type:`long`,points:3,question:`How does Shakespeare present Macbeth's psychological deterioration between Act 2 and Act 5?`,sampleAnswer:`In Act 2, Macbeth is wracked with guilt — hallucinating the dagger and unable to say 'Amen.' By Act 3, he orders Banquo's murder with cold efficiency. By Act 5, he is nihilistic — 'Life is a tale told by an idiot.' This arc shows ambition destroying his humanity and moral compass.`,markingPoints:[`Reference to Act 2 with evidence`,`Reference to middle acts showing escalation`,`Reference to Act 5 showing complete moral collapse`]},{id:`lbio1`,subjectId:`biology`,type:`long`,points:3,question:`Describe the role of enzymes in digestion, including where specific enzymes act and what they break down.`,sampleAnswer:`Amylase (produced in the salivary glands and pancreas) breaks down starch into sugars in the mouth and small intestine. Proteases (e.g. pepsin in the stomach) break down proteins into amino acids. Lipase (from the pancreas) breaks down lipids into fatty acids and glycerol in the small intestine.`,markingPoints:[`Amylase: location and substrate/product`,`Protease: location and substrate/product`,`Lipase: location and substrate/product`]},{id:`lbio2`,subjectId:`biology`,type:`long`,points:3,question:`Explain the process of natural selection using an example.`,sampleAnswer:`Natural selection occurs when variation exists in a population. Individuals with advantageous traits (e.g. antibiotic-resistant bacteria) are more likely to survive, reproduce, and pass on their advantageous alleles. Over generations, the proportion with the advantageous trait increases. Example: bacteria with random mutations for antibiotic resistance survive treatment and reproduce, making the whole population resistant.`,markingPoints:[`Variation exists in population`,`Those with advantageous traits survive and reproduce more`,`Advantageous traits inherited by offspring over generations`]},{id:`lch1`,subjectId:`chemistry`,type:`long`,points:3,question:`Explain how ionic bonds are formed between sodium and chlorine to form sodium chloride. Include details about electron transfer.`,sampleAnswer:`Sodium (atomic number 11) has one outer electron; chlorine has seven outer electrons and needs one more to complete its shell. Sodium transfers its outer electron to chlorine. Sodium becomes Na⁺ (positive ion) and chlorine becomes Cl⁻ (negative ion). The oppositely charged ions are held together by strong electrostatic attraction — this is the ionic bond.`,markingPoints:[`Sodium loses one electron → Na⁺`,`Chlorine gains one electron → Cl⁻`,`Electrostatic attraction between opposite ions`]},{id:`lch2`,subjectId:`chemistry`,type:`long`,points:3,question:`Describe and explain the trend in reactivity down Group 1 (alkali metals). Refer to electron structure.`,sampleAnswer:`Reactivity increases down Group 1 (Li < Na < K < Rb). As you go down, each element has more electron shells — the outer electron is further from the nucleus and shielded by more inner electrons. This means the nuclear attraction on the outer electron is weaker, so it is lost more easily in reactions, making the element more reactive.`,markingPoints:[`Reactivity increases down Group 1`,`More electron shells / outer electron further from nucleus`,`Less nuclear attraction / more shielding → easier to lose electron`]},{id:`lph1`,subjectId:`physics`,type:`long`,points:3,question:`A ball is dropped from rest and falls freely for 3 seconds (g = 10 m/s²). Calculate the velocity after 3 seconds and the distance fallen. Show all working.`,sampleAnswer:`v = u + at = 0 + 10 × 3 = 30 m/s. Distance: s = ut + ½at² = 0 + ½ × 10 × 9 = 45 m.`,markingPoints:[`v = 30 m/s using v = u + at`,`Uses s = ut + ½at²`,`s = 45 m`]},{id:`lph2`,subjectId:`physics`,type:`long`,points:3,question:`Explain what is meant by terminal velocity and how a falling skydiver reaches it. Describe what happens to forces during the fall.`,sampleAnswer:`When a skydiver first jumps, gravity (weight) is much larger than air resistance, so they accelerate downwards. As speed increases, air resistance increases too. Eventually, air resistance equals weight — the resultant force is zero. By Newton's First Law, the skydiver then continues at constant velocity: this is terminal velocity.`,markingPoints:[`Initially weight > air resistance → acceleration`,`As speed increases, air resistance increases`,`At terminal velocity: air resistance = weight, resultant force = 0, constant speed`]},{id:`lhi1`,subjectId:`history`,type:`long`,points:3,question:`Explain why the Weimar Republic was unstable in its early years (1919–1923). Give three specific reasons.`,sampleAnswer:`1) The 'stab in the back' myth led many Germans to distrust the new government, which had signed the humiliating Armistice. 2) The harsh Treaty of Versailles — reparations, loss of territory, military restrictions — caused economic strain and national resentment. 3) Proportional representation led to fragile coalition governments that struggled to take decisive action, making the Republic seem weak.`,markingPoints:[`Stab in the back / lack of legitimacy`,`Treaty of Versailles burdens`,`Proportional representation / political instability`]},{id:`lec1`,subjectId:`economics`,type:`long`,points:3,question:`Explain using a diagram what happens to price and quantity when the government imposes a tax on a good. What are the effects on consumers and producers?`,sampleAnswer:`A tax shifts the supply curve leftward (tax = added cost to producers). This raises the equilibrium price and reduces the equilibrium quantity. Consumers pay a higher price; producers receive less per unit after the tax. The tax revenue goes to government. There is a welfare loss (deadweight loss) as fewer mutually beneficial transactions occur.`,markingPoints:[`Supply curve shifts left / price rises / quantity falls`,`Consumers pay higher price`,`Producers receive less (after tax) / deadweight loss mentioned`]},{id:`lbu1`,subjectId:`business`,type:`long`,points:3,question:`Analyse the advantages and disadvantages of a business using penetration pricing when launching a new product.`,sampleAnswer:`Advantages: A low initial price attracts a large market share quickly, undercutting competitors and getting consumers to try the product. It can also deter new entrants. Disadvantages: Low prices reduce profit margins initially, which may not cover launch costs. When prices are raised later, brand-loyal customers may react negatively. The product may also be seen as low-quality.`,markingPoints:[`At least one clear advantage explained`,`At least one clear disadvantage explained`,`Both sides evaluated in context`]}],Za=[{id:`ees1`,subjectId:`english-lit`,type:`essay`,points:12,minWords:300,question:`How does Shakespeare present the theme of ambition in Macbeth? Explore how this theme is developed through characters, language, and dramatic structure.`,sampleAnswer:`Shakespeare presents ambition as a destructive force that corrupts even honourable men. Macbeth begins as a 'brave' and 'valiant' warrior — his ambition is initially modest. However, the witches' prophecies awaken his 'vaulting ambition' (Act 1, Sc 7), and Lady Macbeth accelerates this by attacking his masculinity. The word 'vaulting' is crucial — it suggests ambition that leaps beyond reason and control...`,keyPoints:[`Ambition presented as destructive/corrupting force`,`Analysis of Macbeth's character change`,`Role of Lady Macbeth in accelerating ambition`,`Key quotations analysed with language focus`,`How the play's structure shows consequences of ambition`]},{id:`ees2`,subjectId:`english-lit`,type:`essay`,points:12,minWords:300,question:`How does Shakespeare present the relationship between Macbeth and Lady Macbeth? How does it change throughout the play?`,sampleAnswer:`At the start, Lady Macbeth appears to be the dominant partner — she reads his letter and immediately plans to 'chastise' his 'milk of human kindness.' She uses emotional manipulation and gender-based insults to push him toward murder...`,keyPoints:[`Lady Macbeth dominant in Act 1`,`Manipulation through gender and emotion`,`Their relationship after Duncan's murder`,`Macbeth becomes more independent and cold`,`Lady Macbeth's psychological breakdown in Act 5`]},{id:`ees3`,subjectId:`english-lit`,type:`essay`,points:12,minWords:300,question:`How does the context of Jacobean England shape the themes and dramatic impact of Macbeth? Consider witchcraft, the divine right of kings, and contemporary anxieties.`,sampleAnswer:`Written in 1606, Macbeth speaks directly to Jacobean preoccupations. King James I had written Daemonologie about witchcraft, making the three witches immediately relevant and frightening...`,keyPoints:[`King James I and witchcraft context`,`Divine Right of Kings / regicide as ultimate sin`,`Gunpowder Plot of 1605 / political anxiety`,`Great Chain of Being disrupted`,`How context heightens dramatic impact`]},{id:`eel1`,subjectId:`english-lang`,type:`essay`,points:12,minWords:350,question:`Write a vivid descriptive piece about a place that holds a special memory for you. Use a range of language techniques.`,sampleAnswer:`The old bookshop smells of stories — of yellowed pages and ambition. It is small and overcrowded, every shelf groaning under the weight of a thousand imagined worlds...`,keyPoints:[`Engages the senses (sight, smell, sound, touch)`,`Uses figurative language (metaphor, simile, personification)`,`Creates a clear atmosphere/mood`,`Varied sentence structures for effect`,`Shows rather than tells`]},{id:`eel2`,subjectId:`english-lang`,type:`essay`,points:12,minWords:350,question:`Write a persuasive article for a school magazine arguing that schools should reduce homework and invest more in physical activity. Include evidence and rhetorical devices.`,sampleAnswer:`Every evening, across the country, students sit hunched over desks, sacrificing sleep, social connection, and sunshine for worksheets. But what if this mountain of homework is making us worse, not better?...`,keyPoints:[`Clear thesis/argument maintained throughout`,`Uses rhetorical questions and direct address`,`Includes evidence or statistics (can be invented)`,`Considers counter-argument and refutes it`,`Varied persuasive techniques: rule of three, anecdote, emotive language`]},{id:`ehi1`,subjectId:`history`,type:`essay`,points:15,minWords:400,question:`To what extent was the Great Depression the main reason for Hitler's rise to power by 1933? Consider multiple factors in your response.`,sampleAnswer:`The Great Depression was certainly the single most important factor enabling Hitler's rise to power. Before 1929, the Nazi Party had only 2.6% of the vote. But with 6 million unemployed by 1932, desperate Germans turned to extremist solutions...`,keyPoints:[`The Great Depression as primary cause`,`Nazi propaganda and ideology (Goebbels' role)`,`Weaknesses of Weimar Republic (proportional representation)`,`Von Papen/Hindenburg miscalculation`,`Nazi street violence and intimidation`,`Balanced conclusion evaluating relative importance`]},{id:`ehi2`,subjectId:`history`,type:`essay`,points:15,minWords:400,question:`How did Nazi Germany control and manipulate its population between 1933 and 1939? Evaluate the methods used.`,sampleAnswer:`The Nazi regime maintained control through a combination of propaganda, fear, indoctrination, and terror. Goebbels' Ministry of Propaganda controlled all media — newspapers, radio, film — projecting an image of a unified, strong Germany...`,keyPoints:[`Propaganda and media control (Goebbels)`,`Terror and fear (SS, Gestapo, concentration camps)`,`Youth indoctrination (Hitler Youth, League of German Girls)`,`Legal changes removing freedoms (Enabling Act)`,`Volksgemeinschaft and appealing to national pride`]},{id:`eec1`,subjectId:`economics`,type:`essay`,points:15,minWords:400,question:`Evaluate the view that free market economies always lead to better economic outcomes than planned economies. Use economic theory and real-world examples.`,sampleAnswer:`Free market economies, where prices are determined by supply and demand with minimal government intervention, have produced remarkable growth in countries like the United States and Singapore. However, they also generate significant inequalities and market failures...`,keyPoints:[`Advantages of free markets: efficiency, consumer choice, innovation, price signals`,`Disadvantages: inequality, market failure, public goods underprovision`,`Advantages of planned economies: equity, stability in essentials`,`Real-world examples (USSR collapse, Scandinavian mixed economies)`,`Balanced conclusion: most economies are mixed`]},{id:`ebio1`,subjectId:`biology`,type:`essay`,points:12,minWords:300,question:`Discuss the ethical issues surrounding the use of embryonic stem cells in medical research and treatment. Consider both sides of the argument.`,sampleAnswer:`Stem cells have extraordinary potential — they can theoretically develop into any cell type in the body, offering treatments for conditions like Parkinson's, diabetes, and spinal injury. However, using embryonic stem cells raises profound ethical questions...`,keyPoints:[`Medical benefits of stem cell therapy`,`Embryonic stem cells: ethical objections (destruction of embryo)`,`Counter-arguments: embryos from IVF would be discarded anyway`,`Adult stem cells as alternative`,`Regulation and ethical oversight needed`,`Personal viewpoint acknowledged`]},{id:`emth1`,subjectId:`maths`,type:`essay`,points:10,minWords:250,question:`Explain, using examples, how quadratic equations can be solved using three different methods. Discuss which method is most efficient in different situations.`,sampleAnswer:`Quadratic equations (ax² + bx + c = 0) can be solved by factorising, completing the square, or using the quadratic formula. Factorising is fastest when the equation factors neatly into integers...`,keyPoints:[`Factorising: method explained with example`,`Completing the square: method explained with example`,`Quadratic formula: method explained with correct formula`,`Comparison of when each method is most efficient`,`Discriminant mentioned and its significance explained`]}];function Qa(e,t,n,r){let i=t=>e.length===0?t:t.filter(t=>e.includes(t.subjectId)),a=e=>[...e].sort(()=>Math.random()-.5);return{shorts:a(i(Ya)).slice(0,t),longs:a(i(Xa)).slice(0,n),essays:a(i(Za)).slice(0,r)}}var $a={30:{mc:10,short:3,long:2,essay:0},60:{mc:20,short:7,long:5,essay:1},90:{mc:30,short:15,long:7,essay:2},120:{mc:50,short:20,long:10,essay:3}},eo={mcq:.67,short:3,long:6,essay:20};function to(e,t){return{mc:Math.max(0,Math.round(e*t.mcq/100/eo.mcq)),short:Math.max(0,Math.round(e*t.short/100/eo.short)),long:Math.max(0,Math.round(e*t.long/100/eo.long)),essay:Math.max(0,Math.round(e*t.essay/100/eo.essay))}}function no(e,t){let n=L.filter(t=>e.length===0||e.includes(t.id)),r=[];n.forEach(e=>{e.topics.forEach(t=>{t.subtopics.forEach(t=>{(da[t.id]??[]).forEach(t=>{r.push({id:t.id,type:`mcq`,subjectName:e.name,question:t.question,options:t.options,correctAnswer:t.correctAnswer,explanation:t.explanation,points:1})})})})});let i=e=>[...e].sort(()=>Math.random()-.5),a=i(r).slice(0,t.mc),{shorts:o,longs:s,essays:c}=Qa(e,t.short,t.long,t.essay),l=o.map(t=>({id:t.id,type:`short`,subjectName:e.length===0?`General`:n.find(e=>e.id===t.subjectId)?.name??t.subjectId,question:t.question,sampleAnswer:t.sampleAnswer,markingPoints:t.markingPoints,points:2})),u=s.map(e=>({id:e.id,type:`long`,subjectName:n.find(t=>t.id===e.subjectId)?.name??e.subjectId,question:e.question,sampleAnswer:e.sampleAnswer,markingPoints:e.markingPoints,points:3})),d= ast one counter is red.`,markScheme:`P(at least one red) = 1 − P(no red) = 1 − (7/12 × 6/11) = 1 − 42/132 = 90/132 = 15/22 [3]`}],markScheme:`See parts above.`},{id:`maths25p3-3`,number:`3`,type:`calculation`,marks:10,question:`Graphs and Functions:

(a) Write a recursive pseudocode function FIBONACCI(n) that returns the nth Fibonacci number.
(b) Trace the execution of FIBONACCI(4), showing all recursive calls.
(c) State one advantage and one disadvantage of using recursion to solve this problem.
(d) Rewrite the algorithm using iteration instead of recursion.`,markScheme:`(a) FUNCTION FIBONACCI(n : INTEGER) RETURNS INTEGER
  IF n <= 1 THEN RETURN n [1 for base cases]
  ELSE RETURN FIBONACCI(n-1) + FIBONACCI(n-2) [2 for recursive call]
ENDFUNCTION

(b) FIBONACCI(4)
 = FIBONACCI(3) + FIBONACCI(2)
 = [FIBONACCI(2)+FIBONACCI(1)] + [FIBONACCI(1)+FIBONACCI(0)]
 = [[FIBONACCI(1)+FIBONACCI(0)]+1] + [1+0]
 = [[1+0]+1] + 1 = [1+1]+1 = 3 [2 marks for correct trace]

(c) Advantage: code is simpler/more elegant [1]; Disadvantage: exponential time complexity O(2^n), very slow for large n; risk of stack overflow [1]
