<p><strong>Strategy:</strong> Identify each face, find its area individually, then add. Drawing a net (unfolded shape) helps visualise this.</p>`,quickCheck:{question:`A cube has side length 4 cm. What is the total surface area?`,options:[`24 cm²`,`64 cm²`,`96 cm²`,`192 cm²`],correct:2,explanation:`A cube has 6 square faces, each with area 4² = 16 cm². Total = 6 × 16 = 96 cm².`}}]},pythagoras:{estimatedMinutes:14,keyPoints:[`Pythagoras only works on right-angled triangles`,`a² + b² = c², where c is always the hypotenuse (longest side, opposite the right angle)`,`To find hypotenuse: c = √(a² + b²)`,`To find a shorter side: a = √(c² − b²)`],sections:[{title:`The Theorem — Understanding It`,content:`<p><strong>Pythagoras' Theorem</strong> says: in any right-angled triangle, the square on the hypotenuse equals the sum of the squares on the other two sides.</p>
<div class="formula-box">a² + b² = c²</div>
<p>The <strong>hypotenuse (c)</strong> is always the side <em>opposite the right angle</em> — it's always the longest side.</p>
<p>Why does this work? The areas of the two smaller squares literally equal the area of the biggest square. It's one of the most beautiful facts in maths!</p>
<p><strong>Pythagorean triples</strong> — memorise these, they come up a lot:</p>
<ul>
  <li><strong>3, 4, 5</strong> (since 9 + 16 = 25)</li>
  <li><strong>5, 12, 13</strong></li>
  <li><strong>8, 15, 17</strong></li>
</ul>`,quickCheck:{question:`In a right-angled triangle, which side is the hypotenuse?`,options:[`The longest side`,`The side opposite the right angle`,`Both A and B — they're the same side`,`The shortest side`],correct:2,explanation:`The hypotenuse is BOTH the longest side AND the side opposite the right angle — these always describe the same side.`}},{title:`Finding the Hypotenuse`,content:`<p>When finding the hypotenuse (c), we add the squares and then square root.</p>
<p><strong>Example:</strong> Find the hypotenuse of a right-angled triangle with legs 6 cm and 8 cm.</p>
<div class="formula-box">c² = 6² + 8²<br/>c² = 36 + 64 = 100<br/>c = √100 = 10 cm</div>
<p>This is a 6-8-10 triple (a scaled version of 3-4-5).</p>
<p><strong>Another example:</strong> Legs of 5 cm and 9 cm.</p>
<div class="formula-box">c² = 25 + 81 = 106<br/>c = √106 ≈ 10.3 cm (1 d.p.)</div>`,quickCheck:{question:`A right-angled triangle has legs 7 cm and 24 cm. Find the hypotenuse.`,options:[`25 cm`,`31 cm`,`√(631) cm`,`√(31) cm`],correct:0,explanation:`c² = 7² + 24² = 49 + 576 = 625. c = √625 = 25 cm. (This is a 7-24-25 Pythagorean triple!)`}},{title:`Finding a Shorter Side`,content:`<p>When you know the hypotenuse and one leg, rearrange to find the missing leg.</p>
<div class="formula-box">a² = c² − b²</div>
<p><strong>Example:</strong> Hypotenuse = 13 cm, one leg = 5 cm. Find the other leg.</p>
<div class="formula-box">a² = 13² − 5²<br/>a² = 169 − 25 = 144<br/>a = √144 = 12 cm</div>
<p><strong>Key difference:</strong> Finding hypotenuse → ADD. Finding a leg → SUBTRACT. Don't mix them up!</p>
<p><strong>3D Pythagoras:</strong> Apply the theorem twice. First find a diagonal on the base, then use that as a leg to find the space diagonal.</p>`,quickCheck:{question:`A ladder 10 m long leans against a wall. The foot is 6 m from the wall. How high up the wall does it reach?`,options:[`4 m`,`8 m`,`√164 m`,`√(136) m`],correct:1,explanation:`a² = 10² − 6² = 100 − 36 = 64. a = √64 = 8 m.`}}]},trigonometry:{estimatedMinutes:20,keyPoints:[`SOH CAH TOA — the three ratios for right-angled triangles`,`sin θ = Opposite/Hypotenuse | cos θ = Adjacent/Hypotenuse | tan θ = Opposite/Adjacent`,`To find a side: rearrange the formula (e.g. Opp = Hyp × sin θ)`,`To find an angle: use inverse trig (sin⁻¹, cos⁻¹, tan⁻¹ on your calculator)`],sections:[{title:`Label the Triangle First`,content:`<p>Before using any trig formula, always <strong>label the three sides</strong> relative to the angle you're using:</p>
<ul>
  <li><strong>Hypotenuse (H)</strong> — always the longest side, opposite the right angle</li>
  <li><strong>Opposite (O)</strong> — the side directly opposite the angle you're using (not touching it)</li>
  <li><strong>Adjacent (A)</strong> — the side next to the angle (not the hypotenuse)</li>
</ul>
<p><strong>Critical:</strong> H never changes. But O and A depend on which angle you're using — they swap if you switch to the other angle!</p>`,quickCheck:{question:`In a triangle, you're working with angle θ at the bottom left. The side directly opposite θ is labelled as...`,options:[`Hypotenuse`,`Adjacent`,`Opposite`,`It depends on the size of θ`],correct:2,explanation:`The opposite side is the one directly across from the angle θ — it doesn't touch θ. This is always true regardless of angle size.`}},{title:`SOH CAH TOA — The Three Ratios`,content:`<p>Once labelled, choose the formula based on which two sides are involved:</p>
<div class="formula-box">SOH: sin θ = Opposite / Hypotenuse<br/>CAH: cos θ = Adjacent / Hypotenuse<br/>TOA: tan θ = Opposite / Adjacent</div>
<p><strong>Choosing which to use:</strong></p>
<ul>
  <li>Have O and H? → Use <strong>sin</strong></li>
  <li>Have A and H? → Use <strong>cos</strong></li>
  <li>Have O and A? → Use <strong>tan</strong></li>
</ul>
<p><strong>Example:</strong> Angle = 35°, Hypotenuse = 20 cm. Find the Opposite side.</p>
<div class="formula-box">sin 35° = O / 20 → O = 20 × sin 35° = 20 × 0.574 ≈ 11.5 cm</div>`,quickCheck:{question:`You know the Adjacent and Hypotenuse. Which formula do you use?`,options:[`SOH (sin θ = O/H)`,`CAH (cos θ = A/H)`,`TOA (tan θ = O/A)`,`Pythagoras`],correct:1,explanation:`CAH: cos θ = Adjacent / Hypotenuse. Always pick the formula containing the two sides you know.`}},{title:`Finding Angles Using Inverse Trig`,content:`<p>When you know two sides and want the <strong>angle</strong>, use the inverse trig functions on your calculator: <strong>sin⁻¹</strong>, <strong>cos⁻¹</strong>, <strong>tan⁻¹</strong>.</p>
<p><strong>Example:</strong> Opposite = 8 cm, Hypotenuse = 17 cm. Find angle θ.</p>
<div class="formula-box">sin θ = 8/17 = 0.471<br/>θ = sin⁻¹(0.471) = 28.1°</div>
<p>On your calculator: press [sin⁻¹] (or [SHIFT][sin]) then type the value.</p>
<p><strong>Example 2:</strong> Adjacent = 5 cm, Opposite = 12 cm. Find θ.</p>
<div class="formula-box">tan θ = 12/5 = 2.4<br/>θ = tan⁻¹(2.4) = 67.4°</div>`,quickCheck:{question:`A right-angled triangle has Opposite = 6 cm and Adjacent = 6 cm. What is the angle θ?`,options:[`30°`,`45°`,`60°`,`90°`],correct:1,explanation:`tan θ = 6/6 = 1. θ = tan⁻¹(1) = 45°. This is an isosceles right-angled triangle (the legs are equal).`}}]},"mean-median-mode":{estimatedMinutes:15,keyPoints:[`Mean = total ÷ count (use for symmetric data without outliers)`,`Median = middle value when ordered (not affected by extreme values)`,`Mode = most frequent value (use for categories)`,`For grouped data, use midpoints to estimate the mean`],sections:[{title:`Mean — The Balancing Average`,content:`<p>The <strong>mean</strong> is what most people mean when they say 'average'. Add all values and divide by how many there are.</p>
<div class="formula-box">Mean = Σx / n (sum of all values ÷ number of values)</div>
<p><strong>Example:</strong> Find the mean of 4, 7, 12, 5, 7, 9, 2</p>
<div class="formula-box">Sum = 4+7+12+5+7+9+2 = 46<br/>Count = 7<br/>Mean = 46 ÷ 7 = 6.57 (2 d.p.)</div>
<p><strong>Weakness:</strong> The mean is dragged by outliers (extreme values). If one student scores 99% and the rest score around 50%, the mean makes it look higher than it really is for most students.</p>`,quickCheck:{question:`Find the mean of: 3, 8, 4, 10, 5`,options:[`5`,`6`,`8`,`30`],correct:1,explanation:`Sum = 3+8+4+10+5 = 30. Count = 5. Mean = 30 ÷ 5 = 6.`}},{title:`Median — The Middle Value`,content:`<p>The <strong>median</strong> is the middle value when data is placed in order. It's not affected by extreme values (outliers).</p>
<p><strong>To find the median:</strong></p>
<ol>
  <li>Order all values from smallest to largest</li>
  <li>Find the middle value</li>
</ol>
<p>For <strong>n</strong> values: the median is at position <strong>(n+1)/2</strong></p>
<p>If n is even, there's no single middle — the median is the <strong>mean of the two middle values</strong>.</p>
<p><strong>Example:</strong> 2, 5, 7, 8, 11 (n=5). Median at position (5+1)/2 = 3rd value = <strong>7</strong></p>
<p><strong>Example (even):</strong> 3, 5, 8, 12 (n=4). Median at position 2.5 → mean of 2nd and 3rd = (5+8)/2 = <strong>6.5</strong></p>`,quickCheck:{question:`Find the median of: 9, 3, 7, 1, 5`,options:[`5`,`7`,`9`,`3`],correct:0,explanation:`Order: 1, 3, 5, 7, 9. Median is at position (5+1)/2 = 3rd value = 5.`}},{title:`Mode, Range and Grouped Data`,content:`<p>The <strong>mode</strong> is the value that appears most often. A dataset can have no mode, one mode, or multiple modes.</p>
<p>The <strong>range</strong> = maximum − minimum. It measures spread, not a type of average.</p>
<p><strong>Which average to use?</strong></p>
<ul>
  <li><strong>Mean:</strong> When data is symmetric with no outliers</li>
  <li><strong>Median:</strong> When there are outliers or skewed data</li>
  <li><strong>Mode:</strong> For categorical data (shoe sizes, favourite colours)</li>
</ul>
<p><strong>Grouped data — estimating the mean:</strong> Use the midpoint of each class interval.</p>
<div class="formula-box">Estimated mean = Σ(midpoint × frequency) ÷ Σfrequency</div>`,quickCheck:{question:`What is the mode of: 4, 7, 2, 7, 5, 3, 7, 4?`,options:[`4`,`5`,`7`,`4 and 7`],correct:2,explanation:`7 appears 3 times, 4 appears 2 times, others appear once. The mode is 7 (most frequent).`}}]},"probability-trees":{estimatedMinutes:18,keyPoints:[`P(event) = favourable outcomes ÷ total outcomes (always 0 to 1)`,`P(not A) = 1 − P(A)`,`Multiply along branches for AND (both events happening)`,`Add across branches for OR (either event happening)`],sections:[{title:`Basic Probability`,content:`<p><strong>Probability</strong> measures how likely something is to happen. It's always between 0 (impossible) and 1 (certain).</p>
<div class="formula-box">P(event) = number of favourable outcomes ÷ total possible outcomes</div>
<p><strong>Example:</strong> A bag has 3 red, 4 blue, 3 green balls. P(red) = 3/10 = 0.3</p>
<p><strong>Key rules:</strong></p>
<ul>
  <li>All probabilities in a situation must <strong>add up to 1</strong></li>
  <li>P(event doesn't happen) = 1 − P(event happens)</li>
</ul>
<p>P(not red) = 1 − 3/10 = 7/10</p>`,quickCheck:{question:`A spinner has sections: 1, 2, 2, 3, 3, 3. What is P(3)?`,options:[`1/6`,`2/6`,`3/6`,`4/6`],correct:2,explanation:`There are 3 threes out of 6 sections total. P(3) = 3/6 = ½.`}},{title:`Tree Diagrams — Two Events`,content:`<p><strong>Tree diagrams</strong> are perfect for finding probabilities of two or more events in sequence.</p>
<p><strong>Rules:</strong></p>
<ul>
  <li><strong>Multiply along branches</strong> to get the probability of a specific combination (AND)</li>
  <li><strong>Add the relevant branch products</strong> for OR situations</li>
  <li>All branches from any point must sum to 1</li>
</ul>
<p><strong>Example:</strong> Flip a coin twice. P(heads then tails)?</p>
<div class="formula-box">P(H then T) = P(H) × P(T) = ½ × ½ = ¼</div>`,quickCheck:{question:`A bag has 2 red and 3 blue balls. One ball is drawn then replaced. What is P(two reds)?`,options:[`2/5`,`4/25`,`4/20`,`1/5`],correct:1,explanation:`With replacement, P(red) = 2/5 each time. P(red AND red) = 2/5 × 2/5 = 4/25.`}},{title:`Without Replacement`,content:`<p>When items are <strong>NOT replaced</strong>, the probabilities on the second draw change — because the total number of items has decreased by 1.</p>
<p><strong>Example:</strong> A bag has 4 red and 6 blue balls. Two balls are drawn without replacement. Find P(both red).</p>
<div class="formula-box">P(1st red) = 4/10<br/>P(2nd red | 1st was red) = 3/9 (only 3 red left out of 9 total)<br/>P(both red) = 4/10 × 3/9 = 12/90 = 2/15</div>
<p><strong>Tip:</strong> After drawing without replacing, decrease both the specific count AND the total by 1.</p>`,quickCheck:{question:`A bag has 5 red and 3 blue balls. Two are drawn without replacement. What is P(blue then red)?`,options:[`15/56`,`15/64`,`5/24`,`3/8`],correct:0,explanation:`P(blue 1st) = 3/8. P(red 2nd | blue 1st) = 5/7 (5 reds still there, only 7 balls now). P = 3/8 × 5/7 = 15/56.`}}]},percentages:{estimatedMinutes:16,keyPoints:[`Percent means 'out of 100'. 45% = 45/100 = 0.45`,`To find X% of Y: multiply Y by X/100 (or by the decimal equivalent)`,`Percentage change = (change ÷ original) × 100`,`Reverse percentage: divide by the multiplier to find the original value`],sections:[{title:`Finding Percentages of Amounts`,content:`<p><strong>Percentage</strong> means 'out of 100'. The easiest way to find a percentage of an amount is to convert to a decimal multiplier.</p>
<div class="formula-box">X% of Y = Y × (X ÷ 100)</div>
<p><strong>Examples:</strong></p>
<ul>
  <li>35% of 200 = 200 × 0.35 = <strong>70</strong></li>
  <li>17.5% of 80 = 80 × 0.175 = <strong>14</strong></li>
</ul>
<p><strong>Mental maths trick:</strong></p>
<ul>
  <li>10% → divide by 10</li>
  <li>5% → half of 10%</li>
  <li>1% → divide by 100</li>
  <li>Build other percentages from these</li>
</ul>`,quickCheck:{question:`Find 15% of 240.`,options:[`24`,`36`,`48`,`36`],correct:1,explanation:`10% of 240 = 24. 5% = 12. So 15% = 24 + 12 = 36. Or: 240 × 0.15 = 36.`}},{title:`Percentage Increase and Decrease`,content:`<p>To increase or decrease by a percentage, use a <strong>multiplier</strong>:</p>
<ul>
  <li>Increase by 20%: multiply by 1.20</li>
  <li>Decrease by 15%: multiply by 0.85</li>
</ul>
<p><strong>Rule:</strong> Increase by X% → multiply by (1 + X/100). Decrease by X% → multiply by (1 − X/100).</p>
<p><strong>Example:</strong> A jacket costs £80. It's reduced by 30%. New price?</p>
<div class="formula-box">£80 × 0.70 = £56</div>
<p><strong>Compound interest:</strong> Apply the multiplier multiple times.</p>
<div class="formula-box">After n years: Amount = P × (multiplier)ⁿ</div>`,quickCheck:{question:`A price increases by 25% from £120. What is the new price?`,options:[`£30`,`£145`,`£150`,`£160`],correct:2,explanation:`Multiplier = 1.25. New price = £120 × 1.25 = £150.`}},{title:`Percentage Change and Reverse Percentages`,content:`<p><strong>Percentage change:</strong> Find how much something went up or down as a percentage.</p>
<div class="formula-box">% change = (change ÷ original) × 100</div>
<p><strong>Example:</strong> A population increases from 400 to 500. What's the % increase?</p>
<div class="formula-box">Change = 100. % change = (100 ÷ 400) × 100 = 25%</div>
<p><strong>Reverse percentages:</strong> Find the original amount before a change.</p>
<p><strong>Example:</strong> After a 20% increase, a price is £96. Find the original.</p>
<div class="formula-box">£96 is 120% of the original.<br/>Original = £96 ÷ 1.20 = £80</div>
<p><strong>Key:</strong> NEVER just subtract the percentage of the new price — always divide by the multiplier.</p>`,quickCheck:{question:`After a 40% discount, a laptop costs £420. What was the original price?`,options:[`£588`,`£700`,`£560`,`£300`],correct:1,explanation:`£420 is 60% of the original (100% − 40% = 60%). Original = £420 ÷ 0.60 = £700.`}}]},"standard-form":{estimatedMinutes:14,keyPoints:[`Standard form: A × 10ⁿ where 1 ≤ A < 10 and n is an integer`,`Large numbers: positive power of 10. Small numbers: negative power.`,`To multiply in standard form: multiply the A values, add the powers`,`To divide: divide the A values, subtract the powers`],sections:[{title:`What Is Standard Form?`,content:`<p><strong>Standard form</strong> (scientific notation) is a compact way to write very large or very small numbers.</p>
<div class="formula-box">A × 10ⁿ where 1 ≤ A < 10</div>
<p><strong>Converting to standard form:</strong> Write the significant figures as a number between 1 and 10, then count how many places the decimal moved.</p>
<p>Large numbers → positive n: &nbsp; 4,700,000 = 4.7 × 10⁶</p>
<p>Small numbers → negative n: &nbsp; 0.000035 = 3.5 × 10⁻⁵</p>
<p><strong>Memory tip:</strong> Think about which direction the decimal moves. If you're making the number bigger (moving decimal right), the power is positive.</p>`,quickCheck:{question:`Write 0.00072 in standard form.`,options:[`7.2 × 10⁴`,`7.2 × 10⁻⁴`,`72 × 10⁻⁵`,`0.72 × 10⁻³`],correct:1,explanation:`Move the decimal 4 places right to get 7.2. Since the original was small, n is negative: 7.2 × 10⁻⁴.`}},{title:`Calculating with Standard Form`,content:`<p><strong>Multiplying:</strong> Multiply the A values, then add the powers.</p>
<div class="formula-box">(3 × 10⁴) × (2 × 10³) = 6 × 10⁷</div>
<p><strong>Dividing:</strong> Divide the A values, then subtract the powers.</p>
<div class="formula-box">(8 × 10⁶) ÷ (4 × 10²) = 2 × 10⁴</div>
<p><strong>Important:</strong> After calculating, check the answer is still in standard form (A must be between 1 and 10). If not, adjust:</p>
<div class="formula-box">4 × 10⁷ × 3 × 10⁵ = 12 × 10¹² = 1.2 × 10¹³</div>`,quickCheck:{question:`Calculate (5 × 10³) × (4 × 10²). Give your answer in standard form.`,options:[`20 × 10⁵`,`2 × 10⁶`,`9 × 10⁵`,`2 × 10⁵`],correct:1,explanation:`5 × 4 = 20, and 10³ × 10² = 10⁵. So 20 × 10⁵ = 2 × 10⁶ (adjust since 20 is not between 1 and 10).`}}]},"sorting-algorithms":{estimatedMinutes:20,keyPoints:[`Bubble Sort: compare adjacent pairs, swap if wrong — simple but slow O(n²)`,`Merge Sort: split, sort halves, merge back — efficient O(n log n)`,`Insertion Sort: build sorted list one item at a time — good for small/nearly sorted data`,`For exam: know how to trace through each algorithm step by step`],sections:[{title:`Bubble Sort — Step by Step`,content:`<p><strong>Bubble Sort</strong> repeatedly compares adjacent pairs and swaps them if they're in the wrong order. Large values 'bubble up' to the end.</p>
<p><strong>Trace example:</strong> Sort [5, 3, 8, 1, 4]</p>
<p><strong>Pass 1:</strong></p>
<ul>
  <li>Compare 5,3 → swap → [3, 5, 8, 1, 4]</li>
  <li>Compare 5,8 → no swap → [3, 5, 8, 1, 4]</li>
  <li>Compare 8,1 → swap → [3, 5, 1, 8, 4]</li>
  <li>Compare 8,4 → swap → [3, 5, 1, 4, 8] ← 8 is in place!</li>
</ul>
<p>Each pass places the next largest value in its correct position. After n−1 passes, the list is sorted.</p>
<div class="formula-box">Worst case: O(n²) comparisons. Not efficient for large lists.</div>`,quickCheck:{question:`How many comparisons does Bubble Sort make in its first pass on a list of 5 elements?`,options:[`3`,`4`,`5`,`10`],correct:1,explanation:`In each pass, we compare n−1 adjacent pairs. For 5 elements: 5−1 = 4 comparisons.`}},{title:`Merge Sort — Divide and Conquer`,content:`<p><strong>Merge Sort</strong> uses a 'divide and conquer' strategy: split the list in half repeatedly until individual elements, then merge them back in order.</p>
<p><strong>Example:</strong> Sort [38, 27, 43, 3]</p>
<ol>
  <li>Split: [38, 27] | [43, 3]</li>
  <li>Split again: [38] | [27] | [43] | [3]</li>
  <li>Merge pairs: [27, 38] | [3, 43]</li>
  <li>Merge final: [3, 27, 38, 43] ✓</li>
</ol>
<div class="formula-box">Time complexity: O(n log n) — much faster than Bubble Sort for large n</div>
<p>The trade-off: Merge Sort needs extra memory to store the split halves.</p>`,quickCheck:{question:`What is the key advantage of Merge Sort over Bubble Sort?`,options:[`It uses less memory`,`It is faster for large lists — O(n log n) vs O(n²)`,`It is simpler to understand`,`It works without comparisons`],correct:1,explanation:`Merge Sort has O(n log n) time complexity, which scales much better than Bubble Sort's O(n²) for large datasets.`}},{title:`Insertion Sort`,content:`<p><strong>Insertion Sort</strong> builds a sorted list one element at a time, like sorting playing cards in your hand.</p>
<p><strong>Trace example:</strong> Sort [4, 2, 6, 1, 3]</p>
<ul>
  <li>Start: [4]</li>
  <li>Insert 2: [2, 4]</li>
  <li>Insert 6: [2, 4, 6]</li>
  <li>Insert 1: [1, 2, 4, 6]</li>
  <li>Insert 3: [1, 2, 3, 4, 6] ✓</li>
</ul>
<div class="formula-box">Best for: small lists or nearly-sorted lists. O(n) in best case, O(n²) in worst.</div>
<p><strong>Summary comparison:</strong></p>
<ul>
  <li>Bubble Sort: Simple to implement, O(n²) worst case</li>
  <li>Merge Sort: Efficient O(n log n), uses extra memory</li>
  <li>Insertion Sort: Good for nearly sorted data, O(n) best case</li>
</ul>`,quickCheck:{question:`Insertion sort is best suited to which type of data?`,options:[`Large randomly-ordered lists`,`Nearly sorted or small lists`,`Reverse-sorted lists`,`Lists with duplicate values`],correct:1,explanation:`Insertion Sort is very efficient when data is already nearly sorted — in the best case it only needs n−1 comparisons (O(n)).`}}]},binary:{estimatedMinutes:18,keyPoints:[`Binary uses only 0s and 1s (base 2). Each position is a power of 2.`,`Convert decimal to binary: repeatedly divide by 2, remainders give the binary digits`,`Convert binary to decimal: multiply each bit by its place value (powers of 2)`,`Adding binary: 0+0=0, 0+1=1, 1+1=10 (carry the 1), 1+1+1=11`],sections:[{title:`Understanding Binary Numbers`,content:`<p><strong>Binary</strong> is base-2 — it only uses 0 and 1. Computers use it because circuits can easily represent two states: off (0) or on (1).</p>
<p>Just like decimal uses powers of 10 (ones, tens, hundreds...), binary uses powers of 2:</p>
<div class="formula-box">128 | 64 | 32 | 16 | 8 | 4 | 2 | 1</div>
<p>To read a binary number, add the place values where there's a 1.</p>
<p><strong>Example:</strong> What is 10110101 in decimal?</p>
<div class="formula-box">128+0+32+16+0+4+0+1 = 181</div>`,quickCheck:{question:`What is binary 1010 in decimal?`,options:[`10`,`12`,`8`,`5`],correct:0,explanation:`1010 in binary: 1×8 + 0×4 + 1×2 + 0×1 = 8 + 0 + 2 + 0 = 10.`}},{title:`Decimal to Binary Conversion`,content:`<p><strong>Method 1 — Subtraction:</strong> Find the largest power of 2 that fits, write a 1, subtract it, repeat.</p>
<p><strong>Example:</strong> Convert 45 to binary.</p>
<ul>
  <li>32 fits in 45: write 1, remainder 45−32=13</li>
  <li>16 doesn't fit in 13: write 0</li>
  <li>8 fits in 13: write 1, remainder 13−8=5</li>
  <li>4 fits in 5: write 1, remainder 5−4=1</li>
  <li>2 doesn't fit in 1: write 0</li>
  <li>1 fits: write 1, remainder 0</li>
</ul>
<div class="formula-box">45 = 101101 in binary</div>
<p><strong>Method 2 — Division:</strong> Divide by 2 repeatedly, read remainders from bottom to top.</p>`,quickCheck:{question:`Convert decimal 25 to binary.`,options:[`11001`,`10110`,`11010`,`10101`],correct:0,explanation:`25 = 16+8+1 = 11001. Check: 1×16 + 1×8 + 0×4 + 0×2 + 1×1 = 25 ✓`}},{title:`Binary Addition`,content:`<p>Binary addition uses only four rules:</p>
<div class="formula-box">0 + 0 = 0<br/>0 + 1 = 1<br/>1 + 0 = 1<br/>1 + 1 = 10 (write 0, carry 1)<br/>1 + 1 + 1 = 11 (write 1, carry 1)</div>
<p><strong>Example:</strong> Add 1011 + 0110</p>
<ul>
  <li>Rightmost: 1+0 = 1</li>
  <li>Next: 1+1 = 10 → write 0, carry 1</li>
  <li>Next: 0+1+1(carry) = 10 → write 0, carry 1</li>
  <li>Leftmost: 1+0+1(carry) = 10 → write 10</li>
</ul>
<div class="formula-box">1011 + 0110 = 10001 (= 17 in decimal, which is 11+6 ✓)</div>`,quickCheck:{question:`What is 1100 + 0101 in binary?`,options:[`10001`,`10111`,`10011`,`10010`],correct:0,explanation:`1100 = 12, 0101 = 5, sum = 17 = 10001 in binary. Or add column by column: 0+1=1, 0+0=0, 1+1=10 (carry), 1+0+1=10. Result: 10001.`}}]},pathogens:{estimatedMinutes:16,keyPoints:[`Pathogens are microorganisms that cause infectious diseases`,`Types: bacteria, viruses, fungi, protists — each causes different diseases`,`Bacteria reproduce rapidly inside the body and produce toxins`,`Viruses replicate inside cells, damaging them — antibiotics don't work on viruses`],sections:[{title:`What Are Pathogens?`,content:`<p>A <strong>pathogen</strong> is a microorganism that causes disease. There are four main types:</p>
<ul>
  <li><strong>Bacteria</strong> — single-celled prokaryotes. E.g. Salmonella (food poisoning), tuberculosis</li>
  <li><strong>Viruses</strong> — not even cells; just DNA/RNA in a protein coat. E.g. influenza, HIV, measles</li>
  <li><strong>Fungi</strong> — eukaryotes with cell walls. E.g. ringworm, athlete's foot</li>
  <li><strong>Protists</strong> — single-celled eukaryotes. E.g. malaria (transmitted by mosquitoes)</li>
</ul>
<p>Pathogens spread by: direct contact, air (droplets), contaminated water/food, vectors (like mosquitoes).</p>`,quickCheck:{question:`Which type of pathogen causes malaria?`,options:[`Bacteria`,`Virus`,`Fungi`,`Protist`],correct:3,explanation:`Malaria is caused by the Plasmodium protist, transmitted through the bite of infected Anopheles mosquitoes.`}},{title:`How Pathogens Make Us Ill`,content:`<p><strong>Bacteria</strong> make us ill by:</p>
<ul>
  <li>Reproducing rapidly inside the body, competing for resources</li>
  <li>Producing <strong>toxins</strong> (poisons) that damage cells and tissues</li>
</ul>
<p><strong>Viruses</strong> make us ill by:</p>
<ul>
  <li>Invading host cells and using them to replicate</li>
  <li>Bursting the cell when they leave, killing it</li>
  <li>Triggering an immune response that causes symptoms like fever</li>
</ul>
<p><strong>Critical:</strong> <strong>Antibiotics kill bacteria</strong> but have NO effect on viruses. Using antibiotics for viral infections (like colds/flu) is ineffective AND contributes to antibiotic resistance.</p>`,quickCheck:{question:`Why are antibiotics NOT effective against viral infections?`,options:[`Antibiotics are too strong for viruses`,`Viruses are not cells, so antibiotics that target bacterial cell processes don't work on them`,`Viruses become resistant immediately`,`Antibiotics are only for the throat`],correct:1,explanation:`Antibiotics target specific bacterial structures (cell walls, ribosomes). Viruses don't have these structures — they hijack host cells. So antibiotics have nothing to target.`}}]},photosynthesis:{estimatedMinutes:18,keyPoints:[`Photosynthesis converts CO₂ + H₂O into glucose + O₂ using light energy`,`Chlorophyll in chloroplasts absorbs light for the reaction`,`Factors that affect rate: light intensity, CO₂ concentration, temperature`,`Limiting factor: whichever factor is in shortest supply limits the rate`],sections:[{title:`The Photosynthesis Equation`,content:`<p><strong>Photosynthesis</strong> is how plants make food. Plants are producers — they make organic molecules from simple inorganic ones using light energy.</p>
<div class="formula-box">6CO₂ + 6H₂O → C₆H₁₂O₆ + 6O₂ (light energy needed)</div>
<p>In words: <strong>Carbon dioxide + Water → Glucose + Oxygen</strong></p>
<p>Where does it happen? In <strong>chloroplasts</strong>, which contain <strong>chlorophyll</strong> — the green pigment that absorbs light.</p>
<p>Glucose is used for: respiration (energy), making cellulose (cell walls), making starch (storage), making proteins.</p>`,quickCheck:{question:`What are the raw materials (reactants) of photosynthesis?`,options:[`Glucose and oxygen`,`Carbon dioxide and water`,`Carbon dioxide and oxygen`,`Water and glucose`],correct:1,explanation:`Photosynthesis takes in CO₂ and H₂O and produces glucose (C₆H₁₂O₆) and O₂. CO₂ and H₂O are the reactants.`}},{title:`Limiting Factors`,content:`<p>The <strong>rate of photosynthesis</strong> is controlled by whichever factor is in shortest supply — this is the <strong>limiting factor</strong>.</p>
<p>Three main limiting factors:</p>
<ul>
  <li><strong>Light intensity</strong> — more light → faster photosynthesis (up to a point)</li>
  <li><strong>CO₂ concentration</strong> — more CO₂ → faster photosynthesis (up to a point)</li>
  <li><strong>Temperature</strong> — warmer = faster, but too hot denatures enzymes and rate drops sharply</li>
</ul>
<p>On a graph: the flat part of the curve shows the limiting factor has changed. If raising light doesn't help but raising CO₂ does → CO₂ was the limiting factor.</p>`,quickCheck:{question:`A plant is in a bright room but photosynthesis is slow. Increasing CO₂ makes it faster. What was the limiting factor?`,options:[`Light intensity`,`Temperature`,`CO₂ concentration`,`Water availability`],correct:2,explanation:`If the plant is already in bright light but CO₂ was limiting, then adding more CO₂ will speed up photosynthesis. CO₂ concentration was the limiting factor.`}}]},"ionic-bonding":{estimatedMinutes:18,keyPoints:[`Ionic bonds form between metals and non-metals by transfer of electrons`,`Metals lose electrons → positive ions (cations). Non-metals gain electrons → negative ions (anions)`,`Ions are attracted by electrostatic forces — this forms the ionic bond`,`Ionic compounds: high melting points, conduct electricity when dissolved or molten`],sections:[{title:`How Ionic Bonds Form`,content:`<p><strong>Ionic bonding</strong> occurs between a metal and a non-metal. Electrons are completely <em>transferred</em> from the metal to the non-metal.</p>
<p><strong>Why?</strong> Both atoms want a full outer shell of electrons (like the noble gases). The metal has 1-3 outer electrons to lose; the non-metal has 1-3 spaces to fill.</p>
<p><strong>Example: Sodium + Chlorine → Sodium Chloride (NaCl)</strong></p>
<ul>
  <li>Sodium (Na): 2,8,1 — loses 1 electron → Na⁺ ion (2,8)</li>
  <li>Chlorine (Cl): 2,8,7 — gains 1 electron → Cl⁻ ion (2,8,8)</li>
  <li>The opposite charges attract: <strong>Na⁺ and Cl⁻ form an ionic bond</strong></li>
</ul>`,quickCheck:{question:`When magnesium (2 outer electrons) bonds with oxygen (6 outer electrons), what ions form?`,options:[`Mg⁻ and O²⁺`,`Mg²⁺ and O²⁻`,`Mg⁺ and O⁻`,`Mg²⁻ and O²⁺`],correct:1,explanation:`Magnesium loses its 2 outer electrons → Mg²⁺. Oxygen gains 2 electrons to fill its outer shell → O²⁻. The compound formed is MgO.`}},{title:`Giant Ionic Lattice Structure`,content:`<p>Ionic compounds form a <strong>giant ionic lattice</strong> — a regular 3D arrangement of alternating positive and negative ions.</p>
<p>Each ion is surrounded by ions of the opposite charge. Millions of electrostatic attractions hold the whole structure together.</p>
<p><strong>Properties explained:</strong></p>
<ul>
  <li><strong>High melting/boiling points</strong> — many strong electrostatic forces to break</li>
  <li><strong>Brittle</strong> — if ions shift slightly, like charges align and repel, shattering the structure</li>
  <li><strong>Conduct electricity when dissolved or molten</strong> — ions are free to move and carry charge</li>
  <li><strong>Don't conduct when solid</strong> — ions are fixed in the lattice, can't move</li>
</ul>`,quickCheck:{question:`Why does solid sodium chloride not conduct electricity, but molten sodium chloride does?`,options:[`Solid NaCl has no ions`,`In solid NaCl, ions are fixed and can't move. In molten NaCl, ions are free to move and carry charge.`,`Molten NaCl has more electrons`,`Solid NaCl is too hot to conduct`],correct:1,explanation:`Electrical conduction requires mobile charge carriers. In solid ionic compounds, ions are locked in the lattice. On melting, ions become free to move and carry electrical current.`}}]},moles:{estimatedMinutes:18,keyPoints:[`A mole is 6.02 × 10²³ particles (Avogadro's number)`,`Moles = mass ÷ relative formula mass (Mr)`,`Moles = concentration × volume(L) for solutions`,`Use mole ratios from balanced equations to find amounts`],sections:[{title:`The Mole Concept`,content:`<p>A <strong>mole</strong> is simply a specific number of particles: <strong>6.02 × 10²³</strong> (Avogadro's number). It's like a dozen (12) but much, much bigger — used because atoms are so tiny.</p>
<p>The beauty of the mole is this: <strong>1 mole of any substance = its relative formula mass in grams</strong>.</p>
<p>So 1 mole of carbon (Mr = 12) = 12 g. 1 mole of water (Mr = 18) = 18 g.</p>
<div class="formula-box">Moles = mass (g) ÷ relative formula mass (Mr)</div>
<p>Finding Mr: add up all the atomic masses in the formula. For H₂O: 2(1) + 16 = 18 g/mol.</p>`,quickCheck:{question:`How many moles are in 44 g of CO₂? (C = 12, O = 16, so Mr = 44)`,options:[`0.5 mol`,`1 mol`,`2 mol`,`44 mol`],correct:1,explanation:`Moles = mass ÷ Mr = 44 ÷ 44 = 1 mol.`}},{title:`Using Mole Ratios in Equations`,content:`<p>A balanced equation shows the <strong>mole ratio</strong> — how many moles of each substance react.</p>
<p><strong>Example:</strong> How many grams of H₂O form when 6 g of H₂ reacts with excess O₂?</p>
<p>The equation: 2H₂ + O₂ → 2H₂O</p>
<p><strong>Step 1:</strong> Find moles of H₂. Mr(H₂) = 2. Moles = 6 ÷ 2 = <strong>3 mol</strong></p>
<p><strong>Step 2:</strong> Use the ratio. 2H₂ : 2H₂O → ratio is 1:1. So 3 mol H₂ makes <strong>3 mol H₂O</strong></p>
<p><strong>Step 3:</strong> Convert to grams. Mr(H₂O) = 18. Mass = 3 × 18 = <strong>54 g</strong></p>
<div class="formula-box">Mass = moles × Mr</div>`,quickCheck:{question:`In the reaction 2Mg + O₂ → 2MgO, how many moles of MgO form from 2 mol of Mg?`,options:[`1 mol`,`2 mol`,`4 mol`,`0.5 mol`],correct:1,explanation:`The ratio is 2Mg : 2MgO = 1:1. So 2 mol of Mg produces 2 mol of MgO.`}}]},"newtons-laws":{estimatedMinutes:18,keyPoints:[`1st Law: balanced forces → no change in motion (constant velocity or at rest)`,`2nd Law: F = ma (resultant force = mass × acceleration)`,`3rd Law: every action has an equal and opposite reaction`,`Weight = mg (mass × gravitational field strength)`],sections:[{title:`Newton's First Law — Inertia`,content:`<p><strong>Newton's First Law:</strong> An object at rest stays at rest, and an object moving at constant velocity continues at that velocity — <em>unless a resultant force acts on it</em>.</p>
<p>This is the law of <strong>inertia</strong>. Objects resist changes to their motion.</p>
<p><strong>Examples:</strong></p>
<ul>
  <li>A book on a table: weight down, normal force up — balanced → stays still ✓</li>
  <li>A spacecraft in deep space: no air resistance, no gravity → continues at constant velocity forever</li>
  <li>Seatbelts: when a car stops suddenly, your body keeps moving forward (inertia) — the seatbelt provides the force to stop you</li>
</ul>
<p><strong>Key distinction:</strong> An object moving at constant velocity has ZERO resultant force — it's not forceless, the forces are balanced.</p>`,quickCheck:{question:`A skydiver reaches terminal velocity. Which statement is true?`,options:[`There are no forces acting`,`The net force is upward`,`Weight equals air resistance — zero resultant force`,`The parachute must be open`],correct:2,explanation:`At terminal velocity, the skydiver moves at constant speed — forces are balanced. Weight (down) = air resistance (up). Zero resultant force.`}},{title:`Newton's Second Law — F = ma`,content:`<p><strong>Newton's Second Law:</strong> The resultant (net) force on an object equals its mass times its acceleration.</p>
<div class="formula-box">F = ma &nbsp;|&nbsp; a = F/m &nbsp;|&nbsp; m = F/a</div>
<p>Units: Force in Newtons (N), mass in kg, acceleration in m/s².</p>
<p><strong>Examples:</strong></p>
<ul>
  <li>Car: m=1000 kg, a=3 m/s² → F = 1000×3 = <strong>3000 N</strong></li>
  <li>Same force on a heavier car: more mass → less acceleration</li>
  <li>Same force on a lighter car: less mass → more acceleration</li>
</ul>
<p>Think of it like pushing a shopping trolley: <strong>more force = more acceleration; more mass = less acceleration</strong> for the same force.</p>`,quickCheck:{question:`A 60 kg person experiences a resultant force of 120 N. What is their acceleration?`,options:[`0.5 m/s²`,`2 m/s²`,`60 m/s²`,`7200 m/s²`],correct:1,explanation:`a = F/m = 120 ÷ 60 = 2 m/s².`}},{title:`Newton's Third Law — Equal and Opposite`,content:`<p><strong>Newton's Third Law:</strong> When object A exerts a force on object B, object B exerts an equal and opposite force on object A.</p>
<p>These are called <strong>action-reaction pairs</strong>. They are:</p>
<ul>
  <li>Equal in magnitude</li>
  <li>Opposite in direction</li>
  <li>Acting on <em>different</em> objects (never on the same object!)</li>
</ul>
<p><strong>Examples:</strong></p>
<ul>
  <li>You push on the ground → ground pushes back on you (lets you walk)</li>
  <li>Rocket expels gas downward → gas pushes rocket upward</li>
  <li>Earth pulls Moon → Moon pulls Earth (with equal force!)</li>
</ul>
<p><strong>Common mistake:</strong> Action-reaction pairs DO NOT cancel — they act on DIFFERENT objects!</p>`,quickCheck:{question:`A horse pulls a cart. By Newton's 3rd Law, the cart pulls the horse with an equal force. Why does the system still move?`,options:[`The forces aren't actually equal`,`They cancel out so nothing moves`,`They act on different objects — the horse's feet push on the ground, which causes forward movement`,`The horse is stronger than the cart`],correct:2,explanation:`The cart's force on the horse and the horse's force on the cart are equal and opposite — but they act on DIFFERENT objects so don't cancel. The system accelerates because the horse's feet push backward on the ground, the ground pushes the horse forward.`}}]},circuits:{estimatedMinutes:18,keyPoints:[`Series circuit: components in a single loop, same current throughout`,`Parallel circuit: components in separate branches, voltage same across each`,`Ohm's Law: V = IR (voltage = current × resistance)`,`Series: resistances add. Parallel: total resistance is less than any individual branch`],sections:[{title:`Series and Parallel Circuits`,content:`<p>Two main ways to connect components:</p>
<p><strong>Series circuit:</strong> Everything in one loop.</p>
<ul>
  <li>Same <strong>current</strong> flows through all components</li>
  <li><strong>Voltage splits</strong> across components</li>
  <li>Total resistance = R₁ + R₂ + R₃ ...</li>
  <li>If one bulb breaks → all go out</li>
</ul>
<p><strong>Parallel circuit:</strong> Components in separate branches.</p>
<ul>
  <li><strong>Voltage same</strong> across each branch</li>
  <li><strong>Current splits</strong> between branches</li>
  <li>Total resistance is LESS than any single branch</li>
  <li>If one bulb breaks → others stay on (home wiring uses parallel!)</li>
</ul>`,quickCheck:{question:`In a parallel circuit, what is the same across all branches?`,options:[`Current`,`Resistance`,`Voltage`,`Power`],correct:2,explanation:`In a parallel circuit, all branches are connected directly across the power supply, so the voltage (p.d.) is the same across each branch.`}},{title:`Ohm's Law — V = IR`,content:`<p><strong>Ohm's Law</strong> connects the three key circuit quantities:</p>
<div class="formula-box">V = IR &nbsp;|&nbsp; I = V/R &nbsp;|&nbsp; R = V/I</div>
<p>V = voltage (Volts, V), I = current (Amperes/Amps, A), R = resistance (Ohms, Ω)</p>
<p><strong>Example:</strong> A 12 V battery powers a 4 Ω resistor. Find the current.</p>
<div class="formula-box">I = V/R = 12/4 = 3 A</div>
<p><strong>Ohmic conductors</strong> (like metal wire at constant temperature) obey Ohm's Law — their V/I graph is a straight line through the origin.</p>
<p><strong>Non-ohmic components:</strong> bulbs (resistance increases as temperature increases), diodes (only conduct in one direction).</p>`,quickCheck:{question:`A 6 Ω resistor has 2 A flowing through it. What is the voltage across it?`,options:[`3 V`,`4 V`,`8 V`,`12 V`],correct:3,explanation:`V = IR = 2 × 6 = 12 V.`}}]},histograms:{estimatedMinutes:14,keyPoints:[`Frequency Density = Frequency ÷ Class Width`,`The area of each bar represents frequency, not the height`,`Histograms are for continuous data with unequal class widths`,`Always label axes: x = variable, y = frequency density`],sections:[{title:`What Is a Histogram?`,content:`<p>A <strong>histogram</strong> looks like a bar chart but has key differences. The bars touch each other (continuous data) and the y-axis shows <strong>frequency density</strong>, not frequency.</p><div class="formula-box">Frequency Density = Frequency ÷ Class Width</div><p>The <strong>area</strong> of each bar represents the frequency, which allows fair comparison between classes of different widths.</p>`,quickCheck:{question:`A class from 10 to 20 has frequency 30. What is the frequency density?`,options:[`3`,`30`,`300`,`0.3`],correct:0,explanation:`FD = 30 ÷ (20−10) = 30 ÷ 10 = 3.`}},{title:`Reading a Histogram`,content:`<p>To find the frequency from a histogram bar: <strong>Frequency = Frequency Density × Class Width</strong>.</p><p><strong>Example:</strong> A bar from 20 to 35 has height (FD) 4. Frequency = 4 × 15 = 60.</p><p>To estimate the total, add up all frequencies (areas of all bars).</p>`,quickCheck:{question:`A bar spans 5 to 15 with FD = 6. How many values?`,options:[`6`,`30`,`60`,`15`],correct:2,explanation:`Frequency = 6 × (15−5) = 6 × 10 = 60.`}}]},"box-plots":{estimatedMinutes:14,keyPoints:[`Box plots show 5 values: Min, Q1, Median, Q3, Max`,`The box spans Q1 to Q3 — the interquartile range (IQR)`,`IQR = Q3 − Q1 — the spread of the middle 50%`,`Outliers lie beyond 1.5 × IQR from Q1 or Q3`],sections:[{title:`The Five-Number Summary`,content:`<p>A <strong>box plot</strong> displays five key statistics:</p><ul><li><strong>Minimum</strong> — smallest value</li><li><strong>Q1</strong> — lower quartile (25th percentile)</li><li><strong>Median</strong> — middle value (50th percentile)</li><li><strong>Q3</strong> — upper quartile (75th percentile)</li><li><strong>Maximum</strong> — largest value</li></ul><div class="formula-box">IQR = Q3 − Q1</div>`,quickCheck:{question:`Q1 = 12, Q3 = 28. What is the IQR?`,options:[`12`,`16`,`28`,`40`],correct:1,explanation:`IQR = Q3 − Q1 = 28 − 12 = 16.`}},{title:`Comparing Box Plots`,content:`<p>Compare two box plots by looking at:</p><ul><li><strong>Medians</strong> — which group has a higher/lower average?</li><li><strong>IQR</strong> — wider box = more spread in middle 50%</li><li><strong>Range</strong> — total spread from min to max</li><li><strong>Skew</strong> — longer right whisker = positive skew</li></ul>`,quickCheck:{question:`Box A: median=50, IQR=20. Box B: median=45, IQR=30. Which is more consistent?`,options:[`A — smaller IQR means less spread`,`B — higher values`,`They're the same`,`Cannot tell`],correct:0,explanation:`A smaller IQR means the middle 50% of data is more tightly grouped — more consistent.`}}]},"scatter-graphs":{estimatedMinutes:14,keyPoints:[`Scatter graphs show the relationship between two variables`,`Positive correlation: both increase together`,`Negative correlation: one increases as the other decreases`,`Correlation does NOT prove causation`],sections:[{title:`Types of Correlation`,content:`<p><strong>Positive correlation:</strong> As x increases, y increases (points go upward left to right).</p><p><strong>Negative correlation:</strong> As x increases, y decreases (points go downward).</p><p><strong>No correlation:</strong> No pattern — the variables are not related.</p><p>Correlation can be <strong>strong</strong> (points close to a line) or <strong>weak</strong> (points spread out).</p>`,quickCheck:{question:`Temperature rises and ice cream sales rise. This is:`,options:[`Negative correlation`,`No correlation`,`Positive correlation`,`Causation`],correct:2,explanation:`Both variables increase together — positive correlation.`}},{title:`Line of Best Fit`,content:`<p>A <strong>line of best fit</strong> goes through the middle of the data. Use it to predict values.</p><p><strong>Interpolation</strong> = predicting within the data range (reliable).</p><p><strong>Extrapolation</strong> = predicting outside the data range (less reliable).</p><div class="formula-box">Correlation ≠ Causation — two things can be related without one causing the other!</div>`,quickCheck:{question:`Using a line of best fit to predict a value beyond your data is called:`,options:[`Interpolation`,`Extrapolation`,`Correlation`,`Estimation`],correct:1,explanation:`Extrapolation predicts outside the data range — less reliable than interpolation.`}}]},fractions:{estimatedMinutes:16,keyPoints:[`To add/subtract fractions, find a common denominator`,`To multiply: multiply tops and bottoms separately`,`To divide: flip the second fraction and multiply`,`Always simplify your final answer`],sections:[{title:`Adding & Subtracting Fractions`,content:`<p>To add or subtract fractions, the <strong>denominators must be the same</strong>.</p><p><strong>Example:</strong> 2/3 + 1/4. LCD = 12. So 8/12 + 3/12 = 11/12.</p><p>For mixed numbers, convert to improper fractions first: 2¾ = 11/4.</p>`,quickCheck:{question:`Calculate 1/3 + 1/6.`,options:[`2/9`,`1/2`,`2/6`,`1/9`],correct:1,explanation:`LCD = 6. 2/6 + 1/6 = 3/6 = 1/2.`}},{title:`Multiplying & Dividing Fractions`,content:`<p><strong>Multiply:</strong> multiply numerators, multiply denominators. Simplify.</p><div class="formula-box">a/b × c/d = ac/bd</div><p><strong>Divide:</strong> flip the second fraction (reciprocal) then multiply.</p><div class="formula-box">a/b ÷ c/d = a/b × d/c</div><p><strong>Example:</strong> 3/5 ÷ 2/3 = 3/5 × 3/2 = 9/10.</p>`,quickCheck:{question:`Calculate 2/3 × 3/4.`,options:[`6/12 = 1/2`,`5/7`,`6/7`,`2/4`],correct:0,explanation:`2×3 / 3×4 = 6/12 = 1/2.`}}]},"ratio-proportion":{estimatedMinutes:16,keyPoints:[`Simplify ratios by dividing both parts by the HCF`,`To share an amount: find total parts, divide, then multiply`,`Direct proportion: y = kx (linear through origin)`,`Inverse proportion: y = k/x (as one goes up the other goes down)`],sections:[{title:`Simplifying and Sharing Ratios`,content:`<p><strong>Simplify</strong> by dividing both sides by their HCF. 15:25 → ÷5 → 3:5.</p><p><strong>Sharing:</strong> Add the parts to get the total, divide the amount, then multiply.</p><p><strong>Example:</strong> Share £48 in the ratio 3:5. Total = 8 parts. Each = £6. Shares: £18 and £30.</p>`,quickCheck:{question:`Share £100 in the ratio 2:3.`,options:[`£40 and £60`,`£50 and £50`,`£20 and £80`,`£30 and £70`],correct:0,explanation:`Total = 5 parts. Each = £20. 2×20=£40, 3×20=£60.`}},{title:`Direct & Inverse Proportion`,content:`<p><strong>Direct proportion:</strong> y = kx. As x doubles, y doubles.</p><p><strong>Inverse proportion:</strong> y = k/x. As x doubles, y halves.</p><p><strong>Example:</strong> y ∝ x. When x=3, y=15. So k=5. When x=7, y=35.</p>`,quickCheck:{question:`y is inversely proportional to x. y=8 when x=5. Find y when x=10.`,options:[`4`,`16`,`2`,`40`],correct:0,explanation:`k = 8 × 5 = 40. When x=10: y = 40/10 = 4.`}}]},surds:{estimatedMinutes:16,keyPoints:[`A surd is an irrational root like √2, √3, √5`,`Simplify by finding the largest square factor: √50 = √(25×2) = 5√2`,`Add/subtract like surds: 3√2 + 5√2 = 8√2`,`Rationalise denominators by multiplying by √n/√n`],sections:[{title:`Simplifying Surds`,content:`<p>Find the <strong>largest perfect square factor</strong> inside the root.</p><p><strong>Example:</strong> √72 = √(36 × 2) = 6√2</p><p><strong>Example:</strong> √48 = √(16 × 3) = 4√3</p><div class="formula-box">√(a × b) = √a × √b</div>`,quickCheck:{question:`Simplify √75.`,options:[`5√3`,`3√5`,`25√3`,`√75`],correct:0,explanation:`√75 = √(25×3) = 5√3.`}},{title:`Rationalising the Denominator`,content:`<p>We don't leave surds in the denominator. Multiply top and bottom by the surd.</p><p><strong>Example:</strong> 4/√2 = (4×√2)/(√2×√2) = 4√2/2 = 2√2</p><p>For (a+√b) denominators, multiply by the <strong>conjugate</strong> (a−√b).</p>`,quickCheck:{question:`Rationalise 6/√3.`,options:[`2√3`,`6√3`,`6√3/3`,`2√3`],correct:0,explanation:`6/√3 × √3/√3 = 6√3/3 = 2√3.`}}]},"straight-lines":{estimatedMinutes:16,keyPoints:[`y = mx + c: m is the gradient, c is the y-intercept`,`Gradient = rise/run = (y₂−y₁)/(x₂−x₁)`,`Parallel lines have the same gradient`,`Perpendicular gradients multiply to −1`],sections:[{title:`y = mx + c`,content:`<p>Every straight line can be written as <strong>y = mx + c</strong> where:</p><ul><li><strong>m</strong> = gradient (steepness)</li><li><strong>c</strong> = y-intercept (where it crosses the y-axis)</li></ul><div class="formula-box">Gradient = (y₂ − y₁) / (x₂ − x₁)</div>`,quickCheck:{question:`What is the gradient of y = −3x + 7?`,options:[`7`,`3`,`−3`,`−7`],correct:2,explanation:`In y = mx + c, m = −3.`}},{title:`Parallel & Perpendicular Lines`,content:`<p><strong>Parallel lines</strong> have the same gradient.</p><p><strong>Perpendicular lines</strong> have gradients that multiply to −1.</p><p>If one line has gradient m, the perpendicular has gradient −1/m.</p><p><strong>Example:</strong> Line has gradient 4. Perpendicular gradient = −1/4.</p>`,quickCheck:{question:`A line has gradient 2/3. The perpendicular gradient is:`,options:[`−2/3`,`−3/2`,`3/2`,`2/3`],correct:1,explanation:`Perpendicular: flip and negate. −3/2.`}}]},"quadratic-graphs":{estimatedMinutes:16,keyPoints:[`Quadratic graphs are U-shaped parabolas`,`If a > 0 the parabola opens upward; if a < 0 it opens downward`,`The turning point is the vertex: found by completing the square`,`x-intercepts (roots) are where y = 0`],sections:[{title:`Sketching Quadratics`,content:`<p>To sketch y = ax² + bx + c, find:</p><ul><li><strong>y-intercept:</strong> set x = 0 → y = c</li><li><strong>x-intercepts (roots):</strong> set y = 0 and solve</li><li><strong>Turning point:</strong> x = −b/(2a), then find y</li></ul><p>If a > 0: U-shape (minimum). If a < 0: ∩-shape (maximum).</p>`,quickCheck:{question:`y = x² − 2x − 3. Where does it cross the y-axis?`,options:[`(0,−3)`,`(0,3)`,`(−3,0)`,`(0,−2)`],correct:0,explanation:`Set x = 0: y = 0 − 0 − 3 = −3. Crosses at (0,−3).`}}]},transformations:{estimatedMinutes:14,keyPoints:[`y = f(x) + a translates up by a`,`y = f(x − a) translates right by a`,`y = −f(x) reflects in the x-axis`,`y = f(−x) reflects in the y-axis`],sections:[{title:`Graph Transformations`,content:`<p>Starting from y = f(x):</p><ul><li><strong>y = f(x) + a</strong> → shift UP by a</li><li><strong>y = f(x) − a</strong> → shift DOWN by a</li><li><strong>y = f(x − a)</strong> → shift RIGHT by a</li><li><strong>y = f(x + a)</strong> → shift LEFT by a</li><li><strong>y = −f(x)</strong> → reflect in x-axis</li><li><strong>y = f(−x)</strong> → reflect in y-axis</li><li><strong>y = af(x)</strong> → stretch vertically by factor a</li><li><strong>y = f(ax)</strong> → compress horizontally by factor 1/a</li></ul>`,quickCheck:{question:`y = f(x+3) is a translation:`,options:[`3 right`,`3 left`,`3 up`,`3 down`],correct:1,explanation:`Inside the brackets with +3 means shift LEFT by 3.`}}]},"rates-of-change":{estimatedMinutes:14,keyPoints:[`Gradient of distance-time graph = speed`,`Gradient of speed-time graph = acceleration`,`Area under speed-time graph = distance`,`Curved graphs mean changing rates`],sections:[{title:`Distance-Time & Speed-Time Graphs`,content:`<p><strong>Distance-time:</strong> gradient = speed. Steeper = faster. Horizontal = stationary.</p><p><strong>Speed-time:</strong> gradient = acceleration. Area under = distance.</p><p>Curved lines mean the rate is changing (acceleration on a d-t graph means speed is increasing).</p>`,quickCheck:{question:`On a speed-time graph, a horizontal line at 20 m/s for 5 seconds. What distance?`,options:[`4 m`,`25 m`,`100 m`,`20 m`],correct:2,explanation:`Area = speed × time = 20 × 5 = 100 m.`}}]},"calculus-basics":{estimatedMinutes:20,keyPoints:[`Differentiation finds the gradient function: dy/dx`,`Power rule: if y = xⁿ then dy/dx = nxⁿ⁻¹`,`At a stationary point, dy/dx = 0`,`Integration is the reverse of differentiation: add 1 to the power, divide by new power, add C`],sections:[{title:`Differentiation — The Power Rule`,content:`<p><strong>Differentiation</strong> finds the rate of change (gradient) of a function.</p><div class="formula-box">If y = xⁿ, then dy/dx = nxⁿ⁻¹</div><p><strong>Example:</strong> y = 3x⁴ → dy/dx = 12x³</p><p><strong>Example:</strong> y = 5x² − 2x + 7 → dy/dx = 10x − 2</p><p>Constants disappear: derivative of 7 is 0.</p>`,quickCheck:{question:`Find dy/dx when y = 4x³ + 2x.`,options:[`12x² + 2`,`12x² + 2x`,`4x² + 2`,`12x + 2`],correct:0,explanation:`4×3x² + 2×1 = 12x² + 2.`}},{title:`Integration — The Reverse`,content:`<p><strong>Integration</strong> reverses differentiation. Add 1 to the power, divide by the new power, add C.</p><div class="formula-box">∫ xⁿ dx = xⁿ⁺¹/(n+1) + C</div><p><strong>Example:</strong> ∫ 6x² dx = 6x³/3 + C = 2x³ + C</p><p>Always remember the constant of integration (+C) for indefinite integrals.</p>`,quickCheck:{question:`∫ 4x³ dx = ?`,options:[`x⁴ + C`,`12x² + C`,`4x⁴ + C`,`x⁴/4 + C`],correct:0,explanation:`4x⁴/4 + C = x⁴ + C.`}},{title:`Stationary Points`,content:`<p>A <strong>stationary point</strong> is where dy/dx = 0. The gradient is zero — the curve is momentarily flat.</p><p><strong>To find them:</strong> differentiate, set dy/dx = 0, solve for x, then find y.</p><p><strong>Nature:</strong> Use the second derivative d²y/dx². If positive → minimum. If negative → maximum.</p>`,quickCheck:{question:`y = x² − 6x + 10. Find the x-coordinate of the stationary point.`,options:[`x = 3`,`x = −3`,`x = 6`,`x = 10`],correct:0,explanation:`dy/dx = 2x − 6. Set to 0: 2x − 6 = 0, x = 3.`}}]}};function aa(e){let t=[...L,...xi];for(let n of t){let t=n.topics.find(t=>t.id===e);if(t)return t.subtopics;for(let t of n.topics)if(t.subtopics.some(t=>t.id===e))return t.subtopics}return[]}function oa(e){let t=[...L,...xi];for(let n of t)for(let t of n.topics){for(let r of t.subtopics)if(r.id===e)return{subjectId:n.id,subjectName:n.name,subjectColor:n.color,topicId:t.id,topicName:t.name,subtopicName:r.name};if(t.id===e)return{subjectId:n.id,subjectName:n.name,subjectColor:n.color,topicId:t.id,topicName:t.name,subtopicName:t.name}}return null}function sa({title:e,subjectId:t,subjectName:n,topicId:r,keyPoints:i,sections:a,xpReward:o,onFinish:s}){let[c,l]=(0,d.useState)(0),[u,f]=(0,d.useState)(new Set),[p,m]=(0,d.useState)(null),[h,g]=(0,d.useState)(!1),[_,v]=(0,d.useState)(``),y=a[c],b=!y?.quickCheck||h,x=Math.round(u.size/a.length*100),S=e=>{e<0||e>=a.length||(l(e),m(null),g(!1),window.scrollTo({top:0,behavior:`smooth`}))};return y?(0,I.jsx)(`div`,{className:`max-w-7xl mx-auto px-4 sm:px-6 lg:px-10 py-8`,children:(0,I.jsxs)(`div`,{className:`grid grid-cols-1 lg:grid-cols-3 gap-8`,children:[(0,I.jsxs)(`div`,{className:`lg:col-span-2 space-y-5`,children:[(0,I.jsx)(`div`,{className:`flex gap-1.5 flex-wrap`,children:a.map((e,t)=>(0,I.jsxs)(`button`,{onClick:()=>{(t<=c||u.has(t))&&S(t)},className:`text-xs px-3 py-1.5 rounded-full border transition-all cursor-pointer whitespace-nowrap ${t===c?`bg-purple-600/30 border-purple-500/60 text-purple-300`:u.has(t)?`bg-emerald-500/10 border-emerald-500/30 text-emerald-400`:`bg-white/4 border-white/10 text-slate-500`}`,children:[u.has(t)&&(0,I.jsx)(`i`,{className:`ri-check-line mr-1 text-xs`}),t+1,`. `,e.title]},t))}),(0,I.jsxs)(`div`,{className:`bg-white border-2 border-purple-400 rounded-2xl p-7`,children:[(0,I.jsxs)(`div`,{className:`flex items-center gap-3 mb-5 pb-4 border-b border-slate-100`,children:[(0,I.jsx)(`div`,{className:`w-8 h-8 flex items-cente `],correctAnswer:0,explanation:`b² − 4ac = 16 − 20 = −4.`,points:2},{id:`q4`,question:`If the discriminant is negative, how many real solutions exist?`,options:[`None`,`One`,`Two`,`Infinite`],correctAnswer:0,explanation:`A negative discriminant means no real solutions.`,points:2},{id:`q5`,question:`Using the quadratic formula, solve 2x² − 5x + 2 = 0.`,options:[`x=2 and x=0.5`,`x=1 and x=2`,`x=−2 and x=0.5`,`x=4 and x=1`],correctAnswer:0,explanation:`x = (5 ± √(25−16))/4 = (5 ± 3)/4 giving x = 2 or x = 0.5.`,points:2},{id:`q6`,question:`What does a discriminant of zero tell us?`,options:[`Two solutions`,`One repeated solution`,`No solutions`,`Infinitely many`],correctAnswer:1,explanation:`When b² − 4ac = 0, there is exactly one repeated solution.`,points:2},{id:`q7`,question:`Factorise x² − 9.`,options:[`(x−3)²`,`(x+3)(x−3)`,`(x−9)(x+1)`,`(x+9)(x−1)`],correctAnswer:1,explanation:`Difference of two squares: x² − 9 = (x+3)(x−3).`,points:2},{id:`q8`,question:`What is x² + 6x + 9 as a perfect square?`,options:[`(x+3)²`,`(x+6)²`,`(x+9)²`,`(x+4.5)²`],correctAnswer:0,explanation:`x² + 6x + 9 = (x+3)².`,points:2},{id:`q9`,question:`Which value of c makes x² + 8x + c a perfect square?`,options:[`4`,`8`,`16`,`64`],correctAnswer:2,explanation:`Half of 8 is 4; 4² = 16. So c = 16 gives (x+4)².`,points:2},{id:`q10`,question:`Solve x² = 49.`,options:[`x = 7 only`,`x = −7 only`,`x = ±7`,`x = ±49`],correctAnswer:2,explanation:`Taking square roots of both sides gives x = ±7.`,points:2},{id:`q11`,question:`Axis of symmetry for y = x² − 4x + 3?`,options:[`x = −2`,`x = 2`,`x = 3`,`x = 4`],correctAnswer:1,explanation:`Axis of symmetry = −b/(2a) = 4/2 = 2.`,points:2},{id:`q12`,question:`Solve x² + x − 6 = 0.`,options:[`x=2 and x=−3`,`x=−2 and x=3`,`x=3 and x=2`,`x=−6 and x=1`],correctAnswer:0,explanation:`(x+3)(x−2) = 0, so x = −3 or x = 2.`,points:2},{id:`q13`,question:`Expand (x + 5)².`,options:[`x² + 25`,`x² + 5x + 25`,`x² + 10x + 25`,`x² + 25x + 5`],correctAnswer:2,explanation:`(x+5)² neq1`,question:`Solve: 3x + 2 > 11.`,options:[`x > 3`,`x < 3`,`x > 4`,`x ≥ 3`],correctAnswer:0,explanation:`3x > 9, x > 3.`,points:2},{id:`ineq2`,question:`Solve: 5 − 2x ≤ 1.`,options:[`x ≤ 2`,`x ≥ 2`,`x ≤ 3`,`x ≥ 3`],correctAnswer:1,explanation:`−2x ≤ −4, x ≥ 2 (flip sign when dividing by negative).`,points:2},{id:`ineq3`,question:`Integer values satisfying −2 < x ≤ 3?`,options:[`−1, 0, 1, 2, 3`,`−2, −1, 0, 1, 2, 3`,`−1, 0, 1, 2`,`0, 1, 2, 3`],correctAnswer:0,explanation:`x > −2 (not including −2) and ≤ 3 (including 3): −1, 0, 1, 2, 3.`,points:2},{id:`ineq4`,question:`Solve: 4x − 3 < 2x + 5.`,options:[`x < 2`,`x < 4`,`x > 4`,`x < 1`],correctAnswer:1,explanation:`2x < 8, x < 4.`,points:2},{id:`ineq5`,question:`When multiplying by a negative, what must you do to an inequality?`,options:[`Nothing changes`,`Flip the inequality sign`,`Add the negative to both sides`,`Keep the sign`],correctAnswer:1,explanation:`Multiplying or dividing by a negative flips the direction of the inequality.`,points:2},{id:`ineq6`,question:`How to represent x > 2 on a number line?`,options:[`Closed circle at 2, arrow left`,`Open circle at 2, arrow right`,`Closed circle at 2, arrow right`,`Open circle at 2, arrow left`],correctAnswer:1,explanation:`x > 2 (strict) uses an open circle (not included) with arrow going right.`,points:2},{id:`ineq7`,question:`Solve: 2(x + 1) ≥ 8.`,options:[`x ≥ 2`,`x ≥ 3`,`x ≥ 4`,`x ≥ 5`],correctAnswer:1,explanation:`2x + 2 ≥ 8, 2x ≥ 6, x ≥ 3.`,points:2},{id:`ineq8`,question:`Which is NOT an inequality symbol?`,options:[`&lt;`,`≥`,`≠`,`=`],correctAnswer:3,explanation:`= is an equals sign, not an inequality. The others are inequality symbols.`,points:2},{id:`ineq9`,question:`Solve: −3x > 12.`,options:[`x > −4`,`x < −4`,`x > 4`,`x < 4`],correctAnswer:1,explanation:`Dividing by −3 flips the sign: x < −4.`,points:2},{id:`ineq10`,question:`Integer values of n where 3 ≤ 2n − 1 < 9?`,options:[`n = 2, 3, 4`,`n = 2, 3, 4, 5`,`n = 3, 4, 5`,`n = 1, 2, 3, 4`],correctAnswer:0,e
