er of solutions`,`Discriminant > 0: two solutions; = 0: one; < 0: no real solutions`],sections:[{title:`What is a Quadratic?`,content:`<p>A <strong>quadratic equation</strong> is any equation where the highest power of <em>x</em> is 2. The standard form is:</p>

<p>For example: <strong>x² + 5x + 6 = 0</strong> is quadratic, but <strong>3x + 5 = 0</strong> is not (highest power is 1).</p>
<p>The constants <em>a</em>, <em>b</em>, and <em>c</em> can be any numbers, but <strong>a must not equal 0</strong> — otherwise it's no longer quadratic.</p>`,quickCheck:{question:`Which of these is a quadratic equation?`,options:[`5x + 2 = 0`,`x³ - x = 4`,`2x² - 3x + 1 = 0`,`x⁴ = 16`],correct:2,explanation:`2x² - 3x + 1 = 0 has the highest power of x equal to 2, making it quadratic.`}},{title:`Method 1 — Factorising`,content:`<p>Factorising is the quickest method when it works. We split the quadratic into two brackets.</p>
<p><strong>Example:</strong> Solve x² + 5x + 6 = 0</p>
<p>We need two numbers that <em>multiply</em> to give <strong>+6</strong> and <em>add</em> to give <strong>+5</strong>.</p>
<p>Those numbers are <strong>+2</strong> and <strong>+3</strong>:</p>
<div class="formula-box">(x + 2)(x + 3) = 0</div>
<p>So either <strong>x + 2 = 0 → x = −2</strong>, or <strong>x + 3 = 0 → x = −3</strong>.</p>
<p>Always set each bracket equal to zero separately!</p>`,quickCheck:{question:`Factorise x² − 7x + 12 = 0. What are the solutions?`,options:[`x = 3 and x = 4`,`x = −3 and x = −4`,`x = 6 and x = 2`,`x = 1 and x = 12`],correct:0,explanation:`We need numbers that multiply to +12 and add to −7: those are −3 and −4. So (x−3)(x−4) = 0, giving x = 3 or x = 4.`}},{title:`Method 2 — The Quadratic Formula`,content:`<p>When factorising is tricky, the <strong>quadratic formula always works</strong>:</p>
<div class="formula-box">x = (−b ± √(b² − 4ac)) / 2a</div>
<p><strong>Example:</strong> Solve 2x² − 7x + 3 = 0</p>
<p>Here a = 2, b = −7, c = 3. Substituting:</p>
<div class="formula-box">x = (7 ± √(49 − 24)) / 4 = (7 ± √25) / 4 = (7 ± 5) / 4</div>
<p>So <strong>x = 12/4 = 3</strong> or <strong>x = 2/4 = ½</strong>.</p>
<p>Always identify a, b, c first — and be careful with negative signs!</p>`,quickCheck:{question:`For 3x² + 2x − 1 = 0, what are the values of a, b, and c?`,options:[`a=3, b=2, c=−1`,`a=3, b=−2, c=1`,`a=2, b=3, c=−1`,`a=1, b=2, c=3`],correct:0,explanation:`Reading directly from the standard form ax² + bx + c = 0: a=3, b=2, c=−1.`}},{title:`The Discriminant`,content:`<p>The expression <strong>b² − 4ac</strong> is called the <em>discriminant</em>. It tells us how many solutions exist <em>before</em> we solve.</p>
<ul>
  <li><strong>b² − 4ac &gt; 0</strong>: Two distinct real solutions</li>
  <li><strong>b² − 4ac = 0</strong>: Exactly one repeated solution</li>
  <li><strong>b² − 4ac &lt; 0</strong>: No real solutions</li>
</ul>
<p><strong>Example:</strong> For x² + 2x + 5 = 0: discriminant = 4 − 20 = −16 &lt; 0, so <strong>no real solutions</strong>.</p>`,quickCheck:{question:`The discriminant of a quadratic is 0. What does this mean?`,options:[`No solutions`,`Exactly one repeated solution`,`Two different solutions`,`The equation is linear`],correct:1,explanation:`When b² − 4ac = 0, the ± gives the same answer both times: one repeated solution.`}}],relatedTopics:[{id:`geometry`,name:`Geometry & Measures`,subjectId:`maths`},{id:`graphs`,name:`Graphs & Functions`,subjectId:`maths`},{id:`number`,name:`Number`,subjectId:`maths`}]},geometry:{id:`geometry`,subjectId:`maths`,subjectName:`Mathematics`,topicId:`geometry`,topicName:`Geometry & Measures`,title:`Geometry & Measures — Complete Guide`,estimatedMinutes:30,xpReward:40,keyPoints:[`Angles in a triangle sum to 180°; in a quadrilateral to 360°`,`Area of circle = πr²; circumference = 2πr`,`Volume of a prism = cross-section area × length`,`Pythagoras: a² + b² = c² for right-angled triangles`,`SOH CAH TOA — links angles to sides in right-angled triangles`],sections:[{title:`Angles — Rules and Properties`,content:`<p>Angle rules are the foundation of geometry. You must know these cold:</p>
<ul>
  <li><strong>Angles on a straight line</strong> sum to 180°</li>
  <li><strong>Angles around a point</strong> sum to 360°</li>
  <li><strong>Vertically opposite angles</strong> are equal</li>
  <li><strong>Angles in a triangle</strong> sum to 180°</li>
  <li><strong>Angles in a quadrilateral</strong> sum to 360°</li>
</ul>
<p><strong>Parallel lines:</strong> When a transversal crosses parallel lines:</p>
<ul>
  <li><strong>Alternate angles</strong> (Z-angles) are equal</li>
  <li><strong>Co-interior angles</strong> (C-angles) add up to 180°</li>
  <li><strong>Corresponding angles</strong> (F-angles) are equal</li>
</ul>
<p><strong>Polygons:</strong> Sum of interior angles = (n − 2) × 180°, where n = number of sides. For a regular polygon, each interior angle = (n − 2) × 180° ÷ n.</p>`,quickCheck:{question:`A regular hexagon has 6 sides. What is each interior angle?`,options:[`90°`,`108°`,`120°`,`135°`],correct:2,explanation:`Sum of interior angles = (6 − 2) × 180° = 720°. Each angle = 720° ÷ 6 = 120°.`}},{title:`Area & Perimeter`,content:`<p>Learn these area formulas — they are used constantly:</p>
<ul>
  <li><strong>Rectangle:</strong> A = length × width</li>
  <li><strong>Triangle:</strong> A = ½ × base × height</li>
  <li><strong>Parallelogram:</strong> A = base × perpendicular height</li>
  <li><strong>Trapezium:</strong> A = ½(a + b) × h, where a and b are the parallel sides</li>
  <li><strong>Circle:</strong> A = πr² | Circumference = 2πr (or πd)</li>
</ul>
<p><strong>Compound shapes:</strong> Split into simpler shapes, find each area, then add or subtract as needed.</p>
<p><strong>Arc length</strong> = (θ/360) × 2πr &nbsp;|&nbsp; <strong>Sector area</strong> = (θ/360) × πr², where θ is the angle in degrees.</p>
<div class="formula-box">Always include units! Area uses units², e.g. cm², m²</div>`,quickCheck:{question:`A circle has radius 5 cm. What is its area? (use π ≈ 3.14)`,options:[`15.7 cm²`,`31.4 cm²`,`78.5 cm²`,`25 cm²`],correct:2,explanation:`A = πr² = 3.14 × 5² = 3.14 × 25 = 78.5 cm².`}},{title:`Volume & Surface Area of 3D Shapes`,content:`<p>Volume tells us how much space a 3D shape occupies. Surface area is the total area of all faces.</p>
<ul>
  <li><strong>Cuboid:</strong> V = l × w × h</li>
  <li><strong>Prism:</strong> V = cross-section area × length</li>
  <li><strong>Cylinder:</strong> V = πr²h | Curved surface area = 2πrh</li>
  <li><strong>Cone:</strong> V = ⅓πr²h | Curved surface area = πrl, where l = slant height</li>
  <li><strong>Sphere:</strong> V = ⁴⁄₃πr³ | Surface area = 4πr²</li>
  <li><strong>Pyramid:</strong> V = ⅓ × base area × height</li>
</ul>
<p><strong>Compound volumes:</strong> Add volumes of combined shapes, or subtract for hollow shapes.</p>
<div class="formula-box">Volume uses units³, e.g. cm³, m³</div>`,quickCheck:{question:`A cylinder has radius 3 cm and height 10 cm. What is its volume? (π ≈ 3.14)`,options:[`94.2 cm³`,`188.4 cm³`,`282.6 cm³`,`942 cm³`],correct:2,explanation:`V = πr²h = 3.14 × 3² × 10 = 3.14 × 9 × 10 = 282.6 cm³.`}},{title:`Pythagoras' Theorem`,content:`<p><strong>Pythagoras' Theorem</strong> applies to <em>right-angled triangles only</em>.</p>
<div class="formula-box">a² + b² = c²</div>
<p>Where <strong>c</strong> is the <em>hypotenuse</em> — always the side opposite the right angle and the longest side.</p>
<p><strong>Finding the hypotenuse:</strong> c = √(a² + b²)</p>
<p><strong>Finding a shorter side:</strong> a = √(c² − b²)</p>
<p><strong>Example:</strong> A right-angled triangle has legs 6 cm and 8 cm. Find the hypotenuse.</p>
<div class="formula-box">c = √(6² + 8²) = √(36 + 64) = √100 = 10 cm</div>
<p>Pythagoras also works in 3D — apply it twice to find diagonals of cuboids.</p>`,quickCheck:{question:`A right-angled triangle has legs 5 cm and 12 cm. What is the hypotenuse?`,options:[`10 cm`,`11 cm`,`13 cm`,`17 cm`],correct:2,explanation:`c = √(5² + 12²) = √(25 + 144) = √169 = 13 cm. A classic 5-12-13 Pythagorean triple.`}},{title:`Trigonometry — SOH CAH TOA`,content:`<p>Trigonometry links the angles and sides of <strong>right-angled triangles</strong>. Label the sides first:</p>
<ul>
  <li><strong>Hypotenuse (H)</strong> — opposite the right angle, always longest</li>
  <li><strong>Opposite (O)</strong> — the side opposite the angle you are using</li>
  <li><strong>Adjacent (A)</strong> — the side next to the angle you are using</li>
</ul>
<div class="formula-box">sin θ = O/H &nbsp;|&nbsp; cos θ = A/H &nbsp;|&nbsp; tan θ = O/A</div>
<p>Memory aid: <strong>SOH CAH TOA</strong></p>
<p><strong>Finding a side:</strong> Rearrange the formula. E.g. if sin 30° = x/10, then x = 10 × sin 30° = 5.</p>
<p><strong>Finding an angle:</strong> Use inverse trig. E.g. if sin θ = 0.5, then θ = sin⁻¹(0.5) = 30°.</p>
<p>For non-right-angled triangles at IGCSE, you may need the <strong>Sine Rule</strong> or <strong>Cosine Rule</strong>.</p>`,quickCheck:{question:`In a right-angled triangle, the angle is 40°, the hypotenuse is 15 cm. Which formula gives the opposite side?`,options:[`Opposite = 15 × cos 40°`,`Opposite = 15 × sin 40°`,`Opposite = 15 × tan 40°`,`Opposite = 15 ÷ sin 40°`],correct:1,explanation:`sin θ = O/H, so O = H × sin θ = 15 × sin 40°. SOH: sin = Opposite over Hypotenuse.`}}],relatedTopics:[{id:`algebra`,name:`Algebra`,subjectId:`maths`},{id:`statistics`,name:`Statistics & Probability`,subjectId:`maths`},{id:`number`,name:`Number`,subjectId:`maths`}]},statistics:{id:`statistics`,subjectId:`maths`,subjectName:`Mathematics`,topicId:`statistics`,topicName:`Statistics & Probability`,title:`Statistics & Probability — Complete Guide`,estimatedMinutes:28,xpReward:38,keyPoints:[`Mean = sum of values ÷ number of values; Median = middle value; Mode = most frequent`,`Histograms use frequency density = frequency ÷ class width`,`Box plots show: minimum, Q1, median, Q3, maximum`,`For mutually exclusive events: P(A or B) = P(A) + P(B)`,`Positive correlation: as x increases, y increases; negative: as x increases, y decreases`],sections:[{title:`Averages — Mean, Median, Mode & Range`,content:`<p>Averages summarise a data set. Know all three and when to use them:</p>
<ul>
  <li><strong>Mean:</strong> Add all values and divide by the count. Most commonly used, but affected by extreme values (outliers).</li>
  <li><strong>Median:</strong> Order the data, find the middle value. For n values, the median is at position (n+1)/2. Not affected by outliers.</li>
  <li><strong>Mode:</strong> The value that appears most often. Data can have no mode, one mode, or more than one.</li>
  <li><strong>Range:</strong> Maximum − Minimum. Measures spread, not an average.</li>
</ul>
<div class="formula-box">Mean = Σx / n &nbsp;|&nbsp; Median = value at position (n+1)/2</div>
<p><strong>For grouped data:</strong> Use midpoints of each class interval to estimate the mean: Mean ≈ Σ(midpoint × frequency) ÷ Σfrequency.</p>
<p><strong>Choosing the right average:</strong> Mean for symmetric data, Median when outliers exist, Mode for categorical data.</p>`,quickCheck:{question:`Find the median of: 3, 7, 2, 9, 5, 1, 8`,options:[`5`,`6`,`7`,`3.5`],correct:0,explanation:`Order the data: 1, 2, 3, 5, 7, 8, 9. There are 7 values, so the median is at position (7+1)/2 = 4th value = 5.`}},{title:`Frequency Tables & Histograms`,content:`<p><strong>Frequency tables</strong> organise data into class intervals, showing how many values fall in each group.</p>
<p><strong>Histograms</strong> are like bar charts but for continuous data. Key difference: bars touch each other.</p>
<div class="formula-box">Frequency Density = Frequency ÷ Class Width</div>
<p>The <em>y-axis</em> of a histogram always shows <strong>Frequency Density</strong>, not frequency. The area of each bar represents frequency.</p>
<p><strong>Reading a histogram:</strong> Frequency = Frequency Density × Class Width. To find the number of values in a class, multiply the bar height by the bar width.</p>
<p><strong>Example:</strong> A bar from 10 to 20 (width = 10) has frequency density 3. Frequency = 3 × 10 = 30 values in that class.</p>`,quickCheck:{question:`A histogram bar spans from 20 to 30 and has a frequency density of 4. How many values are in this class?`,options:[`4`,`10`,`40`,`24`],correct:2,explanation:`Frequency = Frequency Density × Class Width = 4 × (30 − 20) = 4 × 10 = 40.`}},{title:`Box Plots & Cumulative Frequency`,content:`<p>A <strong>cumulative frequency graph</strong> plots running totals. It's used to estimate the median and quartiles.</p>
<ul>
  <li><strong>Median</strong> — read off at ½ × total frequency</li>
  <li><strong>Lower Quartile (Q1)</strong> — at ¼ × total frequency</li>
  <li><strong>Upper Quartile (Q3)</strong> — at ¾ × total frequency</li>
  <li><strong>Interquartile Range (IQR)</strong> = Q3 − Q1</li>
</ul>
<p>A <strong>box plot (box-and-whisker diagram)</strong> shows five key values:</p>
<div class="formula-box">Minimum | Q1 | Median | Q3 | Maximum</div>
<p>The box spans from Q1 to Q3 (showing the IQR). Whiskers extend to the minimum and maximum. The IQR shows where the middle 50% of data lies.</p>
<p>Box plots allow easy comparison between two data sets — compare medians and IQRs.</p>`,quickCheck:{question:`In a box plot, Q1 = 15 and Q3 = 35. What is the Interquartile Range?`,options:[`15`,`20`,`35`,`50`],correct:1,explanation:`IQR = Q3 − Q1 = 35 − 15 = 20. The IQR represents the spread of the middle 50% of the data.`}},{title:`Probability & Tree Diagrams`,content:`<p>Probability measures how likely an event is — always between 0 and 1.</p>
<div class="formula-box">P(event) = number of favourable outcomes ÷ total outcomes</div>
<p><strong>Key rules:</strong></p>
<ul>
  <li>P(not A) = 1 − P(A)</li>
  <li><strong>Mutually exclusive events</strong> (can't both happen): P(A or B) = P(A) + P(B)</li>
  <li><strong>Independent events</strong> (one doesn't affect the other): P(A and B) = P(A) × P(B)</li>
</ul>
<p><strong>Tree diagrams</strong> help with two or more events. Multiply along branches to find the probability of combined outcomes. Add the relevant branch probabilities for "or" situations.</p>
<p><strong>Without replacement:</strong> When drawing two items without replacing the first, the second probability changes — adjust the denominator.</p>`,quickCheck:{question:`A bag has 3 red and 5 blue balls. Two balls are drawn without replacement. What is P(both red)?`,options:[`9/64`,`3/28`,`6/64`,`3/8`],correct:1,explanation:`P(first red) = 3/8. After removing one red, P(second red) = 2/7. P(both red) = 3/8 × 2/7 = 6/56 = 3/28.`}},{title:`Scatter Graphs & Correlation`,content:`<p>Scatter graphs show the relationship between two variables. Each point represents one pair of values.</p>
<p><strong>Types of correlation:</strong></p>
<ul>
  <li><strong>Positive correlation:</strong> As x increases, y increases. Points slope upward. Example: height vs shoe size.</li>
  <li><strong>Negative correlation:</strong> As x increases, y decreases. Points slope downward. Example: altitude vs temperature.</li>
  <li><strong>No correlation:</strong> No obvious pattern. Example: shoe size vs exam score.</li>
</ul>
<p>Correlation can be <strong>strong</strong> (points close to the line) or <strong>weak</strong> (points spread out).</p>
<p><strong>Line of best fit:</strong> Draw a straight line through the middle of the data (roughly equal numbers of points on each side). Use it to make predictions.</p>
<div class="formula-box">Important: Correlation does NOT mean causation!</div>`,quickCheck:{question:`As the number of hours studied increases, exam scores increase. What type of correlation is this?`,options:[`Negative correlation`,`No correlation`,`Positive correlation`,`Inverse correlation`],correct:2,explanation:`When both variables increase together, it's positive correlation. The scatter graph points would slope upward from left to right.`}}],relatedTopics:[{id:`algebra`,name:`Algebra`,subjectId:`maths`},{id:`geometry`,name:`Geometry & Measures`,subjectId:`maths`},{id:`number`,name:`Number`,subjectId:`maths`}]},"reading-skills":{id:`reading-skills`,subjectId:`english-lang`,subjectName:`English Language`,topicId:`reading-skills`,topicName:`Reading Skills`,title:`Inference and Implicit Meaning`,estimatedMinutes:18,xpReward:25,keyPoints:[`Inference means reading between the lines — finding meaning not directly stated`,`Use evidence (quotations) to support every inference you make`,`Look for connotations — what a word suggests beyond its dictionary meaning`,`Always link back to the writer's purpose and effect on the reader`],sections:[{title:`What is Inference?`,content:`<p><strong>Inference</strong> means drawing a conclusion from evidence that isn't directly stated in the text. It's sometimes called 'reading between the lines'.</p>
<p>When a writer says a character 'clutched the letter, hands trembling', they don't explicitly say the character is nervous — but we <em>infer</em> it from those details.</p>
<p>In GCSE exams, questions like <em>"What do you infer about..."</em> or <em>"What impressions do you get..."</em> require you to make inferences supported by evidence.</p>`,quickCheck:{question:`A text reads: 'She glanced at the door three times before speaking.' What can we infer?`,options:[`She is bored`,`She is anxious or cautious about being overheard`,`She wants to leave the room`,`She is checking the time`],correct:1,explanation:`The repeated glancing at the door suggests she is nervous or cautious — perhaps worried someone might enter or hear her.`}},{title:`Using Textual Evidence`,content:`<p>Every inference you make must be backed up by a <strong>quotation or reference</strong> from the text. This is the P-E-E structure:</p>
<ul>
  <li><strong>Point</strong> — the inference or idea you want to make</li>
  <li><strong>Evidence</strong> — a short, precise quotation from the text</li>
  <li><strong>Explanation</strong> — how the evidence supports your point</li>
</ul>
<p><strong>Weak answer:</strong> "The character seems nervous."</p>
<p><strong>Strong answer:</strong> "The character appears nervous, as suggested by 'hands trembling', which implies she is struggling to maintain her composure."</p>`,quickCheck:{question:`Which answer best uses P-E-E structure?`,options:[`The mood is tense and scary.`,`The writer uses lots of description to create atmosphere.`,`The setting feels threatening, shown by 'the shadows clung to every corner', suggesting darkness consumes the space.`,`There is tension in the story because bad things happen.`],correct:2,explanation:`Option 3 makes a clear point, embeds a precise quotation, and explains how it creates the effect — that's strong P-E-E technique.`}},{title:`Connotations and Word Choice`,content:`<p><strong>Connotations</strong> are the extra layers of meaning a word carries beyond its literal definition. Writers choose words deliberately for their connotations.</p>
<p>For example, 'walked' and 'skulked' both describe movement, but 'skulked' connotes secrecy, shame, or guilt. That choice tells us something about the character.</p>
<p>When analysing, ask yourself: <em>Why did the writer choose this specific word? What does it suggest?</em></p>
<div class="formula-box">Technique → Quotation → Effect on reader</div>`,quickCheck:{question:`The writer describes a building as 'looming'. What connotations does this word carry?`,options:[`Warmth and safety`,`Smallness and fragility`,`Menace, threat, or oppressiveness`,`Age and history`],correct:2,explanation:`'Looming' suggests something large and threatening hanging over the character — it creates a sense of danger or oppressive power.`}},{title:`Writer's Purpose and Effect`,content:`<p>Always think about the <strong>writer's purpose</strong> — why they wrote what they wrote — and the <strong>effect on the reader</strong>.</p>
<p>Common purposes: to inform, to persuade, to entertain, to shock, to create sympathy, to build tension.</p>
<p>Sentence starters that show sophisticated analysis:</p>
<ul>
  <li>"The writer uses... to suggest..."</li>
  <li>"This creates a sense of... for the reader..."</li>
  <li>"The effect of this is..."</li>
  <li>"This could imply that the writer wants the reader to feel..."</li>
</ul>`,quickCheck:{question:`Which phrase best links language to effect on the reader?`,options:[`The writer uses a metaphor.`,`There is a metaphor in the text.`,`The metaphor 'iron fist' implies ruthless control, causing the reader to feel uneasy about the character's power.`,`The writer uses a metaphor to make it more interesting.`],correct:2,explanation:`Option 3 identifies the technique, uses the quotation, and explains the specific effect on the reader — this is what examiners reward.`}}],relatedTopics:[{id:`writing-skills`,name:`Writing Skills`,subjectId:`english-lang`},{id:`language-techniques`,name:`Language Techniques`,subjectId:`english-lang`},{id:`macbeth`,name:`Macbeth`,subjectId:`english-lit`}]},macbeth:{id:`macbeth`,subjectId:`english-lit`,subjectName:`English Literature`,topicId:`macbeth`,topicName:`Macbeth`,title:`Ambition and Power in Macbeth`,estimatedMinutes:22,xpReward:30,keyPoints:[`Macbeth's ambition is the primary driver of the tragedy`,`Lady Macbeth manipulates Macbeth by questioning his masculinity`,`The witches represent fate vs. free will — a key debate in the play`,`Shakespeare wrote for a Jacobean audience who feared regicide`],sections:[{title:`Context: Why Ambition Matters`,content:`<p>Shakespeare wrote Macbeth around <strong>1606</strong>, shortly after the <em>Gunpowder Plot</em> — a failed attempt to assassinate King James I. Regicide (killing a king) was the ultimate crime in Jacobean England.</p>
<p>This context is crucial: Shakespeare's audience would have been horrified by Macbeth's ambition because it leads to the murder of a king. The play was partly a warning about unchecked ambition.</p>
<p>King James I was also fascinated by witchcraft, making the witches especially significant to a contemporary audience.</p>`,quickCheck:{question:`Why would a Jacobean audience find Macbeth's actions particularly shocking?`,options:[`He is a soldier`,`He murders a king, which was seen as the worst possible crime`,`He listens to the witches`,`He is brave in battle`],correct:1,explanation:`Regicide was considered a crime against God and the natural order in Jacobean England — especially sensitive after the 1605 Gunpowder Plot.`}},{title:`Macbeth's Ambition — Key Quotations`,content:`<p>Macbeth is <strong>brave and loyal</strong> at the start of the play, but his 'vaulting ambition' overrides his moral conscience.</p>
<p>Key quote: <em>"I have no spur / To prick the sides of my intent, but only / Vaulting ambition, which o'erleaps itself"</em> (Act 1, Scene 7)</p>
<p>Macbeth <strong>knows</strong> his only motive is ambition — there is no just reason for murder. The metaphor of a horse 'vaulting' too high suggests ambition that goes beyond control and leads to a fall.</p>
<p>This self-awareness makes Macbeth a tragic figure: unlike a villain, he understands the evil he's doing.</p>`,quickCheck:{question:`What does the metaphor 'vaulting ambition, which o'erleaps itself' suggest?`,options:[`Macbeth is physically strong`,`Ambition that overreaches and causes its own downfall`,`Macbeth wants to ride a horse`,`His ambition is admirable and controlled`],correct:1,explanation:`The image of a horse jumping too high and falling on the other side suggests ambition that goes too far and ultimately destroys itself — foreshadowing Macbeth's fate.`}},{title:`Lady Macbeth — The Greater Ambition?`,content:`<p>Lady Macbeth is arguably more ambitious than Macbeth in Act 1. She calls on spirits to <em>"unsex me here"</em> and fill her with cruelty — she wants to suppress her femininity to commit murder.</p>
<p>She manipulates Macbeth by attacking his masculinity: <em>"When you durst do it, then you were a man."</em></p>
<p>However, by Act 5, the roles have reversed. Lady Macbeth is destroyed by guilt (the sleepwalking scene), while Macbeth has become desensitised to violence.</p>
<p>Shakespeare seems to suggest that ambition without conscience leads to psychological destruction.</p>`,quickCheck:{question:`How does Lady Macbeth persuade Macbeth to commit murder?`,options:[`She threatens him with the witches`,`She tells him he will become king peacefully`,`She questions his masculinity and bravery`,`She says he has no choice`],correct:2,explanation:`Lady Macbeth knows her husband's weakness — his pride in his masculinity. She says he was only brave when he planned the murder, implying cowardice if he backs out.`}},{title:`How to Structure an Essay Response`,content:`<p>For a 30-mark Macbeth essay, structure is everything. A strong response has:</p>
<ul>
  <li><strong>Introduction</strong>: State your overall argument — don't just repeat the question</li>
  <li><strong>Paragraph 1</strong>: First key point with quotation and analysis</li>
  <li><strong>Paragraph 2</strong>: Second point — perhaps with an alternative view</li>
  <li><strong>Paragraph 3</strong>: Context (Jacobean values, Shakespeare's intentions)</li>
  <li><strong>Conclusion</strong>: Summarise and give your overall judgement</li>
</ul>
<div class="formula-box">Point → Quotation → Analysis → Context → Link back</div>`,quickCheck:{question:`What should you always include alongside a quotation in a literature essay?`,options:[`The act and scene number only`,`Just the quotation, nothing else`,`Analysis of language, technique, and effect on the reader`,`A retelling of what happens next in the story`],correct:2,explanation:`Quotations alone get no marks — you must analyse the specific language, identify the technique, and explain the effect on the reader or audience.`}}],relatedTopics:[{id:`jekyll-hyde`,name:`Jekyll & Hyde`,subjectId:`english-lit`},{id:`aqa-anthology`,name:`Poetry Anthology`,subjectId:`english-lit`},{id:`reading-skills`,name:`Reading Skills`,subjectId:`english-lang`}]},"cell-biology":{id:`cell-biology`,subjectId:`biology`,subjectName:`Biology`,topicId:`cell-biology`,topicName:`Cell Biology`,title:`Cell Structure and Function`,estimatedMinutes:18,xpReward:25,keyPoints:[`Eukaryotic cells (animals/plants) have a nucleus; prokaryotic (bacteria) do not`,`Plant cells have a cell wall, chloroplasts, and a permanent vacuole`,`The cell membrane controls what enters and leaves the cell`,`Mitochondria produce ATP through respiration — the cell's energy currency`],sections:[{title:`Animal vs Plant Cells`,content:`<p>All living things are made of <strong>cells</strong>. There are two main types at GCSE:</p>
<p><strong>Animal cells</strong> contain: nucleus, cytoplasm, cell membrane, mitochondria, ribosomes.</p>
<p><strong>Plant cells</strong> contain: all of the above PLUS a cell wall (made of cellulose), chloroplasts (for photosynthesis), and a permanent vacuole filled with cell sap.</p>
<p>Both are <em>eukaryotic</em> — they have a proper nucleus surrounded by a nuclear membrane.</p>`,quickCheck:{question:`Which structure is found in plant cells but NOT in animal cells?`,options:[`Nucleus`,`Mitochondria`,`Chloroplasts`,`Ribosomes`],correct:2,explanation:`Chloroplasts are only found in plant cells (and some algae). They contain chlorophyll and are the site of photosynthesis.`}},{title:`The Role of Organelles`,content:`<p>Each part of a cell has a specific function:</p>
<ul>
  <li><strong>Nucleus</strong> — contains DNA (genetic instructions); controls cell activity</li>
  <li><strong>Mitochondria</strong> — site of aerobic respiration; produces ATP (energy)</li>
  <li><strong>Ribosomes</strong> — where proteins are made (protein synthesis)</li>
  <li><strong>Cell membrane</strong> — controls movement of substances in and out</li>
  <li><strong>Vacuole</strong> — stores water and maintains turgor pressure in plants</li>
</ul>`,quickCheck:{question:`Where does aerobic respiration take place in a cell?`,options:[`Nucleus`,`Ribosomes`,`Vacuole`,`Mitochondria`],correct:3,explanation:`Mitochondria are the site of aerobic respiration, where glucose and oxygen are converted into ATP (energy), carbon dioxide, and water.`}},{title:`Prokaryotic Cells — Bacteria`,content:`<p><strong>Prokaryotic cells</strong> (like bacteria) are much simpler than eukaryotic cells:</p>
<ul>
  <li>No true nucleus — DNA floats freely in the cytoplasm as a loop</li>
  <li>No membrane-bound organelles</li>
  <li>Have a cell wall (but made of peptidoglycan, not cellulose)</li>
  <li>Much smaller — typically 1–10 micrometres</li>
  <li>May have a flagellum for movement and plasmids (small extra DNA rings)</li>
</ul>
<div class="formula-box">Eukaryotic = membrane-bound nucleus | Prokaryotic = no nucleus</div>`,quickCheck:{question:`How does a bacterial cell differ from a plant cell?`,options:[`Bacteria have mitochondria; plants do not`,`Bacteria have no nucleus; plant cells have a true nucleus`,`Bacteria have chloroplasts; plants do not`,`Bacteria have a vacuole; plants do not`],correct:1,explanation:`The key difference is that bacteria are prokaryotes — their DNA is not enclosed in a nucleus. Plants are eukaryotes with a proper membrane-bound nucleus.`}}],relatedTopics:[{id:`organisation`,name:`Organisation`,subjectId:`biology`},{id:`bioenergetics`,name:`Bioenergetics`,subjectId:`biology`},{id:`atomic-structure`,name:`Atomic Structure`,subjectId:`chemistry`}]},"atomic-structure":{id:`atomic-structure`,subjectId:`chemistry`,subjectName:`Chemistry`,topicId:`atomic-structure`,topicName:`Atomic Structure`,title:`Atoms, Isotopes & the Periodic Table`,estimatedMinutes:16,xpReward:25,keyPoints:[`An atom has a nucleus (protons + neutrons) with electrons in shells`,`Atomic number = number of protons; mass number = protons + neutrons`,`Isotopes are atoms of the same element with different numbers of neutrons`,`The periodic table is ordered by atomic number`],sections:[{title:`Structure of the Atom`,content:`<p>An atom is made of three types of subatomic particles:</p>
<ul>
  <li><strong>Protons</strong> — positive charge (+1), found in the nucleus, mass = 1</li>
  <li><strong>Neutrons</strong> — no charge (0), found in the nucleus, mass = 1</li>
  <li><strong>Electrons</strong> — negative charge (−1), orbit the nucleus in shells, mass ≈ 0</li>
</ul>
<p>The <strong>atomic number</strong> is the number of protons. In a neutral atom, protons = electrons.</p>
<div class="formula-box">Mass number = Protons + Neutrons</div>`,quickCheck:{question:`An atom has atomic number 8 and mass number 16. How many neutrons does it have?`,options:[`6`,`8`,`16`,`24`],correct:1,explanation:`Neutrons = Mass number − Atomic number = 16 − 8 = 8. This is an oxygen atom.`}},{title:`Isotopes`,content:`<p><strong>Isotopes</strong> are atoms of the same element that have the <em>same number of protons</em> but <em>different numbers of neutrons</em>.</p>
<p>They have the same atomic number but different mass numbers.</p>
<p>For example, Carbon-12 and Carbon-14 are both carbon (6 protons), but Carbon-12 has 6 neutrons while Carbon-14 has 8 neutrons.</p>
<p>Isotopes have the same <strong>chemical properties</strong> (same electrons) but different <strong>physical properties</strong> (different masses).</p>`,quickCheck:{question:`Two atoms are isotopes of each other. What must be true?`,options:[`Same number of neutrons, different protons`,`Same number of protons, different neutrons`,`Same mass number, different atomic number`,`Different elements entirely`],correct:1,explanation:`Isotopes have the same atomic number (same element = same protons) but different mass numbers (different neutrons). Same element, different mass.`}},{title:`The Periodic Table`,content:`<p>The <strong>Periodic Table</strong> arranges elements in order of increasing <em>atomic number</em>.</p>
<ul>
  <li><strong>Groups</strong> (vertical columns) — elements with the same number of outer electrons; similar chemical properties</li>
  <li><strong>Periods</strong> (horizontal rows) — elements with the same number of electron shells</li>
  <li><strong>Group 1</strong>: Alkali metals (very reactive) | <strong>Group 7</strong>: Halogens | <strong>Group 0</strong>: Noble gases (unreactive)</li>
</ul>
<p>Elements in the same group react similarly because they have the same number of electrons in their outer shell.</p>`,quickCheck:{question:`Why do elements in the same group of the periodic table have similar chemical properties?`,options:[`They have the same mass number`,`They are all metals`,`They have the same number of electrons in their outer shell`,`They have the same number of neutrons`],correct:2,explanation:`Chemical properties depend on the outer (valence) electrons. Elements in the same group all have the same number of outer electrons, so they react in similar ways.`}}],relatedTopics:[{id:`bonding`,name:`Bonding`,subjectId:`chemistry`},{id:`quantitative`,name:`Quantitative Chemistry`,subjectId:`chemistry`},{id:`cell-biology`,name:`Cell Biology`,subjectId:`biology`}]},forces:{id:`forces`,subjectId:`physics`,subjectName:`Physics`,topicId:`forces`,topicName:`Forces`,title:`Newton's Laws of Motion`,estimatedMinutes:20,xpReward:28,keyPoints:[`Newton's First Law: an object stays at rest or in uniform motion unless acted on by a resultant force`,`Newton's Second Law: F = ma (force = mass × acceleration)`,`Newton's Third Law: every action has an equal and opposite reaction`,`Weight is a force: W = mg (mass × gravitational field strength)`],sections:[{title:`Newton's First Law`,content:`<p><strong>Newton's First Law:</strong> An object will remain at rest, or continue moving at constant velocity, unless acted upon by a resultant (unbalanced) force.</p>
<p>This is sometimes called the <em>law of inertia</em>. An object resists changes to its motion.</p>
<p>Examples: A book sitting on a table (at rest, forces balanced). A spacecraft in deep space continues at the same speed and direction because there is no friction or air resistance.</p>
<p>If forces are <strong>balanced</strong> → no change in motion. If forces are <strong>unbalanced</strong> → acceleration.</p>`,quickCheck:{question:`A car travels at 30 m/s on a motorway. The engine force equals air resistance. What happens?`,options:[`The car accelerates`,`The car decelerates`,`The car continues at 30 m/s`,`The car stops immediately`],correct:2,explanation:`When resultant force = 0 (engine force = air resistance), by Newton's First Law the car continues at constant velocity — no change in motion.`}},{title:`Newton's Second Law — F = ma`,content:`<p><strong>Newton's Second Law:</strong> The resultant force on an object is equal to its mass multiplied by its acceleration.</p>
<div class="formula-box">F = ma</div>
<p>Where F = Force (Newtons, N), m = mass (kg), a = acceleration (m/s²)</p>
<p><strong>Example:</strong> A 1200 kg car accelerates at 3 m/s². What is the resultant force?</p>
<div class="formula-box">F = 1200 × 3 = 3600 N</div>
<p>You can rearrange: <strong>a = F/m</strong> or <strong>m = F/a</strong>. Always check units!</p>`,quickCheck:{question:`A resultant force of 500 N acts on a 50 kg object. What is the acceleration?`,options:[`10 m/s²`,`25,000 m/s²`,`0.1 m/s²`,`450 m/s²`],correct:0,explanation:`a = F/m = 500 ÷ 50 = 10 m/s². Newton's Second Law rearranged.`}},{title:`Weight vs Mass`,content:`<p><strong>Mass</strong> is the amount of matter in an object — it never changes (measured in kg).</p>
<p><strong>Weight</strong> is a <em>force</em> caused by gravity pulling on a mass — it changes depending on the gravitational field strength (measured in Newtons, N).</p>
<div class="formula-box">W = mg</div>
<p>On Earth, g ≈ 9.8 N/kg (often rounded to 10 N/kg in calculations).</p>
<p><strong>Example:</strong> A person has mass 70 kg. Their weight on Earth = 70 × 9.8 = <strong>686 N</strong>. On the Moon (g ≈ 1.6 N/kg), their weight = 70 × 1.6 = <strong>112 N</strong>.</p>`,quickCheck:{question:`An astronaut has mass 80 kg. What is their weight on Earth? (g = 10 N/kg)`,options:[`8 N`,`80 N`,`800 N`,`8000 N`],correct:2,explanation:`W = mg = 80 × 10 = 800 N. Note: mass stays 80 kg everywhere, but weight changes with gravitational field strength.`}}],relatedTopics:[{id:`waves`,name:`Waves`,subjectId:`physics`},{id:`electricity`,name:`Electricity`,subjectId:`physics`},{id:`atomic-structure`,name:`Atomic Structure`,subjectId:`chemistry`}]},"weimar-nazis":{id:`weimar-nazis`,subjectId:`history`,subjectName:`History`,topicId:`weimar-nazis`,topicName:`Weimar & Nazi Germany`,title:`The Rise of Hitler and the Nazi Party`,estimatedMinutes:22,xpReward:28,keyPoints:[`The Weimar Republic was established after WWI and faced enormous challenges`,`Hyperinflation (1923) and the Great Depression (1929) created political instability`,`Hitler exploited German resentment over the Treaty of Versailles`,`The Nazis used propaganda, fear, and democratic weaknesses to seize power by 1933`],sections:[{title:`Weimar Republic — Problems from Birth`,content:`<p>The <strong>Weimar Republic</strong> (1919–1933) was Germany's first democratic government, established after defeat in WWI.</p>
<p>It faced problems immediately:</p>
<ul>
  <li>The <strong>Treaty of Versailles</strong> (1919) imposed humiliating terms: Germany lost territory, paid reparations of £6.6 billion, and accepted sole blame for WWI ('War Guilt Clause')</li>
  <li>Many Germans called Weimar leaders the 'November Criminals' for signing the armistice</li>
  <li>Proportional representation made it hard to form stable governments</li>
</ul>`,quickCheck:{question:`What was the 'War Guilt Clause' in the Treaty of Versailles?`,options:[`Germany was allowed to keep its army`,`Germany accepted sole responsibility for WWI`,`Germany received financial help from the Allies`,`Germany was given back lost territory`],correct:1,explanation:`Article 231 forced Germany to accept blame for WWI — used to justify reparations. This caused huge resentment among Germans, which the Nazis later exploited.`}},{title:`Hitler's Rise — Key Factors`,content:`<p>Hitler became Chancellor in <strong>January 1933</strong>. Several factors enabled this:</p>
<ul>
  <li><strong>Economic crisis</strong>: The Great Depression (1929) caused mass unemployment — 6 million Germans out of work by 1932</li>
  <li><strong>Propaganda</strong>: Goebbels masterminded Nazi messaging; Hitler was portrayed as Germany's saviour</li>
  <li><strong>Fear</strong>: The SA (Stormtroopers) intimidated voters and opponents</li>
  <li><strong>Communist threat</strong>: Middle-class Germans feared a communist revolution — they saw the Nazis as protection</li>
  <li><strong>Political deals</strong>: Hindenburg appointed Hitler Chancellor, believing he could control him</li>
</ul>`,quickCheck:{question:`Why did many middle-class Germans support the Nazis in the early 1930s?`,options:[`They agreed with Nazi racial policies`,`They feared a communist takeover and wanted stability`,`They were all unemployed`,`They liked Hitler personally`],correct:1,explanation:`The Nazi Party positioned itself as a defence against communism. Middle-class Germans, who had savings and businesses to protect, feared a communist revolution more than the Nazis.`}},{title:`Consolidating Power — 1933`,content:`<p>Once Chancellor, Hitler rapidly consolidated total power:</p>
<ul>
  <li><strong>Reichstag Fire</strong> (February 1933) — blamed on communists; used to pass the Reichstag Fire Decree, suspending civil liberties</li>
  <li><strong>Enabling Act</strong> (March 1933) — gave Hitler power to pass laws without the Reichstag; effectively ended democracy</li>
  <li><strong>Night of the Long Knives</strong> (1934) — Hitler eliminated rivals within his own party (SA leaders)</li>
  <li>When Hindenburg died (1934), Hitler merged the roles of Chancellor and President — becoming <em>Führer</em></li>
</ul>`,quickCheck:{question:`What was the significance of the Enabling Act (1933)?`,options:[`It gave women the right to vote`,`It allowed Hitler to pass laws without the Reichstag, ending democracy`,`It started the rearmament programme`,`It banned the Nazi Party`],correct:1,explanation:`The Enabling Act was the legal foundation of Nazi dictatorship. It allowed Hitler to govern by decree, bypassing the democratic parliament entirely.`}}],relatedTopics:[{id:`cold-war`,name:`Cold War 1945–1991`,subjectId:`history`},{id:`medicine`,name:`Medicine Through Time`,subjectId:`history`},{id:`programming`,name:`Programming`,subjectId:`computer-science`}]},programming:{id:`programming`,subjectId:`computer-science`,subjectName:`Computer Science`,topicId:`programming`,topicName:`Programming`,title:`Variables, Data Types & Selection`,estimatedMinutes:20,xpReward:28,keyPoints:[`Variables store data values that can change during a program`,`Data types: integer, float, string, boolean, char`,`Selection (if/elif/else) controls the flow of a program`,`Comparison operators: ==, !=, >, <, >=, <=`],sections:[{title:`Variables and Data Types`,content:`<p>A <strong>variable</strong> is a named storage location in memory that holds a value. The value can change as the program runs.</p>
<p>Common <strong>data types</strong> in GCSE:</p>
<ul>
  <li><strong>Integer</strong> — whole numbers: 5, −12, 0</li>
  <li><strong>Float / Real</strong> — decimal numbers: 3.14, −0.5</li>
  <li><strong>String</strong> — text (in quotes): "Hello", "Year 11"</li>
  <li><strong>Boolean</strong> — True or False only</li>
  <li><strong>Char</strong> — a single character: 'A', '9'</li>
</ul>
<div class="formula-box">name = "Alice" | age = 16 | score = 9.5 | passed = True</div>`,quickCheck:{question:`What data type would you use to store a student's exam score like 87.5?`,options:[`Integer`,`Boolean`,`Float / Real`,`String`],correct:2,explanation:`87.5 is a decimal number, so it should be stored as a Float (also called Real). An integer would lose the decimal part.`}},{title:`Selection — If Statements`,content:`<p><strong>Selection</strong> allows a program to make decisions. We use <strong>if / elif / else</strong> statements.</p>
<div class="formula-box">if score >= 70:
    print("Pass")
elif score >= 40:
    print("Near miss")
else:
    print("Fail")</div>
<p>The program checks each condition in order. The first true condition runs its block; the rest are skipped.</p>
<p>Comparison operators: <strong>==</strong> (equals), <strong>!=</strong> (not equal), <strong>&gt;</strong>, <strong>&lt;</strong>, <strong>&gt;=</strong>, <strong>&lt;=</strong></p>
<p>Note: Use <strong>==</strong> to compare (not = which assigns a value).</p>`,quickCheck:{question:`What will the following print if age = 17?
if age >= 18:
    print('Adult')
else:
    print('Minor')`,options:[`Adult`,`Minor`,`Nothing`,`Error`],correct:1,explanation:`17 is not >= 18, so the condition is False. The else block runs, printing 'Minor'.`}},{title:`Nested Conditions and Logical Operators`,content:`<p>You can combine conditions using <strong>logical operators</strong>:</p>
<ul>
  <li><strong>AND</strong> — both conditions must be true</li>
  <li><strong>OR</strong> — at least one condition must be true</li>
  <li><strong>NOT</strong> — reverses the condition</li>
</ul>
<div class="formula-box">if age >= 16 AND hasID == True:
    print("Entry allowed")</div>
<p>You can also <strong>nest</strong> if statements inside each other for more complex logic — but keep it readable!</p>`,quickCheck:{question:`When does 'if x > 5 AND x < 10' evaluate to True?`,options:[`When x = 5`,`When x = 10`,`When x = 7`,`When x = 11`],correct:2,explanation:`x must be greater than 5 AND less than 10. x = 7 satisfies both conditions. x = 5 or x = 10 fail because the conditions use strict inequality.`}}],relatedTopics:[{id:`algorithms`,name:`Algorithms`,subjectId:`computer-science`},{id:`data-representation`,name:`Data Representation`,subjectId:`computer-science`},{id:`networks`,name:`Networks`,subjectId:`computer-science`}]}};na.algebra,{algebra:[{id:`a1`,type:`mcq`,points:2,question:`Which of the following is a quadratic equation?`,options:[`3x + 5 = 0`,`x² + 4x − 7 = 0`,`x³ − 2x = 0`,`5x⁴ + 1 = 0`],correctAnswer:1,explanation:`A quadratic has the highest power of x equal to 2.`},{id:`a2`,type:`mcq`,points:2,question:`What are the solutions to x² − 5x + 6 = 0?`,options:[`x = 2 and x = 3`,`x = −2 and x = −3`,`x = 1 and x = 6`,`x = −1 and x = −6`],correctAnswer:0,explanation:`Factorising: (x − 2)(x − 3) = 0, so x = 2 or x = 3.`},{id:`a3`,type:`mcq`,points:2,question:`If the discriminant is negative, how many real solutions are there?`,options:[`None`,`One`,`Two`,`Three`],correctAnswer:0,explanation:`A negative discriminant means the equation has no real solutions.`},{id:`a4`,type:`short-answer`,points:4,question:`Solve x² + 6x + 9 = 0. Show your working and state the number of solutions.`,correctAnswer:`x = -3 (one repeated solution)`,explanation:`x² + 6x + 9 = (x + 3)² = 0, so x = −3. Discriminant = 0, confirming one repeated solution.`},{id:`a5`,type:`multi-step`,points:6,question:`Use the quadratic formula to solve 2x² − 7x + 3 = 0.`,steps:[{label:`Identify a, b, c`,answer:`a = 2, b = −7, c = 3`,points:1},{label:`Calculate discriminant b² − 4ac`,answer:`49 − 24 = 25`,points:2},{label:`Apply quadratic formula`,answer:`x = (7 ± 5) / 4`,points:1},{label:`State both solutions`,answer:`x = 3 and x = 1/2`,points:2}]},{id:`a6`,type:`mcq`,points:2,question:`What does the discriminant b² − 4ac = 0 tell us?`,options:[`Two distinct solutions`,`One repeated solution`,`No real solutions`,`The equation cannot be solved`],correctAnswer:1,explanation:`When the discriminant equals 0, there is exactly one repeated solution.`},{id:`a7`,type:`mcq`,points:2,question:`Factorise x² + 7x + 12.`,options:[`(x + 3)(x + 4)`,`(x + 2)(x + 6)`,`(x + 1)(x + 12)`,`(x + 7)(x + 5)`],correctAnswer:0,explanation:`We need numbers that multiply to 12 and add to 7: 3 and 4. So (x + 3)(x + 4).`}],"reading-skills":[{id:`rs1`,type:`mcq`,points:2,question:`What does it mean to 'infer' from a text?`,options:[`Copy a quotation`,`Read between the lines to draw conclusions from evidence`,`Summarise the plot`,`Identify the writer's name`],correctAnswer:1,explanation:`Inference means deducing meaning that isn't explicitly stated, using evidence from the text.`},{id:`rs2`,type:`mcq`,points:2,question:`A text says 'her smile never reached her eyes.' What do we infer?`,options:[`She is happy`,`Her smile is insincere or she is hiding sadness`,`She has eye problems`,`She is very tired`],correctAnswer:1,explanation:`A smile that doesn't reach the eyes suggests it is forced or fake — implying hidden sadness or insincerity.`},{id:`rs3`,type:`short-answer`,points:4,question:`Explain the P-E-E structure and why it is important in reading responses.`,correctAnswer:`Point, Evidence, Explanation — shows structured analysis`,explanation:`P-E-E ensures you make a point, support it with a quotation (evidence), then explain how the evidence supports your point.`},{id:`rs4`,type:`mcq`,points:2,question:`What are connotations?`,options:[`The literal dictionary meaning of a word`,`The extra layers of meaning a word suggests beyond its definition`,`The plot of a story`,`The writer's biography`],correctAnswer:1,explanation:`Connotations are the implied or associated meanings of a word — what it suggests beyond its literal definition.`},{id:`rs5`,type:`mcq`,points:2,question:`Which answer best shows writer's purpose?`,options:[`The writer describes the setting.`,`The writer uses darkness to create tension, making the reader feel uneasy about what might happen next.`,`There is description in the text.`,`The writer wrote this in the 19th century.`],correctAnswer:1,explanation:`Option 2 links technique (darkness), effect (tension), and reader response — showing awareness of writer's purpose.`}],macbeth:[{id:`m1`,type:`mcq`,points:2,question:`When was Macbeth written/first performed?`,options:[`Around 1606`,`Around 1450`,`Around 1750`,`Around 1900`],correctAnswer:0,explanation:`Macbeth was written around 1606, shortly after the Gunpowder Plot and early in James I's reign.`},{id:`m2`,type:`mcq`,points:2,question:`What does 'vaulting ambition, which o'erleaps itself' suggest about Macbeth?`,options:[`He is physically strong`,`His ambition is admirable`,`His ambition is dangerously excessive and will cause his downfall`,`He wants to be a better person`],correctAnswer:2,explanation:`The metaphor of a horse jumping too high suggests ambition that goes beyond what is possible or safe, leading to a fall — foreshadowing Macbeth's fate.`},{id:`m3`,type:`mcq`,points:2,question:`Why does Lady Macbeth call spirits to 'unsex' her?`,options:[`She wants to become a man`,`She wants to suppress feminine compassion so she can commit murder`,`She is performing a spell`,`She wants to impress the witches`],correctAnswer:1,explanation:`Lady Macbeth believes feminine emotions like compassion will prevent her from acting. She wants to remove 'human kindness' to go through with the murder plan.`},{id:`m4`,type:`short-answer`,points:5,question:`How does Shakespeare present ambition as destructive in Macbeth? Use one quotation and analyse the language.`,correctAnswer:`Using evidence like 'vaulting ambition' with analysis of the metaphor and its implications`,explanation:`A good answer should identify a technique (e.g. metaphor, imagery), embed a quotation, analyse specific word choices, and link to the theme of destructive ambition.`},{id:`m5`,type:`mcq`,points:2,question:`What is regicide?`,options:[`Killing a soldier`,`Killing a king or queen`,`Killing a witch`,`Killing an enemy in battle`],correctAnswer:1,explanation:`Regicide means killing a king or queen. In Jacobean England, this was considered the worst possible crime — a sin against God and the natural order.`}],"cell-biology":[{id:`cb1`,type:`mcq`,points:2,question:`Which structures are found in plant cells but NOT animal cells?`,options:[`Nucleus and ribosomes`,`Cell wall, chloroplasts, and permanent vacuole`,`Mitochondria and cytoplasm`,`Cell membrane and nucleus`],correctAnswer:1,explanation:`Plant cells have three extra structures: cell wall (cellulose), chloroplasts (photosynthesis), and a permanent vacuole filled with cell sap.`},{id:`cb2`,type:`mcq`,points:2,question:`What is the function of mitochondria?`,options:[`Protein synthesis`,`Controlling the cell`,`Site of aerobic respiration — producing ATP`,`Photosynthesis`],correctAnswer:2,explanation:`Mitochondria are where aerobic respiration occurs, converting glucose and oxygen into ATP (energy), CO₂ and water.`},{id:`cb3`,type:`mcq`,points:2,question:`How does a prokaryotic cell differ from a eukaryotic cell?`,options:[`Prokaryotes are larger`,`Prokaryotes have no membrane-bound nucleus`,`Prokaryotes have chloroplasts`,`Prokaryotes have more mitochondria`],correctAnswer:1,explanation:`The defining feature of prokaryotes is having no true nucleus — DNA floats freely in the cytoplasm. Eukaryotes have DNA enclosed in a nuclear membrane.`},{id:`cb4`,type:`short-answer`,points:4,question:`Explain the role of the cell membrane in a cell.`,correctAnswer:`Controls what enters and leaves the cell; partially permeable`,explanation:`The cell membrane is partially permeable, controlling the movement of substances into and out of the cell by diffusion, osmosis, and active transport.`},{id:`cb5`,type:`mcq`,points:2,question:`What do ribosomes do?`,options:[`Produce energy`,`Make proteins`,`Store water`,`Control cell division`],correctAnswer:1,explanation:`Ribosomes are the site of protein synthesis. They read the instructions from mRNA and assemble amino acids into proteins.`}],"atomic-structure":[{id:`as1`,type:`mcq`,points:2,question:`An atom has atomic number 11 and mass number 23. How many neutrons does it have?`,options:[`11`,`12`,`23`,`34`],correctAnswer:1,explanation:`Neutrons = mass number − atomic number = 23 − 11 = 12. This is sodium (Na).`},{id:`as2`,type:`mcq`,points:2,question:`What are isotopes?`,options:[`Different elements with the same mass`,`Same element with different numbers of neutrons`,`Atoms with no neutrons`,`Ions with extra electrons`],correctAnswer:1,explanation:`Isotopes are atoms of the same element (same protons) with different numbers of neutrons, giving different mass numbers.`},{id:`as3`,type:`mcq`,points:2,question:`Why do elements in the same group react similarly?`,options:[`Same number of neutrons`,`Same mass number`,`Same number of outer shell electrons`,`Same number of protons`],correctAnswer:2,explanation:`Chemical reactions involve outer shell electrons. Same group = same number of outer electrons = similar reactions.`},{id:`as4`,type:`short-answer`,points:4,question:`Explain the difference between atomic number and mass number.`,correctAnswer:`Atomic number = number of protons; mass number = protons + neutrons`,explanation:`Atomic number determines the element (number of protons). Mass number is the total of protons and neutrons. Subtracting gives the number of neutrons.`},{id:`as5`,type:`mcq`,points:2,question:`What charge does an electron carry?`,options:[`+1`,`0`,`−1`,`+2`],correctAnswer:2,explanation:`Electrons carry a negative charge of −1. Protons carry +1 and neutrons carry 0.`}],forces:[{id:`f1`,type:`mcq`,points:2,question:`A 500 kg object accelerates at 4 m/s². What is the resultant force?`,options:[`125 N`,`496 N`,`2000 N`,`504 N`],correctAnswer:2,explanation:`F = ma = 500 × 4 = 2000 N. Always use F = ma.`},{id:`f2`,type:`mcq`,points:2,question:`An astronaut has mass 80 kg. On the Moon (g = 1.6 N/kg), what is their weight?`,options:[`80 N`,`128 N`,`800 N`,`50 N`],correctAnswer:1,explanation:`W = mg = 80 × 1.6 = 128 N. Mass stays 80 kg, but weight depends on the local gravitational field strength.`},{id:`f3`,type:`mcq`,points:2,question:`Newton's First Law states that an object will...`,options:[`Always accelerate when moving`,`Remain at rest or in uniform motion unless a resultant force acts`,`Always move in a straight line`,`Slow down and stop naturally`],correctAnswer:1,explanation:`Newton's First Law (inertia): without a resultant force, an object's motion doesn't change — it stays still or continues at constant velocity.`},{id:`f4`,type:`multi-step`,points:6,question:`A car of mass 1200 kg accelerates from 0 to 30 m/s in 15 seconds.`,steps:[{label:`Calculate acceleration (a = Δv/t)`,answer:`a = 30/15 = 2 m/s²`,points:2},{label:`Calculate resultant force (F = ma)`,answer:`F = 1200 × 2 = 2400 N`,points:2},{label:`State the unit of force`,answer:`Newtons (N)`,points:2}]},{id:`f5`,type:`mcq`,points:2,question:`What is the difference between mass and weight?`,options:[`They are the same thing`,`Mass is a force; weight is amount of matter`,`Mass is the amount of matter (kg); weight is the gravitational force on it (N)`,`Mass changes with location; weight does not`],correctAnswer:2,explanation:`Mass (kg) measures the amount of matter — constant everywhere. Weight (N) is the gravitational force pulling on that mass — varies by location.`}]}.algebra;var ra={id:`macbeth-power`,subjectId:`english-lit`,subjectName:`English Literature`,title:`Macbeth Essay Question`,question:`How does Shakespeare present the theme of ambition and its consequences in Macbeth? Refer to at least two moments from the play.`,points:20,suggestedTime:`25-30 minutes`,wordGuide:`350-500 words`,markScheme:[`Understanding of the text and relevant context (AO3)`,`Analysis of Shakespeare's use of language and dramatic techniques (AO2)`,`Clear, structured argument with relevant quotations (AO1)`,`Exploration of how ambition is presented at different points in the play`,`Understanding of how a contemporary audience might respond`]},ia={"linear-equations":{estimatedMinutes:18,keyPoints:[`A linear equation has no x² or higher powers — just x`,`To solve, get x on its own by doing the same thing to both sides`,`Whatever you do to one side, you MUST do to the other`,`Check your answer by substituting it back in`],sections:[{title:`What Is a Linear Equation?`,content:`<p>A <strong>linear equation</strong> is simply an equation where the unknown (usually <em>x</em>) appears on its own — no x², no x³. Just plain x.</p>
<p>Examples of linear equations:</p>
<ul>
  <li>3x + 5 = 14</li>
  <li>2x − 7 = 9</li>
  <li>5x = 20</li>
</ul>
<p>Our job is to find the value of x that makes the equation true. The key rule is:</p>
<div class="formula-box">Whatever you do to one side, do exactly the same to the other side.</div>
<p>Think of the equation like a balance scale — keep it balanced!</p>`,quickCheck:{question:`Which of these is a linear equation?`,options:[`x² + 3 = 7`,`3x + 5 = 14`,`x³ = 8`,`x² − x = 0`],correct:1,explanation:`3x + 5 = 14 is linear because x only appears to the power of 1. The others have x², x³, so they're not linear.`}},{title:`Step-by-Step: Solving One-Step Equations`,content:`<p>The goal is always to <strong>get x on its own</strong>. To do that, we undo whatever is being done to x.</p>
<p><strong>Example 1:</strong> Solve x + 7 = 12</p>
<p>x has 7 added to it. So we <em>subtract 7</em> from both sides:</p>
<div class="formula-box">x + 7 − 7 = 12 − 7 → x = 5</div>
<p><strong>Example 2:</strong> Solve 3x = 21</p>
<p>x is multiplied by 3. So we <em>divide both sides by 3</em>:</p>
<div class="formula-box">3x ÷ 3 = 21 ÷ 3 → x = 7</div>
<p><strong>Always check:</strong> Substitute back. Does 3(7) = 21? Yes ✓</p>`,quickCheck:{question:`Solve: x − 4 = 11. What is x?`,options:[`x = 7`,`x = 15`,`x = 44`,`x = 4`],correct:1,explanation:`Add 4 to both sides: x − 4 + 4 = 11 + 4, so x = 15. Check: 15 − 4 = 11 ✓`}},{title:`Two-Step Equations`,content:`<p>Most equations have two steps. The rule: <strong>undo in the reverse order of operations</strong>.</p>
<p>Think of it like getting dressed: you put socks on then shoes. To undo it, you take shoes off first, then socks.</p>
<p><strong>Example:</strong> Solve 4x + 3 = 19</p>
<p><strong>Step 1</strong> — subtract 3 from both sides (undo the +3 first):</p>
<div class="formula-box">4x + 3 − 3 = 19 − 3 → 4x = 16</div>
<p><strong>Step 2</strong> — divide both sides by 4 (undo the ×4):</p>
<div class="formula-box">4x ÷ 4 = 16 ÷ 4 → x = 4</div>
<p><strong>Check:</strong> 4(4) + 3 = 16 + 3 = 19 ✓</p>`,quickCheck:{question:`Solve: 5x − 2 = 18`,options:[`x = 3`,`x = 4`,`x = 16`,`x = 20`],correct:1,explanation:`Step 1: Add 2 → 5x = 20. Step 2: Divide by 5 → x = 4. Check: 5(4) − 2 = 18 ✓`}},{title:`Equations with x on Both Sides`,content:`<p>When x appears on both sides, first <strong>collect all the x terms on one side</strong>.</p>
<p><strong>Example:</strong> Solve 5x + 2 = 3x + 10</p>
<p><strong>Step 1</strong> — subtract 3x from both sides to move x terms left:</p>
<div class="formula-box">5x − 3x + 2 = 3x − 3x + 10 → 2x + 2 = 10</div>
<p><strong>Step 2</strong> — subtract 2:</p>
<div class="formula-box">2x = 8</div>
<p><strong>Step 3</strong> — divide by 2:</p>
<div class="formula-box">x = 4</div>
<p><strong>Check:</strong> 5(4) + 2 = 22, and 3(4) + 10 = 22 ✓</p>
<p><strong>Tip:</strong> Always move the smaller x term to avoid negatives where possible.</p>`,quickCheck:{question:`Solve: 7x − 3 = 4x + 12`,options:[`x = 3`,`x = 5`,`x = 9`,`x = 15`],correct:1,explanation:`Subtract 4x: 3x − 3 = 12. Add 3: 3x = 15. Divide by 3: x = 5. Check: 7(5)−3=32, 4(5)+12=32 ✓`}}]},quadratics:{estimatedMinutes:22,keyPoints:[`A quadratic has an x² term — the standard form is ax² + bx + c = 0`,`Method 1: Factorising — find two numbers that multiply to ac and add to b`,`Method 2: Quadratic formula — always works, even when factorising fails`,`The discriminant b² − 4ac tells you how many solutions before you solve`],sections:[{title:`What Makes a Quadratic?`,content:`<p>A <strong>quadratic equation</strong> always has an x² as its highest power. The standard form is:</p>
<div class="formula-box">ax² + bx + c = 0</div>
<p>For example: <strong>x² + 5x + 6 = 0</strong> (here a=1, b=5, c=6)</p>
<p>A quadratic can have <strong>two solutions</strong>, <strong>one solution</strong>, or <strong>no real solutions</strong>.</p>
<p>Why two? Think of a quadratic as a U-shaped parabola. It can cross the x-axis in two places, touch it in one, or miss it completely.</p>`,quickCheck:{question:`In the equation 3x² − 7x + 2 = 0, what are a, b, and c?`,options:[`a=3, b=7, c=2`,`a=3, b=−7, c=2`,`a=−7, b=3, c=2`,`a=2, b=3, c=−7`],correct:1,explanation:`Reading from ax² + bx + c = 0: a is the coefficient of x², which is 3. b is the coefficient of x, which is −7 (the minus is part of b!). c = 2.`}},{title:`Factorising Simple Quadratics`,content:`<p>When a = 1 (just x², not 2x² or 3x²), factorising is usually the quickest method.</p>
<p><strong>The trick:</strong> Find two numbers that <em>multiply to give c</em> and <em>add to give b</em>.</p>
<p><strong>Example:</strong> Solve x² + 7x + 12 = 0</p>
<p>We need two numbers that multiply to <strong>12</strong> and add to <strong>7</strong>.</p>
<p>Try pairs: 1×12=12 (sum 13✗), 2×6=12 (sum 8✗), <strong>3×4=12 (sum 7 ✓)</strong></p>
<div class="formula-box">(x + 3)(x + 4) = 0</div>
<p>Set each bracket to zero: x + 3 = 0 → <strong>x = −3</strong> &nbsp;or&nbsp; x + 4 = 0 → <strong>x = −4</strong></p>`,quickCheck:{question:`Solve x² − 9x + 20 = 0 by factorising.`,options:[`x = 4 and x = 5`,`x = −4 and x = −5`,`x = 2 and x = 10`,`x = 9 and x = 20`],correct:0,explanation:`Find two numbers that multiply to 20 and add to −9: they are −4 and −5. So (x−4)(x−5)=0, giving x=4 or x=5.`}},{title:`The Quadratic Formula — Never Fails`,content:`<p>When factorising gets tricky (especially with awkward numbers), use the <strong>quadratic formula</strong>:</p>
<div class="formula-box">x = (−b ± √(b² − 4ac)) / 2a</div>
<p>The ± means you get <em>two answers</em> — one using + and one using −.</p>
<p><strong>Example:</strong> Solve 2x² + 3x − 5 = 0 (a=2, b=3, c=−5)</p>
<div class="formula-box">x = (−3 ± √(9 − 4×2×(−5))) / (2×2)</div>
<div class="formula-box">x = (−3 ± √(9 + 40)) / 4 = (−3 ± √49) / 4 = (−3 ± 7) / 4</div>
<p>So: x = (−3 + 7)/4 = <strong>4/4 = 1</strong> &nbsp;or&nbsp; x = (−3 − 7)/4 = <strong>−10/4 = −2.5</strong></p>
<p><strong>Pro tip:</strong> Calculate the discriminant (b² − 4ac) first — if it's negative, there are no real solutions!</p>`,quickCheck:{question:`For 3x² − 5x + 1 = 0, what is the discriminant (b² − 4ac)?`,options:[`37`,`13`,`−7`,`25`],correct:1,explanation:`b² − 4ac = (−5)² − 4(3)(1) = 25 − 12 = 13. Since it's positive, there are two solutions.`}}]},"simultaneous-equations":{estimatedMinutes:20,keyPoints:[`Two equations, two unknowns — solve them together`,`Elimination: multiply equations to make one variable cancel`,`Substitution: rearrange one equation, substitute into the other`,`Always check both answers in BOTH original equations`],sections:[{title:`What Are Simultaneous Equations?`,content:`<p><strong>Simultaneous equations</strong> are two (or more) equations that are both true at the same time. We solve them together to find the values of two unknowns.</p>
<p>Example:</p>
<div class="formula-box">Equation 1: x + y = 7<br/>Equation 2: x − y = 3</div>
<p>We need to find the pair of values (x and y) that make <em>both</em> equations true. In this case, x = 5 and y = 2 (since 5+2=7 and 5−2=3).</p>
<p>There are two main methods: <strong>elimination</strong> and <strong>substitution</strong>.</p>`,quickCheck:{question:`Are x = 4, y = 3 a solution to: x + y = 7 AND 2x − y = 5?`,options:[`Yes, they satisfy both equations`,`No, they only satisfy the first`,`No, they satisfy neither`,`No, they only satisfy the second`],correct:0,explanation:`Check eq 1: 4 + 3 = 7 ✓. Check eq 2: 2(4) − 3 = 8 − 3 = 5 ✓. Both work!`}},{title:`Elimination Method`,content:`<p><strong>Elimination</strong> means we add or subtract the equations to remove one variable.</p>
<p><strong>Example:</strong> Solve: 3x + 2y = 16 and 3x − y = 7</p>
<p>The 3x terms are the same! Subtract equation 2 from equation 1:</p>
<div class="formula-box">(3x + 2y) − (3x − y) = 16 − 7<br/>3x − 3x + 2y + y = 9<br/>3y = 9 → y = 3</div>
<p>Now substitute y = 3 back into either equation:</p>
<div class="formula-box">3x + 2(3) = 16 → 3x + 6 = 16 → 3x = 10 → x = 10/3</div>
<p>If coefficients don't match, <strong>multiply</strong> one or both equations first to make them match.</p>`,quickCheck:{question:`Solve: x + y = 10 and x − y = 4. What is x?`,options:[`x = 3`,`x = 7`,`x = 6`,`x = 10`],correct:1,explanation:`Add the two equations: (x+y) + (x−y) = 10 + 4 → 2x = 14 → x = 7.`}},{title:`Substitution Method`,content:`<p><strong>Substitution</strong> is great when one equation has x or y on its own (or is easy to rearrange).</p>
<p><strong>Example:</strong> Solve: y = 2x + 1 and 3x + y = 16</p>
<p><strong>Step 1</strong> — equation 1 already gives y. Substitute it into equation 2:</p>
<div class="formula-box">3x + (2x + 1) = 16<br/>5x + 1 = 16<br/>5x = 15<br/>x = 3</div>
<p><strong>Step 2</strong> — substitute x = 3 back into y = 2x + 1:</p>
<div class="formula-box">y = 2(3) + 1 = 7</div>
<p><strong>Check</strong> in equation 2: 3(3) + 7 = 9 + 7 = 16 ✓</p>`,quickCheck:{question:`Using substitution on y = x + 2 and 2x + y = 11, what is x?`,options:[`x = 2`,`x = 3`,`x = 4`,`x = 5`],correct:1,explanation:`Substitute y = x + 2 into 2x + y = 11: 2x + (x+2) = 11 → 3x + 2 = 11 → 3x = 9 → x = 3.`}}]},inequalities:{estimatedMinutes:16,keyPoints:[`&lt; means 'less than', &gt; means 'greater than', ≤ and ≥ include the boundary value`,`Solve inequalities just like equations — but flip the sign when multiplying/dividing by a negative`,`Show solutions on a number line: open circle (○) for strict, filled circle (●) for ≤ or ≥`,`Combining inequalities: a &lt; x &lt; b means x is between a and b`],sections:[{title:`Understanding Inequality Symbols`,content:`<p>Inequalities compare two values. Here are the four symbols:</p>
<ul>
  <li><strong>x &lt; 5</strong> — x is less than 5 (x could be 4, 3, 0, −7, but NOT 5)</li>
  <li><strong>x &gt; 5</strong> — x is greater than 5 (x could be 6, 10, 100, but NOT 5)</li>
  <li><strong>x ≤ 5</strong> — x is less than OR equal to 5 (x could be 5, 4, 3, −7)</li>
  <li><strong>x ≥ 5</strong> — x is greater than OR equal to 5 (x could be 5, 6, 10)</li>
</ul>
<p>Think of the arrow pointing to the smaller number: x &lt; 5 means x is on the smaller side.</p>`,quickCheck:{question:`Which values satisfy x ≤ 3? Select all that apply:`,options:[`x = 3`,`x = 4`,`x = 0`,`x = −5`],correct:0,explanation:`x ≤ 3 includes x = 3 (the ≤ symbol includes the boundary). So x = 3 satisfies it. Options 'x=0' and 'x=−5' also satisfy it, but in this single-answer format, the key point is x=3 IS included (unlike strict <).`}},{title:`Solving Inequalities — Almost Like Equations`,content:`<p>You solve inequalities the same way as equations — with one important exception.</p>
<p><strong>Example:</strong> Solve 3x + 4 &lt; 16</p>
<div class="formula-box">3x + 4 − 4 &lt; 16 − 4<br/>3x &lt; 12<br/>x &lt; 4</div>
<p>So x can be any value less than 4.</p>
<p><strong>⚠️ The key rule:</strong> If you multiply or divide both sides by a <em>negative number</em>, you must <strong>flip the inequality sign</strong>.</p>
<p><strong>Example:</strong> Solve −2x &gt; 10</p>
<div class="formula-box">−2x ÷ (−2) &lt; 10 ÷ (−2) &nbsp;← sign flips!<br/>x &lt; −5</div>`,quickCheck:{question:`Solve: 2x − 5 ≥ 9. What is x?`,options:[`x ≥ 2`,`x ≥ 7`,`x ≥ 14`,`x ≤ 7`],correct:1,explanation:`Add 5 to both sides: 2x ≥ 14. Divide by 2: x ≥ 7.`}},{title:`Showing Solutions on a Number Line`,content:`<p>Inequalities can be shown on a <strong>number line</strong>:</p>
<ul>
  <li><strong>Open circle (○)</strong> at the boundary for strict inequalities (&lt; or &gt;) — the boundary is NOT included</li>
  <li><strong>Filled circle (●)</strong> at the boundary for ≤ or ≥ — the boundary IS included</li>
  <li>Draw an arrow in the direction of the solution</li>
</ul>
<p><strong>Double inequalities</strong> like −2 &lt; x ≤ 5 mean x is between −2 and 5, not including −2 but including 5. Show this with an open circle at −2, a filled circle at 5, and a line connecting them.</p>
<div class="formula-box">Integer solutions of −1 &lt; x ≤ 4: x can be 0, 1, 2, 3, 4</div>`,quickCheck:{question:`List the integer solutions of −3 ≤ x < 2.`,options:[`−3, −2, −1, 0, 1`,`−2, −1, 0, 1`,`−3, −2, −1, 0, 1, 2`,`−2, −1, 0, 1, 2`],correct:0,explanation:`≤ means −3 IS included. < means 2 is NOT included. So integers from −3 up to (but not including) 2: −3, −2, −1, 0, 1.`}}]},sequences:{estimatedMinutes:18,keyPoints:[`Arithmetic sequence: add the same number each time (common difference d)`,`nth term of arithmetic sequence: nth term = a + (n−1)d, where a is the first term`,`Geometric sequence: multiply by the same number each time (common ratio r)`,`Fibonacci-type: each term is the sum of the two before it`],sections:[{title:`Arithmetic Sequences — Same Difference Each Time`,content:`<p>An <strong>arithmetic sequence</strong> goes up (or down) by the same amount each time. That amount is called the <strong>common difference (d)</strong>.</p>
<p>Examples:</p>
<ul>
  <li>3, 7, 11, 15, 19 ... (d = +4)</li>
  <li>20, 17, 14, 11, 8 ... (d = −3)</li>
</ul>
<p>To find the common difference: subtract any term from the one after it.</p>
<div class="formula-box">d = term₂ − term₁</div>`,quickCheck:{question:`What is the common difference in the sequence: 5, 11, 17, 23, 29?`,options:[`4`,`5`,`6`,`7`],correct:2,explanation:`11 − 5 = 6. Check: 17 − 11 = 6, 23 − 17 = 6. The common difference is 6.`}},{title:`The nth Term Formula`,content:`<p>The <strong>nth term formula</strong> lets you find any term in a sequence without listing them all.</p>
<div class="formula-box">nth term = a + (n − 1)d</div>
<p>Where <strong>a</strong> = first term, <strong>d</strong> = common difference, <strong>n</strong> = position.</p>
<p><strong>Example:</strong> Find the nth term of 3, 7, 11, 15 ...</p>
<p>a = 3, d = 4 (since 7−3=4)</p>
<div class="formula-box">nth term = 3 + (n−1)×4 = 3 + 4n − 4 = 4n − 1</div>
<p>Check: when n = 1: 4(1)−1 = 3 ✓ &nbsp; when n = 3: 4(3)−1 = 11 ✓</p>
<p><strong>Shortcut:</strong> The coefficient of n always equals the common difference d.</p>`,quickCheck:{question:`The nth term of a sequence is 5n + 2. What is the 10th term?`,options:[`52`,`12`,`57`,`72`],correct:0,explanation:`Substitute n = 10: 5(10) + 2 = 50 + 2 = 52.`}},{title:`Geometric Sequences & Other Types`,content:`<p>In a <strong>geometric sequence</strong>, each term is multiplied by the same number — the <strong>common ratio (r)</strong>.</p>
<p>Examples:</p>
<ul>
  <li>2, 6, 18, 54 ... (r = 3 — multiply by 3 each time)</li>
  <li>100, 50, 25, 12.5 ... (r = 0.5 — multiply by ½ each time)</li>
</ul>
<div class="formula-box">r = term₂ ÷ term₁</div>
<p><strong>Quadratic sequences</strong> have a changing difference, but the second differences are constant. The nth term includes an n² term.</p>
<p>Example: 2, 5, 10, 17, 26 ... (differences: 3, 5, 7, 9 — second differences: 2, 2, 2) → nth term = n² + 1</p>`,quickCheck:{question:`What is the common ratio in: 4, 12, 36, 108?`,options:[`4`,`3`,`8`,`12`],correct:1,explanation:`12 ÷ 4 = 3. Check: 36 ÷ 12 = 3, 108 ÷ 36 = 3. The common ratio is 3.`}}]},angles:{estimatedMinutes:16,keyPoints:[`Angles on a straight line = 180°; around a point = 360°`,`Vertically opposite angles are equal`,`In a triangle, all angles sum to 180°`,`Alternate angles (Z-angles) are equal; co-interior angles sum to 180°`],sections:[{title:`Basic Angle Rules`,content:`<p>These are the building blocks of all angle work. You MUST know these:</p>
<ul>
  <li><strong>Angles on a straight line</strong> sum to 180°</li>
  <li><strong>Angles around a point</strong> sum to 360°</li>
  <li><strong>Vertically opposite angles</strong> are equal (the X-shape when two lines cross)</li>
  <li><strong>Angles in a triangle</strong> sum to 180°</li>
  <li><strong>Angles in a quadrilateral</strong> (4-sided shape) sum to 360°</li>
</ul>
<p><strong>Example:</strong> Two angles on a straight line are 65° and x°. Find x.</p>
<div class="formula-box">65 + x = 180 → x = 115°</div>`,quickCheck:{question:`Three angles on a straight line are 40°, 75°, and x°. Find x.`,options:[`55°`,`65°`,`75°`,`115°`],correct:1,explanation:`40 + 75 + x = 180 → 115 + x = 180 → x = 65°.`}},{title:`Parallel Lines and Transversals`,content:`<p>When a line crosses two <strong>parallel lines</strong>, it creates special angle pairs:</p>
<ul>
  <li><strong>Alternate angles</strong> (Z-shape) — equal to each other</li>
  <li><strong>Corresponding angles</strong> (F-shape) — equal to each other</li>
  <li><strong>Co-interior angles</strong> (C-shape) — add up to 180°</li>
</ul>
<p>You can always spot which is which by looking at the shape they form with the lines.</p>
<p><strong>Example:</strong> A transversal crosses parallel lines. One angle is 55°. Find the alternate angle.</p>
<div class="formula-box">Alternate angle = 55° (they're always equal)</div>`,quickCheck:{question:`Two co-interior angles are formed when a transversal crosses parallel lines. One angle is 70°. What is the other?`,options:[`70°`,`110°`,`120°`,`180°`],correct:1,explanation:`Co-interior (C-angles) sum to 180°. So the other angle = 180° − 70° = 110°.`}},{title:`Polygon Angles`,content:`<p>For any polygon with n sides, the sum of interior angles uses this formula:</p>
<div class="formula-box">Sum of interior angles = (n − 2) × 180°</div>
<p><strong>Examples:</strong></p>
<ul>
  <li>Triangle (n=3): (3−2) × 180 = 180°</li>
  <li>Quadrilateral (n=4): (4−2) × 180 = 360°</li>
  <li>Pentagon (n=5): (5−2) × 180 = 540°</li>
  <li>Hexagon (n=6): (6−2) × 180 = 720°</li>
</ul>
<p>For a <strong>regular polygon</strong> (all sides/angles equal): each interior angle = (n−2)×180° ÷ n</p>
<p>The <strong>exterior angle</strong> of any regular polygon = 360° ÷ n. Interior + exterior = 180°.</p>`,quickCheck:{question:`What is each interior angle of a regular octagon (8 sides)?`,options:[`120°`,`135°`,`144°`,`150°`],correct:1,explanation:`Sum = (8−2) × 180 = 1080°. Each angle = 1080 ÷ 8 = 135°.`}}]},"area-perimeter":{estimatedMinutes:18,keyPoints:[`Perimeter = total distance around the outside of a shape`,`Area = the space inside a 2D shape`,`Circle: Area = πr², Circumference = 2πr`,`Always include units: perimeter in cm/m, area in cm²/m²`],sections:[{title:`Area Formulas You Must Know`,content:`<p>Here are the area formulas for all the standard shapes:</p>
<ul>
  <li><strong>Rectangle:</strong> A = length × width</li>
  <li><strong>Triangle:</strong> A = ½ × base × perpendicular height</li>
  <li><strong>Parallelogram:</strong> A = base × perpendicular height (not the slant!)</li>
  <li><strong>Trapezium:</strong> A = ½(a + b) × h, where a and b are the two parallel sides</li>
  <li><strong>Circle:</strong> A = πr² (r = radius)</li>
</ul>
<p><strong>Important:</strong> For triangles and parallelograms, always use the <em>perpendicular</em> (vertical) height, not the slant side.</p>`,quickCheck:{question:`A trapezium has parallel sides of 6 cm and 10 cm, and height 4 cm. What is its area?`,options:[`24 cm²`,`32 cm²`,`40 cm²`,`60 cm²`],correct:1,explanation:`A = ½(6 + 10) × 4 = ½ × 16 × 4 = 32 cm².`}},{title:`Circles — Area and Circumference`,content:`<p>Two key circle formulas — you need both:</p>
<div class="formula-box">Area = πr² &nbsp;&nbsp; Circumference = 2πr = πd</div>
<p>where r = radius (centre to edge) and d = diameter (edge to edge through centre).</p>
<p><strong>Example:</strong> A circle has diameter 12 cm. Find the area and circumference.</p>
<p>First: r = d/2 = 6 cm</p>
<div class="formula-box">Area = π × 6² = 36π ≈ 113.1 cm²<br/>Circumference = 2π × 6 = 12π ≈ 37.7 cm</div>
<p><strong>Tip:</strong> Leave answers in terms of π (like 36π) unless asked for a decimal. It's more precise.</p>
<p><strong>Sectors:</strong> Area = (θ/360) × πr² &nbsp;|&nbsp; Arc length = (θ/360) × 2πr, where θ is the angle.</p>`,quickCheck:{question:`A circle has radius 5 cm. What is the exact area?`,options:[`10π cm²`,`25π cm²`,`50π cm²`,`100π cm²`],correct:1,explanation:`Area = πr² = π × 5² = 25π cm². Always square the radius, not the diameter.`}},{title:`Compound Shapes`,content:`<p><strong>Compound shapes</strong> are made of two or more basic shapes joined together. The strategy:</p>
<ol>
  <li>Split the shape into recognisable parts (rectangles, triangles, semicircles, etc.)</li>
  <li>Find the area of each part separately</li>
  <li>Add them together (or subtract if part is cut out)</li>
</ol>
<p><strong>Example:</strong> An L-shape. Split into two rectangles. Find each area. Add them.</p>
<p><strong>Perimeter tip:</strong> For compound shapes, trace the outside edge carefully. Don't count internal lines — only the boundary counts.</p>`,quickCheck:{question:`A shape is a 10×8 rectangle with a 4×4 square cut from one corner. What is the area?`,options:[`64 cm²`,`80 cm²`,`64 cm²`,`96 cm²`],correct:0,explanation:`Area of rectangle = 10 × 8 = 80 cm². Area of cut square = 4 × 4 = 16 cm². Net area = 80 − 16 = 64 cm².`}}]},volume:{estimatedMinutes:18,keyPoints:[`Volume = amount of 3D space a solid occupies, measured in cm³ or m³`,`Prism (cylinder, cuboid): Volume = cross-section area × length`,`Cone & pyramid: Volume = ⅓ × base area × height`,`Sphere: Volume = (4/3)πr³`],sections:[{title:`Prisms — Cross Section × Length`,content:`<p>A <strong>prism</strong> is any 3D shape where the cross-section stays the same all the way through. A <strong>cylinder</strong> is a circular prism.</p>
<div class="formula-box">Volume of prism = cross-section area × length</div>
<p>Common prisms:</p>
<ul>
  <li><strong>Cuboid:</strong> V = length × width × height</li>
  <li><strong>Cylinder:</strong> V = πr²h (cross-section is a circle with area πr²)</li>
  <li><strong>Triangular prism:</strong> V = (½ × base × height) × length</li>
</ul>
<p><strong>Example:</strong> A cylinder has radius 4 cm and height 10 cm.</p>
<div class="formula-box">V = πr²h = π × 4² × 10 = 160π ≈ 502.7 cm³</div>`,quickCheck:{question:`A cuboid is 5 cm × 3 cm × 8 cm. What is its volume?`,options:[`40 cm³`,`79 cm³`,`120 cm³`,`240 cm³`],correct:2,explanation:`V = 5 × 3 × 8 = 120 cm³.`}},{title:`Cones, Pyramids and Spheres`,content:`<p>These shapes taper to a point, so their volume is <em>one third</em> of the equivalent prism:</p>
<ul>
  <li><strong>Cone:</strong> V = ⅓πr²h (one-third of a cylinder with the same base)</li>
  <li><strong>Pyramid:</strong> V = ⅓ × base area × height</li>
  <li><strong>Sphere:</strong> V = (4/3)πr³ (given in your formula sheet)</li>
</ul>
<p><strong>Example:</strong> A cone has radius 6 cm and height 9 cm.</p>
<div class="formula-box">V = ⅓ × π × 6² × 9 = ⅓ × 324π = 108π ≈ 339.3 cm³</div>
<p><strong>Tip:</strong> The formulas for cone, pyramid, and sphere are given in the exam — you don't need to memorise them, but you must know how to use them!</p>`,quickCheck:{question:`A sphere has radius 3 cm. What is its volume? (V = 4/3 πr³)`,options:[`12π cm³`,`36π cm³`,`27π cm³`,`108π cm³`],correct:1,explanation:`V = (4/3) × π × 3³ = (4/3) × π × 27 = 36π cm³.`}},{title:`Surface Area`,content:`<p><strong>Surface area</strong> is the total area of all the faces of a 3D shape.</p>
<p>Key formulas:</p>
<ul>
  <li><strong>Cuboid:</strong> SA = 2(lw + lh + wh)</li>
  <li><strong>Cylinder:</strong> Total SA = 2πr² + 2πrh (two circles + curved rectangle)</li>
  <li><strong>Cone:</strong> Total SA = πr² + πrl, where l = slant height = √(r² + h²)</li>
  <li><strong>Sphere:</strong> SA = 4πr²</li>
</ul>
