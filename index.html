    // Calls the Gemini API with a given prompt and returns parsed JSON.
    // Used by the AI Examiner (MarkScheme) and Results analysis.
    async function callGeminiJSON(prompt, schema) {
      const apiKey = CONFIG.GEMINI_API_KEY;
      if (!apiKey || apiKey === "PASTE_YOUR_GEMINI_API_KEY_HERE") {
        throw new Error("No Gemini API key set in CONFIG.");
      }
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: {
              responseMimeType: "application/json",
              responseSchema: schema
            }
          })
        }
      );
      const data = await res.json();
      const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
      return JSON.parse(text);
    }

    // ║  End-of-session score breakdown with AI analysis.            ║
    // ╚══════════════════════════════════════════════════════════════╝
    function Results({ results, onBack, onAnalyze, teacherName }) {
      const [recommendation, setRecommendation] = useState('');
      const [analyzing,      setAnalyzing]      = useState(false);
      const [sharing,        setSharing]        = useState(false);

      const totalScore  = results.reduce((a, r) => a + r.score, 0);
      const maxPossible = results.reduce((a, r) => a + r.maxMarks, 0);
      const percentage  = maxPossible > 0 ? Math.round((totalScore / maxPossible) * 100) : 0;

      // Grade + colour mapping
      let grade = 'U', color = 'text-brand-red', message = 'Keep practicing!';
      if      (percentage >= 90) { grade='9'; color='text-green-400'; message='Outstanding work!'; }
      else if (percentage >= 80) { grade='8'; color='text-green-400'; message='Excellent!'; }
      else if (percentage >= 70) { grade='7'; color='text-green-300'; message='Very good!'; }
      else if (percentage >= 60) { grade='6'; color='text-yellow-400'; message='Good pass.'; }
      else if (percentage >= 50) { grade='5'; color='text-yellow-500'; message='Strong foundation.'; }
      else if (percentage >= 40) { grade='4'; color='text-orange-400'; message='Standard pass.'; }

      // Run AI analysis when results load
      useEffect(() => {
        const run = async () => {
          if (analyzing) return;
          setAnalyzing(true);
          try {
            const payload = results.map(r => ({ question: r.questionText, focus: r.answerFocus, userAnswer: r.userAnswer || "No answer", score: r.score, max: r.maxMarks }));
            const result  = await callGeminiJSON(
              `Analyze these GCSE quiz results: ${JSON.stringify(payload)}\nIdentify the weakest sub-topic (max 3 words) and a short 1-sentence improvement recommendation.`,
              { type: "object", properties: { weakestConcept: { type: "string" }, recommendation: { type: "string" } } }
            );
            if (result.weakestConcept) { onAnalyze(result.weakestConcept); setRecommendation(result.recommendation); }
          } catch {
            setRecommendation("Review your answers below to identify areas for improvement.");
          } finally {
            setAnalyzing(false);
          }
        };
        run();
      }, [results]);

      // Build and open a mailto: results email
      const handleShare = async () => {
        if (sharing) return;
        setSharing(true);
        try {
          let body  = `LEH Revision Portal Results\nTeacher: ${teacherName || 'Self'}\nScore: ${percentage}% (${totalScore}/${maxPossible})\n\n`;
          body += "BREAKDOWN\n";
          results.forEach((r, i) => {

    function StudentPicker({ onBack, names, onUpdateNames }) {
      const [newName,       setNewName]       = useState('');
      const [spinning,      setSpinning]      = useState(false);
      const [rotation,      setRotation]      = useState(0);
      const [winner,        setWinner]        = useState(null);

        if (!showConfetti || !canvasRef.current) return;

        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        const colors  = ['#C51534','#FFFFFF','#FFD700','#FF4081','#00E5FF'];
        const particles = Array.from({ length: 200 }, () => ({
          x: canvas.width / 2, y: canvas.height / 2,

          color: colors[Math.floor(Math.random() * colors.length)],
          size: Math.random() * 10 + 6, rotation: Math.random() * 360,

            p.x += p.vx; p.y += p.vy; p.vy += 0.22; p.vx *= 0.985; p.rotation += p.rSpeed;
            if (p.y > canvas.height * 0.7) p.opacity -= 0.01;

            winner    ? React.createElement('div', { className: "animate-slide-up text-center" }, React.createElement('p', { className: "text-xs font-black uppercase tracking-[0.3em] text-brand-red mb-2" }, "Selected Student"), React.createElement('h2', { className: "text-6xl font-black text-white" }, winner))
            : spinning ? React.createElement('p', { className: "text-white/50 animate-pulse uppercase tracking-widest text-sm font-bold" }, "Spinning...")
            : React.createElement('p', { className: "text-white/30 uppercase tracking-widest text-sm font-bold" }, "Ready to Spin")

            React.createElement('div', { className: "absolute -top-6 left-1/2 -translate-x-1/2 z-20 text-white drop-shadow-xl" }, React.createElement(Icon, { name: "arrow_drop_down", className: "text-5xl" })),
            React.createElement('div', {
              className: "w-full h-full rounded-full border-4 border-surface-dark shadow-2xl relative overflow-hidden",
              style: { background: getConicGradient(), transform: `rotate(${rotation}deg)`, transition: 'transform 4s cubic-bezier(0.15, 0.5, 0.15, 1)' }
            },
              ...names.map((name, i) =>

            React.createElement('div', { className: "flex gap-2 mb-6" },
              React.createElement('input', { type:"text", value: newName, onChange: e => setNewName(e.target.value), onKeyDown: e => e.key === 'Enter' && addName(), placeholder:"Add student name...", className:"flex-1 bg-white/5 border border-white/10 rounded-xl px-4 text-white focus:outline-none focus:border-brand-red h-12" }),
              React.createElement('button', { onClick: addName, className: "bg-white/10 hover:bg-white/20 text-white p-4 rounded-xl transition-colors font-bold" }, React.createElement(Icon, { name: "add" }))

    function App() {
      // ── Navigation State ──────────────────────────────────────────
      const [view,     setView]     = useState(View.LEVEL);

      // ── Selection State ───────────────────────────────────────────

      // ── Exam Session State ────────────────────────────────────────

          results, teacherName: teacher,

        })
      );

    const root = createRoot(document.getElementById('root'));
